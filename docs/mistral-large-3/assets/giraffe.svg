<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <!-- Body -->
  <path d="M100 50 C120 30, 150 40, 150 100 C150 180, 100 200, 100 200 C100 200, 50 180, 50 100 C50 40, 80 30, 100 50 Z"
        fill="#FFA559" stroke="#E67E22" stroke-width="2"/>

  <!-- Spots -->
  <circle cx="80" cy="80" r="10" fill="#E67E22"/>
  <circle cx="120" cy="80" r="10" fill="#E67E22"/>
  <circle cx="90" cy="120" r="10" fill="#E67E22"/>
  <circle cx="110" cy="120" r="10" fill="#E67E22"/>
  <circle cx="100" cy="150" r="10" fill="#E67E22"/>

  <!-- Head -->
  <path d="M100 20 C120 10, 140 20, 140 50 C140 70, 100 80, 100 80 C100 80, 60 70, 60 50 C60 20, 80 10, 100 20 Z"
        fill="#FFF8DC" stroke="#E67E22" stroke-width="2"/>

  <!-- Eyes -->
  <circle cx="110" cy="40" r="5" fill="#333"/>
  <circle cx="90" cy="40" r="5" fill="#333"/>

  <!-- Ears -->
  <path d="M130 30 L140 20 L145 35 Z" fill="#FFA559" stroke="#E67E22" stroke-width="1"/>
  <path d="M70 30 L60 20 L55 35 Z" fill="#FFA559" stroke="#E67E22" stroke-width="1"/>

  <!-- Horns -->
  <path d="M100 20 L105 10 L110 20 Z" fill="#D2B48C" stroke="#8B4513" stroke-width="1"/>
  <path d="M100 20 L95 10 L90 20 Z" fill="#D2B48C" stroke="#8B4513" stroke-width="1"/>

  <!-- Legs -->
  <rect x="80" y="180" width="15" height="80" fill="#FFF8DC" stroke="#E67E22" stroke-width="2"/>
  <rect x="105" y="180" width="15" height="80" fill="#FFF8DC" stroke="#E67E22" stroke-width="2"/>
  <rect x="65" y="180" width="15" height="80" fill="#FFF8DC" stroke="#E67E22" stroke-width="2"/>
  <rect x="90" y="180" width="15" height="80" fill="#FFF8DC" stroke="#E67E22" stroke-width="2"/>

  <!-- Tail -->
  <path d="M50 150 L30 160 L50 170 Z" fill="#FFA559" stroke="#E67E22" stroke-width="1"/>
  <circle cx="30" cy="170" r="5" fill="#E67E22"/>

  <!-- Smile -->
  <path d="M90 60 Q100 70, 110 60" stroke="#333" stroke-width="1" fill="none"/>
</svg>
