<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BAGGAGE CLAIM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            background: #0a1f2e;
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: manipulation;
        }
        
        #game-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            height: 100vh;
            background: #0a1f2e;
            overflow: hidden;
            border: 6px solid #223344;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.4);
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        
        #three-canvas { z-index: 1; }
        #game-canvas { z-index: 2; pointer-events: auto; }
        
        #ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        
        .header {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 15px 20px;
            background: rgba(10, 31, 46, 0.9);
            border-bottom: 5px solid #00ffcc;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            z-index: 20;
            pointer-events: none;
        }
        
        .title {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            color: #00ffcc;
            text-shadow: 0 0 20px #00ffcc, 4px 4px 0 #ff00aa;
            z-index: 15;
            pointer-events: none;
            animation: pulse 2s infinite alternate;
        }
        
        @keyframes pulse {
            from { transform: translateX(-50%) scale(0.95); }
            to { transform: translateX(-50%) scale(1.05); }
        }
        
        #instructions {
            position: absolute;
            bottom: 160px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10,31,46,0.95);
            padding: 10px 20px;
            border: 3px solid #00ffcc;
            font-size: 13px;
            text-align: center;
            line-height: 1.4;
            z-index: 30;
            pointer-events: none;
        }
        
        #start-screen, #game-over {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 31, 46, 0.97);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .btn {
            margin-top: 30px;
            padding: 18px 60px;
            font-family: 'Press Start 2P';
            font-size: 20px;
            background: #ff00aa;
            color: white;
            border: none;
            box-shadow: 0 0 30px #ff00aa;
            cursor: pointer;
        }
        
        .belt {
            position: absolute;
            bottom: 110px;
            left: 0;
            width: 100%;
            height: 110px;
            background: repeating-linear-gradient(90deg, #334455, #334455 50px, #223344 50px, #223344 100px);
            border-top: 10px solid #556677;
            border-bottom: 10px solid #556677;
            z-index: 5;
        }
        
        .claim-zone {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 80px;
            border: 6px dashed #00ffcc;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00ffcc;
            font-size: 14px;
            text-align: center;
            animation: claimPulse 1.5s infinite;
            z-index: 8;
            pointer-events: none;
        }
        
        @keyframes claimPulse {
            0%,100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        #combo {
            position: absolute;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 26px;
            color: #ffff00;
            text-shadow: 0 0 20px #ffff00;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 25;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="three-canvas"></canvas>
        <canvas id="game-canvas"></canvas>
        
        <div id="ui">
            <div class="header">
                <div>SCORE <span id="score">00000</span></div>
                <div>TIME <span id="time">60</span></div>
            </div>
            
            <div class="title">BAGGAGE CLAIM</div>
            
            <div id="instructions">
                TAP BAGS<br>
                <span style="font-size:12px;">GREEN = GOOD • RED = BAD</span>
            </div>
            
            <div class="belt"></div>
            <div class="claim-zone">CLAIM HERE</div>
            <div id="combo">COMBO ×2</div>
            
            <!-- Start Screen -->
            <div id="start-screen">
                <h1 style="font-size:42px; color:#ff00aa; text-shadow:0 0 30px #ff00aa; margin-bottom:20px;">BAGGAGE</h1>
                <h1 style="font-size:42px; color:#00ffcc; text-shadow:0 0 30px #00ffcc; margin-bottom:30px;">CLAIM</h1>
                <p style="text-align:center; max-width:280px; line-height:1.5; margin-bottom:40px;">
                    Flight DLX-472<br>
                    has landed!<br><br>
                    Grab your bags!
                </p>
                <button onclick="startGame()" class="btn">START CLAIMING</button>
            </div>
            
            <!-- Game Over -->
            <div id="game-over" style="display:none;">
                <h1 style="color:#ff3366; font-size:38px;">TIME'S UP</h1>
                <p style="margin:20px 0 10px;">FINAL SCORE</p>
                <div id="final-score" style="font-size:42px; color:#00ffcc; margin-bottom:30px;">00000</div>
                <button onclick="restartGame()" class="btn">PLAY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        // =============== CORE VARIABLES ===============
        let score = 0;
        let timeLeft = 60;
        let gameRunning = false;
        let combo = 1;
        let comboTimer = 0;
        
        let bags = [];
        let particles = [];
        let lastSpawn = 0;
        
        let canvas, ctx;
        let threeScene, threeCamera, threeRenderer;
        
        let highScore = localStorage.getItem("baggageHS") || 9800;
        
        // =============== BAG CLASS ===============
        class Bag {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.w = 62;
                this.h = 48;
                this.type = type; // red, green, blue
                this.speed = 2.2 + Math.random() * 0.8;
                this.angle = (Math.random() - 0.5) * 15;
                this.claimed = false;
            }
            
            update() {
                if (this.claimed) return false;
                this.y += this.speed;
                this.angle += 0.3;
                return this.y > 800;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x + this.w/2, this.y + this.h/2);
                ctx.rotate(this.angle * Math.PI / 180);
                
                // Shadow
                ctx.fillStyle = "rgba(0,0,0,0.6)";
                ctx.fillRect(-this.w/2 + 8, this.h/2 + 6, this.w, 12);
                
                let color, border;
                if (this.type === "green") {
                    color = "#4caf50"; border = "#2e7d32";
                } else if (this.type === "blue") {
                    color = "#2196f3"; border = "#1565c0";
                } else {
                    color = "#f44336"; border = "#c62828";
                }
                
                ctx.fillStyle = color;
                ctx.strokeStyle = border;
                ctx.lineWidth = 6;
                ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
                ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h);
                
                // Handle
                ctx.fillStyle = "#111";
                ctx.fillRect(-18, -this.h/2 - 10, 36, 12);
                
                ctx.fillStyle = "#fff";
                ctx.font = "bold 12px monospace";
                ctx.textAlign = "center";
                ctx.fillText("DLX", 0, 8);
                
                ctx.restore();
            }
            
            contains(tx, ty) {
                return tx > this.x && tx < this.x + this.w &&
                       ty > this.y && ty < this.y + this.h;
            }
        }
        
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.vx = (Math.random()-0.5)*12;
                this.vy = (Math.random()-0.5)*12 - 4;
                this.life = 35;
                this.color = color;
                this.size = 7;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.35;
                this.life--;
                this.size *= 0.95;
            }
            draw() {
                ctx.globalAlpha = this.life / 35;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }
        
        // =============== THREE.JS BACKGROUND ===============
        function initThree() {
            threeRenderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('three-canvas'),
                antialias: true,
                alpha: true
            });
            threeRenderer.setSize(420, 740);
            threeRenderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
            
            threeScene = new THREE.Scene();
            threeCamera = new THREE.PerspectiveCamera(55, 420/740, 1, 1000);
            threeCamera.position.set(0, 10, 22);
            
            const light = new THREE.DirectionalLight(0xffffff, 1.1);
            light.position.set(10, 30, 20);
            threeScene.add(light);
            threeScene.add(new THREE.AmbientLight(0x6688aa, 0.7));
            
            // Simple conveyor in background
            const belt = new THREE.Mesh(
                new THREE.BoxGeometry(30, 1, 8),
                new THREE.MeshPhongMaterial({color: 0x445566})
            );
            belt.position.set(0, -3, 0);
            threeScene.add(belt);
        }
        
        // =============== INIT CANVAS ===============
        function initCanvas() {
            canvas = document.getElementById('game-canvas');
            ctx = canvas.getContext('2d', { alpha: true });
            canvas.width = 420;
            canvas.height = 740;
        }
        
        // =============== TAP HANDLER (FIXED) ===============
        function handleTap(e) {
            if (!gameRunning) return;
            
            const rect = canvas.getBoundingClientRect();
            let tx = e.touches ? e.touches[0].clientX : e.clientX;
            let ty = e.touches ? e.touches[0].clientY : e.clientY;
            
            tx = ((tx - rect.left) / rect.width) * 420;
            ty = ((ty - rect.top) / rect.height) * 740;
            
            for (let i = bags.length - 1; i >= 0; i--) {
                if (bags[i].contains(tx, ty) && !bags[i].claimed) {
                    claimBag(bags[i]);
                    return;
                }
            }
        }
        
        function claimBag(bag) {
            bag.claimed = true;
            
            let points = 0;
            let color = "#ffffff";
            
            if (bag.type === "green") {
                points = 140;
                color = "#aaff88";
                combo = Math.min(combo + 1, 6);
                comboTimer = 50;
                document.getElementById('combo').style.opacity = 1;
                document.getElementById('combo').textContent = `×${combo} COMBO!`;
            } else if (bag.type === "blue") {
                points = 70;
                color = "#88ddff";
            } else {
                points = -80;
                color = "#ff6688";
            }
            
            score += points * combo;
            if (score < 0) score = 0;
            
            document.getElementById('score').textContent = String(Math.floor(score)).padStart(5, '0');
            
            // Explosion
            for (let i = 0; i < 28; i++) {
                particles.push(new Particle(bag.x + 31, bag.y + 24, color));
            }
            
            // Remove bag shortly after
            setTimeout(() => {
                const idx = bags.indexOf(bag);
                if (idx > -1) bags.splice(idx, 1);
            }, 80);
        }
        
        function spawnBag() {
            if (!gameRunning) return;
            const types = ["red", "green", "blue"];
            const type = types[Math.floor(Math.random() * types.length)];
            const x = 60 + Math.random() * 300;
            bags.push(new Bag(x, -80, type));
        }
        
        function update() {
            if (!gameRunning) return;
            
            // Update bags
            for (let i = bags.length - 1; i >= 0; i--) {
                if (bags[i].update()) {
                    bags.splice(i, 1);
                }
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            
            // Combo fade
            if (comboTimer > 0) {
                comboTimer--;
                if (comboTimer === 0) {
                    combo = 1;
                    document.getElementById('combo').style.opacity = 0;
                }
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw all bags
            for (let bag of bags) {
                bag.draw();
            }
            
            // Draw particles
            for (let p of particles) {
                p.draw();
            }
            
            ctx.globalAlpha = 1;
        }
        
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        function timerLoop() {
            if (!gameRunning) return;
            timeLeft--;
            document.getElementById('time').textContent = timeLeft;
            
            if (timeLeft <= 10) document.getElementById('time').style.color = "#ff3366";
            
            if (timeLeft <= 0) endGame();
            else setTimeout(timerLoop, 1000);
        }
        
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            
            score = 0;
            timeLeft = 60;
            combo = 1;
            bags = [];
            particles = [];
            
            document.getElementById('score').textContent = "00000";
            document.getElementById('time').textContent = "60";
            document.getElementById('time').style.color = "#ff00aa";
            
            gameRunning = true;
            lastSpawn = Date.now();
            
            // Start spawning
            setInterval(() => {
                if (gameRunning) {
                    spawnBag();
                    if (Math.random() > 0.65) spawnBag();
                }
            }, 420);
            
            timerLoop();
        }
        
        function endGame() {
            gameRunning = false;
            if (score > highScore) {
                highScore = Math.floor(score);
                localStorage.setItem("baggageHS", highScore);
            }
            document.getElementById('final-score').textContent = String(Math.floor(score)).padStart(5, '0');
            document.getElementById('game-over').style.display = 'flex';
        }
        
        function restartGame() {
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
        }
        
        // =============== INITIALIZE ===============
        function init() {
            initThree();
            initCanvas();
            
            const gameCanvas = document.getElementById('game-canvas');
            
            gameCanvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleTap(e);
            });
            
            gameCanvas.addEventListener('click', handleTap);
            
            // Three.js animation loop
            function animateThree() {
                threeRenderer.render(threeScene, threeCamera);
                requestAnimationFrame(animateThree);
            }
            animateThree();
            
            // Main 2D loop
            gameLoop();
            
            console.log("%cBAGGAGE CLAIM - Fixed version loaded", "color:#00ffcc; font-size:14px");
        }
        
        window.onload = init;
    </script>
</body>
</html>
