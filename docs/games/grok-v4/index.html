<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DE-ICE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #05080f;
            color: #fff;
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none;
        }
        
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        .header {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(5,8,15,0.95), transparent);
            z-index: 30;
        }
        
        .logo { font-size: 26px; color: #FF6200; text-shadow: 0 0 20px #FF6200; }
        
        .stats { display: flex; gap: 30px; font-size: 15px; }
        .label { font-size: 10px; opacity: 0.7; }
        .value { color: #FFDD44; text-shadow: 0 0 10px #FF6200; }
        
        #viewport {
            position: absolute;
            top: 82px; bottom: 205px; left: 0; right: 0;
            background: linear-gradient(#0c1729, #1e2f4a);
            border: 6px solid #FF6200;
            overflow: hidden;
        }
        
        #plane-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #nozzle-indicator {
            position: absolute;
            top: 32%;
            font-size: 38px;
            color: #FFEE00;
            text-shadow: 0 0 30px #FFAA00;
            transition: left 0.2s ease-out;
            z-index: 25;
            pointer-events: none;
        }
        
        #ice-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        
        #controls {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 200px;
            background: rgba(5,8,15,0.98);
            border-top: 5px solid #334155;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: auto;
        }
        
        .btn {
            padding: 15px;
            background: #1e2a44;
            border: 4px solid #FF6200;
            color: white;
            font-family: 'Press Start 2P';
            font-size: 14px;
            text-align: center;
            box-shadow: 0 6px 0 #c44a00;
        }
        
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c44a00; }
        
        .spray-btn {
            background: linear-gradient(#FF6200, #FF8800);
            border-color: #FFEE88;
            color: #000;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 10px 0 #c44a00;
        }
        
        #progress {
            position: absolute;
            top: 66px; left: 20px; right: 20px;
            height: 18px;
            background: #1e2a44;
            border: 3px solid #FF6200;
        }
        #progress-bar {
            height: 100%;
            background: linear-gradient(to right, #FF6200, #FFEE00);
            width: 0%;
            box-shadow: 0 0 25px #FFAA00;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div id="ui">
        <div class="header">
            <div class="logo">DE-ICE</div>
            <div class="stats">
                <div><div class="label">SCORE</div><div id="score" class="value">00000</div></div>
                <div><div class="label">TIME</div><div id="timer" class="value">90</div></div>
            </div>
        </div>

        <div id="progress"><div id="progress-bar"></div></div>

        <div id="viewport">
            <div id="plane-container">
                <!-- Much improved airplane SVG -->
                <svg width="360" height="260" viewBox="0 0 360 260" id="plane-svg">
                    <!-- Fuselage -->
                    <path d="M80 130 Q170 95 280 130 Q170 165 80 130" fill="#e2e8f0" stroke="#475569" stroke-width="32" stroke-linejoin="round"/>
                    <!-- Nose cone -->
                    <path d="M80 130 Q45 125 35 130 Q45 135 80 130" fill="#cbd5e1"/>
                    <!-- Cockpit -->
                    <path d="M65 125 Q85 110 110 118" fill="none" stroke="#1e2937" stroke-width="13" stroke-linecap="round"/>
                    
                    <!-- Main wings -->
                    <polygon id="left-wing" points="165 130 65 55 135 165" fill="#94a3b8" stroke="#475569" stroke-width="19" stroke-linejoin="round"/>
                    <polygon id="right-wing" points="165 130 65 205 135 95" fill="#94a3b8" stroke="#475569" stroke-width="19" stroke-linejoin="round"/>
                    
                    <!-- Tail -->
                    <polygon id="tail" points="265 125 325 75 325 175" fill="#64748b" stroke="#334155" stroke-width="17"/>
                    
                    <!-- Engines -->
                    <ellipse cx="195" cy="115" rx="19" ry="11" fill="#475569"/>
                    <ellipse cx="195" cy="145" rx="19" ry="11" fill="#475569"/>
                    
                    <!-- Bright Nozzle -->
                    <g id="nozzle-group">
                        <circle id="nozzle" cx="155" cy="118" r="14" fill="#FFEE00" stroke="#FF6200" stroke-width="7"/>
                        <circle cx="155" cy="118" r="7" fill="#FF6200"/>
                    </g>
                </svg>
            </div>
            
            <div id="nozzle-indicator">▼</div>
            <canvas id="ice-canvas"></canvas>
        </div>

        <div id="controls">
            <div style="display:flex; gap:10px; margin-bottom:8px;">
                <div onclick="moveNozzle(-1)" class="btn" style="flex:1;">← NOZZLE</div>
                <div onclick="moveNozzle(1)" class="btn" style="flex:1;">NOZZLE →</div>
            </div>
            <div id="spray-btn" class="btn spray-btn">HOLD TO SPRAY DE-ICER</div>
            <div style="text-align:center; font-size:11px; opacity:0.7; margin-top:6px;">
                Finer nozzle control • Clear all ice
            </div>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" style="position:absolute; inset:0; background:rgba(5,8,15,0.97); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100;">
        <div style="font-size:52px; color:#FF6200; text-shadow:0 0 30px #FF6200;">DE-ICE</div>
        <p style="color:#94a3b8; margin:40px 0 60px; text-align:center;">Winter Storm • Flight 472</p>
        <div onclick="startGame()" style="padding:22px 85px; background:#FF6200; color:#000; font-size:21px; box-shadow:0 12px 0 #c44a00; cursor:pointer;">
            START MISSION
        </div>
    </div>

    <!-- Game Over -->
    <div id="game-over" style="display:none; position:absolute; inset:0; background:rgba(5,8,15,0.97); flex-direction:column; align-items:center; justify-content:center; z-index:200;">
        <h2 style="color:#f87171;">TIME UP</h2>
        <p style="margin:20px 0 10px;">FINAL SCORE</p>
        <div id="final-score" style="font-size:52px; color:#FFEE00;">00000</div>
        <div onclick="location.reload()" style="margin-top:70px; padding:18px 65px; background:#1e2a44; border:4px solid #64748b; cursor:pointer;">
            TRY AGAIN
        </div>
    </div>

    <script>
        let score = 0, timeLeft = 90, iceLevel = 100;
        let gameRunning = false;
        let nozzlePos = 2;           // Now 0 to 4 (5 positions)
        let iceSections = [94, 87, 95, 81];
        let deiceParticles = [];
        let sprayInterval = null;
        let timerInterval = null;

        let scene, camera, renderer;
        
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const progressBar = document.getElementById('progress-bar');
        const nozzleIndicator = document.getElementById('nozzle-indicator');
        let iceCtx;

        function pad(n) { return ("00000" + Math.floor(n)).slice(-5); }

        function updateUI() {
            scoreEl.textContent = pad(score);
            timerEl.textContent = timeLeft;
            progressBar.style.width = (100 - iceLevel) + "%";
        }

        // Three.js Snow Background
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(58, window.innerWidth/window.innerHeight, 0.1, 200);
            camera.position.set(0, 14, 32);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);

            scene.add(new THREE.AmbientLight(0x99bbff, 0.7));
            const dirLight = new THREE.DirectionalLight(0xffddaa, 1.1);
            dirLight.position.set(15, 35, 25);
            scene.add(dirLight);

            // Snow
            const count = 1400;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            for(let i = 0; i < count*3; i+=3) {
                pos[i] = (Math.random()-0.5)*100;
                pos[i+1] = Math.random()*55;
                pos[i+2] = (Math.random()-0.5)*60;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const snow = new THREE.Points(geo, new THREE.PointsMaterial({color: 0xeeeeee, size: 0.45}));
            scene.add(snow);
        }

        function animateThree() {
            if(!gameRunning) return;
            requestAnimationFrame(animateThree);
            renderer.render(scene, camera);
        }

        // Ice Canvas
        function initIce() {
            const canvas = document.getElementById('ice-canvas');
            iceCtx = canvas.getContext('2d');
            canvas.width = 420;
            canvas.height = 280;
            drawIce();
        }

        function drawIce() {
            iceCtx.clearRect(0, 0, 420, 280);
            
            iceCtx.fillStyle = '#d0e0ff';
            
            // Left wing ice
            iceCtx.globalAlpha = iceSections[0]/100;
            iceCtx.fillRect(55, 72, 125, 48);
            
            // Fuselage
            iceCtx.globalAlpha = iceSections[1]/100;
            iceCtx.fillRect(145, 98, 135, 52);
            
            // Right wing
            iceCtx.globalAlpha = iceSections[2]/100;
            iceCtx.fillRect(55, 158, 125, 48);
            
            // Tail
            iceCtx.globalAlpha = iceSections[3]/100;
            iceCtx.fillRect(265, 82, 65, 75);
            
            iceCtx.globalAlpha = 1;
        }

        function createSpray(x, y) {
            for(let i = 0; i < 32; i++) {
                deiceParticles.push({
                    x: x + (Math.random()-0.5)*55,
                    y: y + (Math.random()-0.5)*40,
                    vx: (Math.random()-0.5)*11,
                    vy: -7 - Math.random()*8,
                    life: 32,
                    color: '#FFCC33'
                });
            }
        }

        function updateAndDrawParticles() {
            for(let i = deiceParticles.length-1; i >= 0; i--) {
                const p = deiceParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3;
                p.life--;
                if(p.life <= 0) {
                    deiceParticles.splice(i,1);
                    continue;
                }
                
                const alpha = p.life / 32;
                iceCtx.save();
                iceCtx.globalAlpha = alpha;
                iceCtx.fillStyle = p.color;
                iceCtx.fillRect(p.x, p.y, 7, 7);
                iceCtx.restore();
            }
        }

        // Finer Nozzle Control (5 positions)
        function moveNozzle(dir) {
            nozzlePos = Math.max(0, Math.min(4, nozzlePos + dir));
            
            const nozzle = document.getElementById('nozzle');
            const positions = [122, 145, 168, 191, 214];   // 5 positions
            nozzle.setAttribute('cx', positions[nozzlePos]);
            
            // Update indicator position
            const indicatorPositions = [19, 28, 37, 46, 55];
            nozzleIndicator.style.left = indicatorPositions[nozzlePos] + "%";
        }

        function startSpraying() {
            if (!gameRunning || sprayInterval) return;
            
            sprayInterval = setInterval(() => {
                const power = [11, 9, 13, 9, 11][nozzlePos];   // stronger in center
                
                if (nozzlePos === 0 || nozzlePos === 1) iceSections[0] = Math.max(0, iceSections[0] - power);
                else if (nozzlePos === 3 || nozzlePos === 4) iceSections[2] = Math.max(0, iceSections[2] - power);
                else iceSections[1] = Math.max(0, iceSections[1] - power * 1.15);
                
                // slight bleed to adjacent sections
                if (nozzlePos > 0) iceSections[0] = Math.max(0, iceSections[0] - 2);
                if (nozzlePos < 4) iceSections[2] = Math.max(0, iceSections[2] - 2);
                
                iceLevel = (iceSections[0] + iceSections[1] + iceSections[2] + iceSections[3]) / 4;
                score += 24;
                
                const sprayX = 90 + nozzlePos * 38;
                createSpray(sprayX, 115);
                
                drawIce();
                updateAndDrawParticles();
                updateUI();
                
                if (iceLevel <= 7) winGame();
            }, 50);
        }

        function stopSpraying() {
            if (sprayInterval) {
                clearInterval(sprayInterval);
                sprayInterval = null;
            }
        }

        function gameTick() {
            if (!gameRunning) return;
            timeLeft--;
            timerEl.textContent = timeLeft;
            
            if (Math.random() > 0.45) {
                iceSections = iceSections.map(s => Math.min(100, s + 1.1));
                iceLevel = (iceSections[0] + iceSections[1] + iceSections[2] + iceSections[3]) / 4;
                drawIce();
            }
            updateUI();
            
            if (timeLeft <= 0) endGame();
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameRunning = true;
            score = 420;
            timeLeft = 90;
            iceLevel = 100;
            iceSections = [94, 87, 95, 81];
            nozzlePos = 2;
            
            drawIce();
            updateUI();
            moveNozzle(0);
            
            timerInterval = setInterval(gameTick, 1000);
            animateThree();
        }

        function winGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            stopSpraying();
            alert("PERFECT! Plane is clear for takeoff!\n\nScore: " + pad(score + 2800));
            location.reload();
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            stopSpraying();
            document.getElementById('final-score').textContent = pad(score);
            document.getElementById('game-over').style.display = 'flex';
        }

        function init() {
            initThree();
            initIce();
            
            const sprayBtn = document.getElementById('spray-btn');
            sprayBtn.addEventListener('mousedown', startSpraying);
            sprayBtn.addEventListener('mouseup', stopSpraying);
            sprayBtn.addEventListener('mouseleave', stopSpraying);
            sprayBtn.addEventListener('touchstart', e => { e.preventDefault(); startSpraying(); });
            sprayBtn.addEventListener('touchend', stopSpraying);
            
            // Swipe support for finer control
            let startX = 0;
            document.getElementById('viewport').addEventListener('touchstart', e => startX = e.touches[0].clientX);
            document.getElementById('viewport').addEventListener('touchend', e => {
                const diff = e.changedTouches[0].clientX - startX;
                if (Math.abs(diff) > 40) {
                    moveNozzle(diff > 0 ? 1 : -1);
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
