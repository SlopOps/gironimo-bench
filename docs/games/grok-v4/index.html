<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DE-ICE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #05080f;
            color: #fff;
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none;
        }
        
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        .header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(5,8,15,0.95), transparent);
            z-index: 30;
        }
        
        .logo {
            font-size: 26px;
            color: #FF6200;
            text-shadow: 0 0 20px #FF6200;
        }
        
        .stats {
            display: flex;
            gap: 30px;
            font-size: 15px;
        }
        
        .label { font-size: 10px; opacity: 0.7; }
        .value { color: #FFDD44; text-shadow: 0 0 10px #FF6200; }
        
        #viewport {
            position: absolute;
            top: 85px;
            bottom: 195px;
            left: 0;
            right: 0;
            background: linear-gradient(#0f1b2e, #1a2a44);
            overflow: hidden;
            border: 6px solid #FF6200;
        }
        
        #plane-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #nozzle-indicator {
            position: absolute;
            top: 38%;
            font-size: 42px;
            color: #FFEE00;
            text-shadow: 0 0 25px #FFAA00;
            transition: left 0.25s ease;
            z-index: 25;
            pointer-events: none;
        }
        
        #ice-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.92;
        }
        
        #controls {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 190px;
            background: rgba(5,8,15,0.98);
            border-top: 5px solid #334155;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            pointer-events: auto;
        }
        
        .btn {
            padding: 16px;
            background: #1e2a44;
            border: 4px solid #FF6200;
            color: white;
            font-family: 'Press Start 2P';
            font-size: 15px;
            text-align: center;
            box-shadow: 0 6px 0 #c44a00;
            user-select: none;
        }
        
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #c44a00;
        }
        
        .spray-btn {
            background: linear-gradient(#FF6200, #FF8800);
            border-color: #FFEE88;
            color: #000;
            font-size: 19px;
            font-weight: bold;
            box-shadow: 0 10px 0 #c44a00;
        }
        
        #progress {
            position: absolute;
            top: 68px; left: 20px; right: 20px;
            height: 18px;
            background: #1e2a44;
            border: 3px solid #FF6200;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            background: linear-gradient(to right, #FF6200, #FFEE00);
            width: 0%;
            box-shadow: 0 0 25px #FFAA00;
        }
        
        #start-screen, #game-over {
            position: absolute; inset: 0;
            background: rgba(5,8,15,0.97);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        
        .title {
            font-size: 52px;
            color: #FF6200;
            text-shadow: 0 0 30px #FF6200;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div id="ui">
        <div class="header">
            <div class="logo">DE-ICE</div>
            <div class="stats">
                <div><div class="label">SCORE</div><div id="score" class="value">00000</div></div>
                <div><div class="label">TIME</div><div id="timer" class="value">90</div></div>
            </div>
        </div>

        <div id="progress"><div id="progress-bar"></div></div>

        <div id="viewport">
            <div id="plane-container">
                <!-- Improved Airplane SVG -->
                <svg width="340" height="240" viewBox="0 0 340 240" id="plane-svg">
                    <!-- Main fuselage -->
                    <ellipse cx="170" cy="125" rx="95" ry="28" fill="#e6ecf5" stroke="#475569" stroke-width="22"/>
                    <!-- Nose -->
                    <path d="M75 125 Q40 115 35 125 Q40 135 75 125" fill="#cbd5e1"/>
                    <!-- Cockpit windows -->
                    <path d="M65 115 Q85 105 105 115" fill="none" stroke="#1e2937" stroke-width="11"/>
                    
                    <!-- Wings -->
                    <polygon id="left-wing" points="165 125 70 45 125 155" fill="#94a3b8" stroke="#475569" stroke-width="18"/>
                    <polygon id="right-wing" points="165 125 70 205 125 95" fill="#94a3b8" stroke="#475569" stroke-width="18"/>
                    
                    <!-- Tail -->
                    <polygon id="tail" points="255 115 310 65 310 165" fill="#64748b" stroke="#334155" stroke-width="16"/>
                    
                    <!-- Nozzle (bright & obvious) -->
                    <g id="nozzle-group">
                        <circle id="nozzle" cx="145" cy="105" r="16" fill="#FFEE00" stroke="#FF6200" stroke-width="8"/>
                        <circle cx="145" cy="105" r="8" fill="#FF6200"/>
                    </g>
                </svg>
            </div>
            
            <!-- Nozzle position indicator -->
            <div id="nozzle-indicator">▼</div>
            
            <canvas id="ice-canvas"></canvas>
        </div>

        <div id="controls">
            <div style="display: flex; gap: 12px;">
                <div onclick="moveNozzle(-1)" class="btn">← LEFT WING</div>
                <div onclick="moveNozzle(1)" class="btn">RIGHT WING →</div>
            </div>
            <div id="spray-btn" class="btn spray-btn">HOLD TO SPRAY DE-ICER</div>
            <div style="text-align:center; font-size:12px; opacity:0.75;">
                Tap buttons or swipe plane • Hold orange button to melt ice
            </div>
        </div>
    </div>

    <!-- Start -->
    <div id="start-screen">
        <div class="title">DE-ICE</div>
        <p style="color:#94a3b8; margin:30px 0 50px; text-align:center; max-width:280px;">
            Clear the ice from Flight 472<br>before takeoff!
        </p>
        <div onclick="startGame()" style="padding:22px 80px; background:#FF6200; color:#000; font-size:22px; box-shadow:0 10px 0 #c44a00; cursor:pointer;">
            START MISSION
        </div>
    </div>

    <!-- Game Over -->
    <div id="game-over" style="display:none; flex-direction:column;">
        <h2 id="result" style="color:#f87171; margin-bottom:20px;">MISSION FAILED</h2>
        <p style="margin:10px 0;">FINAL SCORE</p>
        <div id="final-score" style="font-size:48px; color:#FFEE00;">00000</div>
        <div onclick="location.reload()" style="margin-top:70px; padding:18px 60px; background:#1e2a44; border:4px solid #64748b; cursor:pointer;">
            TRY AGAIN
        </div>
    </div>

    <script>
        let score = 0, timeLeft = 90, iceLevel = 100;
        let gameRunning = false;
        let nozzlePos = 1; // 0 left, 1 center, 2 right
        let iceSections = [95, 88, 96, 82];
        let deiceParticles = [];
        let timerInterval, sprayInterval;
        
        let scene, camera, renderer;
        
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const progressBar = document.getElementById('progress-bar');
        const nozzleIndicator = document.getElementById('nozzle-indicator');
        const iceCanvas = document.getElementById('ice-canvas');
        let iceCtx;

        function pad(n) { return ("00000" + Math.floor(n)).slice(-5); }

        function updateUI() {
            scoreEl.textContent = pad(score);
            timerEl.textContent = timeLeft;
            progressBar.style.width = Math.max(0, 100 - iceLevel) + "%";
        }

        // ==================== THREE.JS SNOW BACKGROUND ====================
        function initThree() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 200);
            camera.position.set(0, 15, 35);

            renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('bg-canvas'), 
                antialias: true, 
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));

            scene.add(new THREE.AmbientLight(0x99bbff, 0.6));
            const sun = new THREE.DirectionalLight(0xffeecc, 1);
            sun.position.set(20, 40, 30);
            scene.add(sun);

            createSnow();
        }

        function createSnow() {
            const count = 1500;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            
            for(let i = 0; i < count*3; i += 3) {
                pos[i]   = (Math.random() - 0.5) * 90;
                pos[i+1] = Math.random() * 60;
                pos[i+2] = (Math.random() - 0.5) * 50;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            
            const mat = new THREE.PointsMaterial({ color: 0xeeeeee, size: 0.5, transparent: true });
            const snow = new THREE.Points(geo, mat);
            scene.add(snow);
        }

        function animateThree() {
            if (!gameRunning) return;
            requestAnimationFrame(animateThree);
            renderer.render(scene, camera);
        }

        // ==================== ICE SYSTEM ====================
        function initIce() {
            iceCtx = iceCanvas.getContext('2d');
            iceCanvas.width = 420;
            iceCanvas.height = 280;
            drawIce();
        }

        function drawIce() {
            iceCtx.clearRect(0, 0, iceCanvas.width, iceCanvas.height);
            
            // Left wing
            iceCtx.fillStyle = '#e0f0ff';
            iceCtx.globalAlpha = iceSections[0] / 100;
            iceCtx.fillRect(40, 65, 110, 55);
            
            // Fuselage
            iceCtx.globalAlpha = iceSections[1] / 100;
            iceCtx.fillRect(130, 95, 140, 48);
            
            // Right wing
            iceCtx.globalAlpha = iceSections[2] / 100;
            iceCtx.fillRect(40, 165, 110, 55);
            
            // Tail
            iceCtx.globalAlpha = iceSections[3] / 100;
            iceCtx.fillRect(255, 75, 70, 80);
            
            iceCtx.globalAlpha = 1.0;
        }

        function createSprayEffect() {
            const baseX = 80 + nozzlePos * 75;
            for(let i = 0; i < 40; i++) {
                deiceParticles.push({
                    x: baseX + Math.random() * 80 - 20,
                    y: 90 + Math.random() * 80,
                    vx: (Math.random() - 0.5) * 12,
                    vy: - (5 + Math.random() * 10),
                    life: 35,
                    color: Math.random() > 0.5 ? '#FFCC00' : '#FF8800'
                });
            }
        }

        function updateParticles() {
            for(let i = deiceParticles.length - 1; i >= 0; i--) {
                const p = deiceParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.35;
                p.life--;
                if(p.life <= 0) deiceParticles.splice(i, 1);
            }
        }

        function drawParticles() {
            for(let p of deiceParticles) {
                const alpha = p.life / 35;
                iceCtx.save();
                iceCtx.globalAlpha = alpha * 0.9;
                iceCtx.fillStyle = p.color;
                iceCtx.fillRect(p.x, p.y, 6, 6);
                iceCtx.restore();
            }
        }

        // ==================== GAME LOGIC ====================
        function moveNozzle(dir) {
            nozzlePos = Math.max(0, Math.min(2, nozzlePos + dir));
            
            const nozzle = document.getElementById('nozzle');
            const positions = [118, 158, 198];
            nozzle.setAttribute('cx', positions[nozzlePos]);
            
            nozzleIndicator.style.left = (22 + nozzlePos * 29) + "%";
        }

        function startSpraying() {
            if (!gameRunning) return;
            
            if (sprayInterval) clearInterval(sprayInterval);
            
            sprayInterval = setInterval(() => {
                // Melt ice
                if (nozzlePos === 0) iceSections[0] = Math.max(0, iceSections[0] - 11);
                else if (nozzlePos === 2) iceSections[2] = Math.max(0, iceSections[2] - 11);
                else {
                    iceSections[1] = Math.max(0, iceSections[1] - 13);
                    iceSections[0] = Math.max(0, iceSections[0] - 5);
                    iceSections[2] = Math.max(0, iceSections[2] - 5);
                }
                
                iceLevel = (iceSections[0] + iceSections[1] + iceSections[2] + iceSections[3]) / 4;
                score += 22;
                
                createSprayEffect();
                drawIce();
                updateParticles();
                drawParticles();
                updateUI();
                
                if (iceLevel < 8) winGame();
            }, 45);
        }

        function stopSpraying() {
            if (sprayInterval) {
                clearInterval(sprayInterval);
                sprayInterval = null;
            }
        }

        function gameTick() {
            if (!gameRunning) return;
            timeLeft--;
            timerEl.textContent = timeLeft;
            
            // Slow ice buildup
            if (Math.random() > 0.5) {
                iceSections = iceSections.map(s => Math.min(100, s + 1.2));
                iceLevel = (iceSections[0] + iceSections[1] + iceSections[2] + iceSections[3]) / 4;
                drawIce();
            }
            
            updateUI();
            
            if (timeLeft <= 0) endGame();
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameRunning = true;
            score = 0;
            timeLeft = 90;
            iceLevel = 100;
            iceSections = [95, 88, 96, 82];
            nozzlePos = 1;
            
            drawIce();
            updateUI();
            moveNozzle(0);
            
            timerInterval = setInterval(gameTick, 1000);
            animateThree();
        }

        function winGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            stopSpraying();
            alert("EXCELLENT JOB!\n\nThe plane is clear for takeoff!\nFinal Score: " + pad(score + 3000));
            location.reload();
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            stopSpraying();
            document.getElementById('final-score').textContent = pad(score);
            document.getElementById('game-over').style.display = 'flex';
        }

        function init() {
            initThree();
            initIce();
            
            const sprayBtn = document.getElementById('spray-btn');
            sprayBtn.addEventListener('mousedown', startSpraying);
            sprayBtn.addEventListener('mouseup', stopSpraying);
            sprayBtn.addEventListener('mouseleave', stopSpraying);
            sprayBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); startSpraying(); });
            sprayBtn.addEventListener('touchend', stopSpraying);
            
            // Swipe support
            let startX = 0;
            document.getElementById('viewport').addEventListener('touchstart', e => startX = e.touches[0].clientX);
            document.getElementById('viewport').addEventListener('touchend', e => {
                const diff = e.changedTouches[0].clientX - startX;
                if (Math.abs(diff) > 50) moveNozzle(diff > 0 ? 1 : -1);
            });
            
            window.addEventListener('resize', () => {
                if (renderer) {
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
