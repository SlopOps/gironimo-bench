<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DE-ICE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #0a0e17;
            color: #fff;
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none;
        }
        
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        .header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(10,14,23,0.95), transparent);
            z-index: 30;
        }
        
        .logo { font-size: 22px; color: #FF6200; text-shadow: 0 0 15px #FF6200; }
        
        .stats { display: flex; gap: 25px; font-size: 14px; }
        .label { font-size: 9px; opacity: 0.7; }
        .value { color: #FF6200; text-shadow: 0 0 10px #FF6200; }
        
        #viewport {
            position: absolute;
            top: 85px; left: 0; right: 0; bottom: 190px;
            background: linear-gradient(#1a2538, #0f1828);
            overflow: hidden;
            border-top: 5px solid #FF6200;
            border-bottom: 5px solid #FF6200;
        }
        
        #plane-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #nozzle-indicator {
            position: absolute;
            top: 25%;
            font-size: 28px;
            transition: left 0.2s ease;
            text-shadow: 0 0 15px #FFAA00;
            z-index: 25;
            pointer-events: none;
        }
        
        #controls {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 185px;
            background: rgba(10,14,23,0.97);
            border-top: 4px solid #334155;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: auto;
        }
        
        .btn {
            flex: 1;
            background: #1e2937;
            border: 4px solid #FF6200;
            color: white;
            font-family: 'Press Start 2P';
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #c44a00;
            user-select: none;
        }
        
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c44a00; }
        
        .spray-btn {
            background: linear-gradient(#FF6200, #FF8800);
            border-color: #fff;
            color: #000;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 8px 0 #c44a00;
        }
        
        #progress {
            position: absolute;
            top: 65px; left: 20px; right: 20px;
            height: 14px;
            background: #1e2937;
            border: 3px solid #FF6200;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #FF6200, #FFCC00);
            box-shadow: 0 0 20px #FF6200;
        }
        
        .ice-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        #start-screen, #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,14,23,0.98);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
        }
        
        .title {
            font-size: 48px;
            color: #FF6200;
            text-shadow: 0 0 30px #FF6200;
            margin-bottom: 10px;
        }
        
        .start-btn {
            margin-top: 40px;
            padding: 20px 70px;
            background: #FF6200;
            color: black;
            font-size: 20px;
            border: none;
            box-shadow: 0 10px 0 #c44a00;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div id="ui">
        <div class="header">
            <div class="logo">DE-ICE</div>
            <div class="stats">
                <div><div class="label">SCORE</div><div id="score" class="value">00000</div></div>
                <div><div class="label">TIME</div><div id="timer" class="value">90</div></div>
            </div>
        </div>

        <div id="progress"><div id="progress-bar"></div></div>

        <div id="viewport">
            <div id="plane-container">
                <svg width="320" height="220" viewBox="0 0 320 220" id="plane-svg">
                    <!-- Fuselage -->
                    <path d="M70 110 Q160 75 250 110 Q160 145 70 110" fill="#e2e8f0" stroke="#475569" stroke-width="28"/>
                    <!-- Wings -->
                    <polygon id="left-wing" points="140 115 55 55 95 145" fill="#94a3b8" stroke="#475569" stroke-width="16"/>
                    <polygon id="right-wing" points="140 105 55 165 95 75" fill="#94a3b8" stroke="#475569" stroke-width="16"/>
                    <!-- Tail -->
                    <polygon id="tail" points="245 95 285 55 285 145" fill="#64748b" stroke="#334155" stroke-width="14"/>
                    <!-- Nozzle visual -->
                    <circle id="nozzle" cx="125" cy="85" r="12" fill="#FFAA00" stroke="#FF6200" stroke-width="6"/>
                </svg>
            </div>
            
            <div id="nozzle-indicator">▼</div>
            
            <canvas id="ice-canvas" class="ice-layer" width="400" height="300"></canvas>
        </div>

        <div id="controls">
            <div style="display:flex; gap:12px;">
                <div onclick="moveNozzle(-1)" class="btn">← LEFT WING</div>
                <div onclick="moveNozzle(1)" class="btn">RIGHT WING →</div>
            </div>
            <div onclick="startSpray()" id="spray-btn" class="btn spray-btn">HOLD TO SPRAY DE-ICER</div>
            <div style="text-align:center; font-size:11px; opacity:0.7;">
                Move nozzle • Melt all ice before time runs out
            </div>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen">
        <div class="title">DE-ICE</div>
        <p style="color:#94a3b8; margin:20px 0;">WINTER STORM • CLEAR THE PLANE</p>
        <div onclick="startGame()" class="start-btn">BEGIN MISSION</div>
    </div>

    <!-- Game Over -->
    <div id="game-over" style="display:none;">
        <h2 id="result-text" style="color:#f87171;">TIME'S UP</h2>
        <p style="margin:20px 0 10px;">FINAL SCORE</p>
        <h1 id="final-score" style="color:#FFCC00; font-size:42px;">08420</h1>
        <div onclick="restartGame()" style="margin-top:60px; padding:16px 50px; background:#334155; border:4px solid #64748b; cursor:pointer;">
            TRY AGAIN
        </div>
    </div>

    <script>
        // === GAME VARIABLES ===
        let score = 0, timeLeft = 90, iceLevel = 100;
        let gameRunning = false;
        let nozzlePos = 1; // 0 = left, 1 = center, 2 = right
        let iceSections = [88, 82, 91, 79]; // left, body, right, tail
        let isSpraying = false;
        let sprayInterval = null;

        let scene, camera, renderer, snowParticles;
        let deiceParticles = [];
        let iceCtx;

        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const progressBar = document.getElementById('progress-bar');
        const nozzleIndicator = document.getElementById('nozzle-indicator');
        const iceCanvas = document.getElementById('ice-canvas');

        function pad(n) { return ("00000" + Math.floor(n)).slice(-5); }

        function updateUI() {
            scoreEl.textContent = pad(score);
            timerEl.textContent = timeLeft;
            progressBar.style.width = (100 - iceLevel) + "%";
        }

        // ===================== THREE.JS BACKGROUND =====================
        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0a0e17, 15, 90);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 200);
            camera.position.set(0, 12, 28);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));

            const light = new THREE.DirectionalLight(0x99ccff, 1.1);
            light.position.set(10, 30, 20);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xaaaaaa, 0.5));

            createSnow();
        }

        function createSnow() {
            const count = 1200;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);

            for(let i = 0; i < count*3; i+=3){
                positions[i]   = (Math.random()-0.5)*80;
                positions[i+1] = Math.random()*50;
                positions[i+2] = (Math.random()-0.5)*40 - 15;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            const material = new THREE.PointsMaterial({
                color: 0xdddddd,
                size: 0.45,
                transparent: true,
                opacity: 0.85
            });

            snowParticles = new THREE.Points(geometry, material);
            scene.add(snowParticles);
        }

        function animateThree() {
            if(!gameRunning) return;
            requestAnimationFrame(animateThree);

            if(snowParticles){
                const pos = snowParticles.geometry.attributes.position.array;
                for(let i = 1; i < pos.length; i+=3){
                    pos[i] -= 0.18;
                    if(pos[i] < -12) pos[i] = 45;
                }
                snowParticles.geometry.attributes.position.needsUpdate = true;
            }
            renderer.render(scene, camera);
        }

        // ===================== ICE CANVAS =====================
        function initIceCanvas() {
            iceCtx = iceCanvas.getContext('2d');
            iceCanvas.width = 420;
            iceCanvas.height = 300;
            drawIce();
        }

        function drawIce() {
            iceCtx.clearRect(0, 0, iceCanvas.width, iceCanvas.height);
            
            // Left wing ice
            iceCtx.fillStyle = 'rgba(220,235,255,0.85)';
            iceCtx.beginPath();
            iceCtx.ellipse(95, 105, 68 * (iceSections[0]/100), 28, -0.5, 0, Math.PI*2);
            iceCtx.fill();

            // Body ice
            iceCtx.fillStyle = 'rgba(200,225,255,0.9)';
            iceCtx.fillRect(125, 72, 135 * (iceSections[1]/100), 58);

            // Right wing ice
            iceCtx.fillStyle = 'rgba(220,235,255,0.85)';
            iceCtx.beginPath();
            iceCtx.ellipse(105, 165, 65 * (iceSections[2]/100), 26, 0.6, 0, Math.PI*2);
            iceCtx.fill();

            // Tail ice
            iceCtx.fillStyle = 'rgba(210,230,255,0.9)';
            iceCtx.beginPath();
            iceCtx.moveTo(245, 78);
            iceCtx.lineTo(245 + 52*(iceSections[3]/100), 52);
            iceCtx.lineTo(245 + 52*(iceSections[3]/100), 118);
            iceCtx.fill();
        }

        function createDeiceBurst(baseX, baseY) {
            for(let i = 0; i < 35; i++){
                deiceParticles.push({
                    x: baseX + (Math.random()-0.5)*40,
                    y: baseY + (Math.random()-0.5)*30,
                    vx: (Math.random()-0.5)*8 + (nozzlePos-1)*3,
                    vy: -6 - Math.random()*7,
                    life: 45,
                    size: 4 + Math.random()*5
                });
            }
        }

        function updateAndDrawParticles() {
            iceCtx.save();
            for(let i = deiceParticles.length-1; i >= 0; i--){
                const p = deiceParticles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.25;
                p.life--;

                const alpha = p.life / 45;
                iceCtx.globalAlpha = alpha;
                iceCtx.fillStyle = '#FFCC44';
                iceCtx.fillRect(p.x, p.y, p.size, p.size);

                if(p.life <= 0) deiceParticles.splice(i,1);
            }
            iceCtx.restore();
        }

        // ===================== GAME LOGIC =====================
        function moveNozzle(dir) {
            nozzlePos = Math.max(0, Math.min(2, nozzlePos + dir));
            
            // Move nozzle visual
            const nozzle = document.getElementById('nozzle');
            const positions = [95, 135, 175];
            nozzle.setAttribute('cx', positions[nozzlePos]);
            
            // Move indicator
            nozzleIndicator.style.left = (28 + nozzlePos * 32) + "%";
        }

        function startSpray() {
            if (!gameRunning) return;
            isSpraying = true;
            
            if(sprayInterval) clearInterval(sprayInterval);
            
            sprayInterval = setInterval(() => {
                if(!isSpraying) return;
                
                // Reduce ice based on nozzle position
                if(nozzlePos === 0) iceSections[0] = Math.max(0, iceSections[0] - 7.5);
                else if(nozzlePos === 2) iceSections[2] = Math.max(0, iceSections[2] - 7.5);
                else {
                    iceSections[1] = Math.max(0, iceSections[1] - 8);
                    iceSections[0] = Math.max(0, iceSections[0] - 3);
                    iceSections[2] = Math.max(0, iceSections[2] - 3);
                }
                
                iceLevel = (iceSections[0] + iceSections[1] + iceSections[2] + iceSections[3]) / 4;
                
                score += 18;
                
                // Visual spray
                const sprayX = 80 + nozzlePos * 70 + Math.random()*50;
                createDeiceBurst(sprayX, 95);
                
                drawIce();
                updateAndDrawParticles();
                updateUI();
                
                if(iceLevel <= 6){
                    winGame();
                }
            }, 60);
        }

        function stopSpray() {
            isSpraying = false;
            if(sprayInterval){
                clearInterval(sprayInterval);
                sprayInterval = null;
            }
        }

        function gameTimer() {
            if(!gameRunning) return;
            
            timeLeft--;
            timerEl.textContent = timeLeft;
            
            // Slow ice regrowth
            if(Math.random() > 0.55){
                iceSections = iceSections.map(v => Math.min(100, v + 0.8));
                iceLevel = (iceSections[0] + iceSections[1] + iceSections[2] + iceSections[3]) / 4;
                drawIce();
            }
            
            updateUI();
            
            if(timeLeft <= 0) endGame();
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameRunning = true;
            score = 0;
            timeLeft = 90;
            iceLevel = 100;
            iceSections = [88, 82, 91, 79];
            nozzlePos = 1;
            deiceParticles = [];
            
            drawIce();
            updateUI();
            moveNozzle(0); // reset position
            
            setInterval(gameTimer, 1000);
            animateThree();
        }

        function winGame() {
            gameRunning = false;
            stopSpray();
            alert("✅ AIRCRAFT CLEAR!\n\nYou did it! Final Score: " + pad(score + 2500));
            location.reload();
        }

        function endGame() {
            gameRunning = false;
            stopSpray();
            document.getElementById('final-score').textContent = pad(score);
            document.getElementById('game-over').style.display = 'flex';
        }

        function restartGame() {
            location.reload();
        }

        // Init
        function init() {
            initThree();
            initIceCanvas();
            
            const sprayBtn = document.getElementById('spray-btn');
            sprayBtn.addEventListener('mousedown', startSpray);
            sprayBtn.addEventListener('mouseup', stopSpray);
            sprayBtn.addEventListener('mouseleave', stopSpray);
            sprayBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startSpray(); });
            sprayBtn.addEventListener('touchend', stopSpray);
            
            // Touch swipe for nozzle
            let startX = 0;
            document.getElementById('viewport').addEventListener('touchstart', e => {
                startX = e.touches[0].clientX;
            });
            document.getElementById('viewport').addEventListener('touchend', e => {
                const diff = e.changedTouches[0].clientX - startX;
                if(Math.abs(diff) > 60){
                    moveNozzle(diff > 0 ? 1 : -1);
                }
            });
            
            window.addEventListener('resize', () => {
                if(renderer){
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
