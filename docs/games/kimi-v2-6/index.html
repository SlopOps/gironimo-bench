<style>
*{margin:0;padding:0;box-sizing:border-box;touch-action:none;-webkit-user-select:none;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0a00;font-family:'Cormorant Garamond',serif;}
#game-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;}
#dust-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none;}

/* Loading Screen */
#loading-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#3D1F00;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease;}
#loading-screen.hidden{opacity:0;pointer-events:none;}
#loading-text{font-family:'Playfair Display',serif;font-size:1.2rem;color:#F5E6C8;letter-spacing:.3em;margin-bottom:24px;}
#loading-bar{width:200px;height:2px;background:rgba(245,230,200,.2);position:relative;overflow:hidden;}
#loading-fill{position:absolute;top:0;left:0;height:100%;width:0%;background:#FFD700;transition:width .3s ease;}

/* HUD */
#hud{position:fixed;top:16px;left:16px;z-index:20;display:flex;align-items:center;gap:10px;opacity:0;transition:opacity .3s;pointer-events:none;}
#hud.visible{opacity:1;}
#gold-icon{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#FFF8DC,#FFD700,#B8860B);box-shadow:0 0 8px rgba(255,215,0,.4);position:relative;}
#gold-icon::after{content:'';position:absolute;top:4px;left:7px;width:8px;height:4px;border-radius:50%;background:rgba(255,255,255,.7);transform:rotate(-25deg);}
#score-display{font-family:'Courier Prime',monospace;font-size:2rem;color:#FFD700;text-shadow:0 0 10px rgba(255,215,0,.3);}
#score-label{font-family:'Cormorant Garamond',serif;font-size:.7rem;color:#F5E6C8;opacity:.6;position:absolute;top:36px;left:16px;}

/* Timer Bar */
#timer-bar{position:fixed;top:0;left:0;width:100%;height:4px;background:rgba(61,31,0,.5);z-index:20;opacity:0;transition:opacity .3s;}
#timer-bar.visible{opacity:1;}
#timer-fill{height:100%;width:100%;background:#FFD700;transition:width .1s linear;}
#timer-bar.pulse #timer-fill{animation:timerPulse .5s infinite alternate;}
@keyframes timerPulse{from{background:#FF6B35;}to{background:#8B0000;}}

/* Action Button */
#action-btn{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:30;font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:#F5E6C8;padding:16px 40px;background:linear-gradient(135deg,#B87333,#8B4513);border:2px solid #FFD700;box-shadow:0 4px 20px rgba(255,215,0,.3),inset 0 1px 0 rgba(255,255,255,.1);cursor:pointer;opacity:0;transition:opacity .3s,transform .15s;white-space:nowrap;}
#action-btn.visible{opacity:1;}
#action-btn:active{transform:translateX(-50%) scale(.97);box-shadow:0 2px 10px rgba(255,215,0,.2);}

/* Hint Text */
#hint-text{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);z-index:25;font-family:'Cormorant Garamond',serif;font-size:1rem;color:#F5E6C8;opacity:0;transition:opacity .5s;text-align:center;pointer-events:none;}
#hint-text.visible{opacity:.8;}

/* Result Screen */
#result-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(61,31,0,.7);z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .5s;}
#result-screen.visible{opacity:1;pointer-events:all;}
#result-title{font-family:'Playfair Display',serif;font-size:2rem;color:#F5E6C8;margin-bottom:24px;transform:translateY(-30px);opacity:0;transition:all .4s .2s;}
#result-screen.visible #result-title{transform:translateY(0);opacity:1;}
.result-item{font-family:'Courier Prime',monospace;font-size:1.1rem;color:#F5E6C8;margin:8px 0;opacity:0;transform:translateX(-30px);transition:all .3s;}
#result-screen.visible .result-item.show{opacity:1;transform:translateX(0);}
.result-gold{color:#FFD700;font-size:1.3rem;}
.result-total{color:#FFD700;font-size:1.6rem;font-weight:bold;margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,215,0,.3);}
.bonus-badge{font-family:'Playfair Display',serif;font-size:.9rem;color:#FFD700;background:rgba(255,215,0,.15);padding:4px 12px;margin:4px;display:inline-block;transform:scale(0);transition:transform .4s cubic-bezier(.68,-.55,.265,1.55);}
.bonus-badge.show{transform:scale(1);}

/* Flash Effect */
#flash{position:fixed;top:0;left:0;width:100%;height:100%;z-index:15;pointer-events:none;opacity:0;transition:opacity .1s;}
#flash.gold{background:rgba(255,215,0,.15);opacity:1;}
#flash.red{background:rgba(139,0,0,.2);opacity:1;}

/* Title overlay for ambient state */
#title-overlay{position:fixed;top:20%;left:50%;transform:translateX(-50%);z-index:20;text-align:center;opacity:1;transition:opacity .5s;pointer-events:none;}
#title-overlay.hidden{opacity:0;}
#title-overlay h1{font-family:'Playfair Display',serif;font-size:2.5rem;color:#FFD700;text-shadow:0 2px 20px rgba(0,0,0,.5);letter-spacing:.1em;}
#title-overlay p{font-family:'Cormorant Garamond',serif;font-size:1rem;color:#F5E6C8;opacity:.8;margin-top:8px;}
</style>

<script>
  const MODEL_SLUG = "kimi-v2-6"; // 🔧 match the `path` column in games.csv

  (async function loadGameBanner() {
    try {
      const res = await fetch('../games.csv', { cache: 'no-store' });
      const text = await res.text();
      const rows = text.trim().split('\n').map(r => r.split(','));
      const headers = rows.shift();
      const data = rows.map(row => {
        const obj = {};
        headers.forEach((h, i) => obj[h.trim()] = (row[i] || '').trim());
        return obj;
      });

      const match = data.find(row => row.path === MODEL_SLUG);

      if (!match) {
        document.getElementById('banner-game-name').textContent = MODEL_SLUG;
        document.getElementById('banner-stars').textContent = '☆☆☆☆☆';
        return;
      }

      document.getElementById('banner-game-name').textContent = match.game_name || MODEL_SLUG;
      document.getElementById('banner-model-slug').textContent = match.path;

      const starCount = parseInt(match.stars, 10) || 0;
      document.getElementById('banner-stars').textContent =
        '★'.repeat(starCount) + '☆'.repeat(Math.max(0, 5 - starCount));

      if (match.youtube_link) {
        const watchEl = document.getElementById('banner-watch');
        watchEl.href = match.youtube_link;
        watchEl.style.display = 'inline-flex';
      }

    } catch (err) {
      console.error('Banner error:', err);
      document.getElementById('banner-game-name').textContent = MODEL_SLUG;
    }
  })();
</script>

<script>
// ============================================
// GOLD RUSH — Wild West Gold Panning Game
// ============================================

const STATE = { LOADING: 0, AMBIENT: 1, PANNING: 2, RESULT: 3 };
let gameState = STATE.LOADING;
let score = 0, goldCount = 0, rubyCount = 0, timeRemaining = 60;
let isDragging = false, dragStartX = 0, dragStartY = 0;
let sieveTargetX = -3, sieveTargetZ = 0, sieveCurrentX = -3, sieveCurrentZ = 0;
let lastInteractTime = 0, hintShown = false;

// DOM refs
const loadingScreen = document.getElementById('loading-screen');
const loadingFill = document.getElementById('loading-fill');
const titleOverlay = document.getElementById('title-overlay');
const hud = document.getElementById('hud');
const scoreDisplay = document.getElementById('score-display');
const scoreLabel = document.getElementById('score-label');
const timerBar = document.getElementById('timer-bar');
const timerFill = document.getElementById('timer-fill');
const hintText = document.getElementById('hint-text');
const actionBtn = document.getElementById('action-btn');
const actionBtnResult = document.getElementById('action-btn-result');
const resultScreen = document.getElementById('result-screen');
const resultItems = document.getElementById('result-items');
const bonusBadges = document.getElementById('bonus-badges');
const flash = document.getElementById('flash');
const gameCanvas = document.getElementById('game-canvas');
const dustCanvas = document.getElementById('dust-canvas');

// ============================================
// THREE.JS SCENE
// ============================================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0a00);
scene.fog = new THREE.FogExp2(0x1a0a00, 0.08);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(-2, 3, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ canvas: gameCanvas, antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

// Lighting
const ambientLight = new THREE.AmbientLight(0xFFAA55, 0.4);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xFFF5E0, 1.2);
sunLight.position.set(-5, 8, 3);
scene.add(sunLight);

const hemiLight = new THREE.HemisphereLight(0xFF6B35, 0x3D1F00, 0.3);
scene.add(hemiLight);

const waterGlow = new THREE.PointLight(0xFFD700, 0.5, 6, 2);
waterGlow.position.set(0, -0.5, 0);
scene.add(waterGlow);

// ============================================
// SKY DOME
// ============================================

const skyGeo = new THREE.SphereGeometry(30, 32, 32);
const skyMat = new THREE.ShaderMaterial({
  uniforms: {
    uTop: { value: new THREE.Color(0xFF6B35) },
    uMid: { value: new THREE.Color(0xB87333) },
    uBot: { value: new THREE.Color(0x3D1F00) }
  },
  vertexShader: `
    varying vec3 vWorldPos;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 uTop;
    uniform vec3 uMid;
    uniform vec3 uBot;
    varying vec3 vWorldPos;
    void main() {
      float h = normalize(vWorldPos).y;
      float t = smoothstep(-0.1, 0.4, h);
      vec3 color = mix(uBot, uMid, t);
      t = smoothstep(0.3, 0.9, h);
      color = mix(color, uTop, t);
      gl_FragColor = vec4(color, 1.0);
    }
  `,
  side: THREE.BackSide
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// Sun sprite
const sunCanvas = document.createElement('canvas');
sunCanvas.width = 128; sunCanvas.height = 128;
const sctx = sunCanvas.getContext('2d');
const sunGrad = sctx.createRadialGradient(64, 64, 4, 64, 64, 60);
sunGrad.addColorStop(0, 'rgba(255,255,240,1)');
sunGrad.addColorStop(0.15, 'rgba(255,230,180,0.9)');
sunGrad.addColorStop(0.4, 'rgba(255,107,53,0.4)');
sunGrad.addColorStop(1, 'rgba(255,107,53,0)');
sctx.fillStyle = sunGrad;
sctx.fillRect(0, 0, 128, 128);
const sunTex = new THREE.CanvasTexture(sunCanvas);
const sunSprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: sunTex, blending: THREE.AdditiveBlending, transparent: true }));
sunSprite.position.set(-8, 12, -15);
sunSprite.scale.set(6, 6, 1);
scene.add(sunSprite);

// ============================================
// CANYON WALLS
// ============================================

function makeCanyonWall(isRight) {
  const geo = new THREE.PlaneGeometry(16, 6, 32, 12);
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i);
    const y = pos.getY(i);
    const z = pos.getZ(i);
    // Curve the wall
    const curve = Math.pow(Math.abs(x) / 8, 2) * 2;
    // Add noise
    const noise = Math.sin(x * 2.3 + y * 1.7) * 0.15 + Math.sin(x * 4.1 - y * 3.2) * 0.08;
    pos.setZ(i, z + curve + noise);
    // Jagged top rim
    if (y > 2.5) {
      pos.setY(i, y + Math.sin(x * 3) * 0.3 + Math.random() * 0.2);
    }
  }
  geo.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({
    color: 0x3D1F00,
    roughness: 0.95,
    flatShading: true,
    side: THREE.DoubleSide
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(isRight ? 4 : -4, 1, -2);
  mesh.rotation.y = isRight ? -0.4 : 0.4;
  scene.add(mesh);

  // Rim highlight
  const rimGeo = new THREE.PlaneGeometry(16, 0.15, 32, 1);
  const rimMat = new THREE.MeshBasicMaterial({ color: 0xCC5500, transparent: true, opacity: 0.6 });
  const rim = new THREE.Mesh(rimGeo, rimMat);
  rim.position.set(isRight ? 4 : -4, 4.2, -2);
  rim.rotation.y = isRight ? -0.4 : 0.4;
  scene.add(rim);
}
makeCanyonWall(false);
makeCanyonWall(true);

// Background silhouette ridge
const ridgeGeo = new THREE.PlaneGeometry(40, 8, 60, 1);
const ridgePos = ridgeGeo.attributes.position;
for (let i = 0; i < ridgePos.count; i++) {
  const x = ridgePos.getX(i);
  const y = ridgePos.getY(i);
  // Jagged mountain profile
  let h = 0;
  h += Math.sin(x * 0.5) * 1.5;
  h += Math.sin(x * 1.3 + 2) * 0.8;
  h += Math.sin(x * 2.7 + 1) * 0.4;
  h += Math.sin(x * 5.1) * 0.2;
  if (y > 0) ridgePos.setY(i, y + h);
}
ridgeGeo.computeVertexNormals();
const ridgeMat = new THREE.MeshBasicMaterial({ color: 0x3D1F00, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
const ridge = new THREE.Mesh(ridgeGeo, ridgeMat);
ridge.position.set(0, 1, -12);
scene.add(ridge);

// ============================================
// STREAM BED
// ============================================

const bedGeo = new THREE.PlaneGeometry(14, 4, 1, 1);
const bedMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.9 });
const bed = new THREE.Mesh(bedGeo, bedMat);
bed.rotation.x = -Math.PI / 2;
bed.position.set(0, -0.9, 0);
scene.add(bed);

// Sand banks
const bankGeo = new THREE.PlaneGeometry(14, 0.8, 1, 1);
const bankMat = new THREE.MeshStandardMaterial({ color: 0xC9A96E, roughness: 0.85 });
const bankLeft = new THREE.Mesh(bankGeo, bankMat);
bankLeft.rotation.x = -Math.PI / 2;
bankLeft.position.set(0, -0.15, -1.6);
scene.add(bankLeft);
const bankRight = new THREE.Mesh(bankGeo, bankMat);
bankRight.rotation.x = -Math.PI / 2;
bankRight.position.set(0, -0.15, 1.6);
scene.add(bankRight);

// ============================================
// WATER SURFACE (Custom Shader)
// ============================================

const waterVertexShader = `
  uniform float uTime;
  uniform vec2 uSievePos;
  varying vec2 vUv;
  varying vec3 vWorldPos;
  varying float vElevation;

  float random(vec2 st) {
    return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
  }
  float noise(vec2 st) {
    vec2 i = floor(st);
    vec2 f = fract(st);
    float a = random(i);
    float b = random(i + vec2(1.0, 0.0));
    float c = random(i + vec2(0.0, 1.0));
    float d = random(i + vec2(1.0, 1.0));
    vec2 u = f * f * (3.0 - 2.0 * f);
    return mix(a, b, u.x) + (c - a)* u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
  }

  void main() {
    vUv = uv;
    vec3 pos = position;
    // Wave undulation
    float wave1 = sin(pos.x * 2.0 + uTime * 1.5) * 0.06;
    float wave2 = sin(pos.y * 3.0 + uTime * 2.0) * 0.04;
    float wave3 = noise(pos.xy * 1.5 + uTime * 0.3) * 0.08;
    pos.z += wave1 + wave2 + wave3;
    // Sieve depression
    float dist = length(pos.xy - uSievePos);
    float depression = smoothstep(1.8, 0.0, dist) * 0.15;
    pos.z -= depression;
    vElevation = pos.z;
    vWorldPos = (modelMatrix * vec4(pos, 1.0)).xyz;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
  }
`;

const waterFragmentShader = `
  uniform float uTime;
  uniform vec3 uSunDir;
  uniform vec3 uShallowColor;
  uniform vec3 uDeepColor;
  varying vec2 vUv;
  varying vec3 vWorldPos;
  varying float vElevation;

  float random(vec2 st) {
    return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
  }
  float noise(vec2 st) {
    vec2 i = floor(st);
    vec2 f = fract(st);
    float a = random(i);
    float b = random(i + vec2(1.0, 0.0));
    float c = random(i + vec2(0.0, 1.0));
    float d = random(i + vec2(1.0, 1.0));
    vec2 u = f * f * (3.0 - 2.0 * f);
    return mix(a, b, u.x) + (c - a)* u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
  }

  void main() {
    // Flowing normal simulation
    vec2 flowUv = vUv * 6.0 + vec2(uTime * 0.4, 0.0);
    float n1 = noise(flowUv);
    float n2 = noise(flowUv * 1.5 + vec2(uTime * 0.2, 3.7));
    float normalBlend = n1 * 0.5 + n2 * 0.5;
    // Depth-based color
    float depth = smoothstep(-0.12, 0.08, vElevation);
    vec3 waterColor = mix(uDeepColor, uShallowColor, depth);
    // Specular from sun
    vec3 viewDir = normalize(cameraPosition - vWorldPos);
    vec3 normal = normalize(vec3(normalBlend * 0.3, normalBlend * 0.3, 1.0));
    vec3 halfDir = normalize(uSunDir + viewDir);
    float spec = pow(max(dot(normal, halfDir), 0.0), 64.0);
    // Foam at edges
    float edgeFoam = smoothstep(0.0, 0.15, vUv.y) * smoothstep(1.0, 0.85, vUv.y);
    edgeFoam = 1.0 - edgeFoam;
    // Final
    vec3 finalColor = waterColor + vec3(spec * 0.8) + vec3(edgeFoam * 0.1);
    float alpha = 0.82 + edgeFoam * 0.08;
    gl_FragColor = vec4(finalColor, alpha);
  }
`;

const waterUniforms = {
  uTime: { value: 0 },
  uSievePos: { value: new THREE.Vector2(-3, 0) },
  uSunDir: { value: new THREE.Vector3(-5, 8, 3).normalize() },
  uShallowColor: { value: new THREE.Color(0x8B6914) },
  uDeepColor: { value: new THREE.Color(0x1a0a00) }
};

const waterGeo = new THREE.PlaneGeometry(12, 3.2, 64, 32);
const waterMat = new THREE.ShaderMaterial({
  uniforms: waterUniforms,
  vertexShader: waterVertexShader,
  fragmentShader: waterFragmentShader,
  transparent: true,
  side: THREE.DoubleSide
});
const waterMesh = new THREE.Mesh(waterGeo, waterMat);
waterMesh.rotation.x = -Math.PI / 2;
waterMesh.position.set(0, 0, 0);
scene.add(waterMesh);

// ============================================
// SIEVE (Gold Pan)
// ============================================

const sieveGroup = new THREE.Group();

// Rim
const rimGeo = new THREE.TorusGeometry(0.55, 0.035, 16, 48);
const rimMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.8, metalness: 0.1 });
const rimMesh = new THREE.Mesh(rimGeo, rimMat);
rimMesh.rotation.x = Math.PI / 2;
sieveGroup.add(rimMesh);

// Mesh bottom (crosshatch wireframe)
const meshBottomGeo = new THREE.CircleGeometry(0.52, 32);
const meshBottomMat = new THREE.MeshBasicMaterial({ color: 0x5C3A1E, wireframe: true, transparent: true, opacity: 0.5 });
const meshBottom = new THREE.Mesh(meshBottomGeo, meshBottomMat);
meshBottom.rotation.x = -Math.PI / 2;
meshBottom.position.y = -0.02;
sieveGroup.add(meshBottom);

// Handle
const handleGeo = new THREE.CylinderGeometry(0.025, 0.025, 1.0, 8);
const handleMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.8 });
const handle = new THREE.Mesh(handleGeo, handleMat);
handle.position.set(0.7, 0.15, 0);

sieveGroup.position.set(-3, 0.05, 0);

// ============================================
// STREAM PARTICLES
// ============================================

const PARTICLE_TYPES = { SAND: 0, ROCK: 1, GOLD: 2, RUBY: 3 };
const MAX_PARTICLES = 120;
const particles = [];
const particleMeshes = [];

// Geometries for each type
const sandGeo = new THREE.SphereGeometry(0.035, 6, 6);
const rockGeo = new THREE.SphereGeometry(0.12, 8, 8);
const goldGeo = new THREE.SphereGeometry(0.06, 8, 8);
const rubyGeo = new THREE.SphereGeometry(0.045, 8, 8);

const sandMat = new THREE.MeshStandardMaterial({ color: 0xC9A96E, roughness: 0.9 });
const rockMat = new THREE.MeshStandardMaterial({ color: 0x6B5B4F, roughness: 0.7 });
const goldMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, emissive: 0xFFD700, emissiveIntensity: 0.25, roughness: 0.3, metalness: 0.8 });
const rubyMat = new THREE.MeshStandardMaterial({ color: 0x8B0000, emissive: 0x8B0000, emissiveIntensity: 0.3, roughness: 0.2, metalness: 0.6 });

function spawnParticle(forceType) {
  // Weighted random
  let type;
  if (forceType !== undefined) {
    type = forceType;
  } else {
    const r = Math.random();
    if (r < 0.60) type = PARTICLE_TYPES.SAND;
    else if (r < 0.85) type = PARTICLE_TYPES.ROCK;
    else if (r < 0.97) type = PARTICLE_TYPES.GOLD;
    else type = PARTICLE_TYPES.RUBY;
  }

  let mesh;
  switch (type) {
    case PARTICLE_TYPES.SAND: mesh = new THREE.Mesh(sandGeo, sandMat); break;
    case PARTICLE_TYPES.ROCK: mesh = new THREE.Mesh(rockGeo, rockMat); break;
    case PARTICLE_TYPES.GOLD: mesh = new THREE.Mesh(goldGeo, goldMat); break;
    case PARTICLE_TYPES.RUBY: mesh = new THREE.Mesh(rubyGeo, rubyMat); break;
  }

  const x = -6 - Math.random() * 3;
  const y = -0.4 + Math.random() * 0.3;
  const z = -1.2 + Math.random() * 2.4;
  mesh.position.set(x, y, z);

  // Random scale variation
  const s = 0.7 + Math.random() * 0.6;
  mesh.scale.set(s, s, s);

  scene.add(mesh);

  const p = {
    mesh: mesh,
    type: type,
    vx: 1.2 + Math.random() * 0.6,
    vy: 0,
    vz: 0,
    phase: Math.random() * Math.PI * 2,
    amp: type === PARTICLE_TYPES.SAND ? 0.3 : type === PARTICLE_TYPES.ROCK ? 0.1 : type === PARTICLE_TYPES.GOLD ? 0.15 : 0.05,
    freq: 1.5 + Math.random(),
    caught: false,
    inSieve: false,
    rotSpeed: (Math.random() - 0.5) * 2,
    opacity: 1,
    life: 0
  };
  particles.push(p);
  particleMeshes.push(mesh);
  return p;
}

// Initial spawn
for (let i = 0; i < 40; i++) spawnParticle();

// ============================================
// WAKE / BURST PARTICLES (Visual Effects)
// ============================================

const effects = [];
const effectGeo = new THREE.PlaneGeometry(0.08, 0.08);

function spawnEffect(x, y, z, color, count, speed, life) {
  for (let i = 0; i < count; i++) {
    const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
    const mesh = new THREE.Mesh(effectGeo, mat);
    mesh.position.set(x, y, z);
    const angle = Math.random() * Math.PI * 2;
    const spd = speed * (0.5 + Math.random());
    scene.add(mesh);
    effects.push({
      mesh: mesh,
      vx: Math.cos(angle) * spd,
      vy: Math.random() * spd * 0.5,
      vz: Math.sin(angle) * spd,
      life: life * (0.7 + Math.random() * 0.6),
      maxLife: life,
      rotSpeed: (Math.random() - 0.5) * 5
    });
  }
}

// ============================================
// DUST OVERLAY (Canvas 2D)
// ============================================

const dctx = dustCanvas.getContext('2d');
let dustW, dustH;
function resizeDust() {
  dustW = dustCanvas.width = window.innerWidth;
  dustH = dustCanvas.height = window.innerHeight;
}
resizeDust();

const dustParticles = [];
const DUST_COUNT = 100;
for (let i = 0; i < DUST_COUNT; i++) {
  dustParticles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    size: 1 + Math.random() * 2,
    vy: -0.15 - Math.random() * 0.2,
    vx: (Math.random() - 0.5) * 0.3,
    phase: Math.random() * Math.PI * 2,
    alpha: 0.1 + Math.random() * 0.3,
    alphaSpeed: 0.002 + Math.random() * 0.004
  });
}
let windGustTime = 0, nextGust = 8 + Math.random() * 7, gustStrength = 0;

function updateDust() {
  dctx.clearRect(0, 0, dustW, dustH);
  // Wind gust
  windGustTime += 0.016;
  if (windGustTime > nextGust) {
    gustStrength = 3 + Math.random() * 2;
    nextGust = windGustTime + 8 + Math.random() * 7;
  }
  if (gustStrength > 0) gustStrength *= 0.97;
  if (gustStrength < 0.1) gustStrength = 0;

  for (const p of dustParticles) {
    p.x += p.vx + Math.sin(windGustTime * 0.5 + p.phase) * 0.3 + gustStrength;
    p.y += p.vy;
    p.alpha += Math.sin(windGustTime + p.phase) * p.alphaSpeed;
    p.alpha = Math.max(0.05, Math.min(0.5, p.alpha));
    if (p.y < -10) { p.y = dustH + 10; p.x = Math.random() * dustW; }
    if (p.x > dustW + 10) p.x = -10;
    if (p.x < -10) p.x = dustW + 10;

    dctx.beginPath();
    dctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    dctx.fillStyle = `rgba(245,230,200,${p.alpha})`;
    dctx.fill();
  }
}

// ============================================
// INPUT HANDLING
// ============================================

function getScenePoint(clientX, clientY) {
  const rect = gameCanvas.getBoundingClientRect();
  const ndcX = ((clientX - rect.left) / rect.width) * 2 - 1;
  const ndcY = -((clientY - rect.top) / rect.height) * 2 + 1;
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), camera);
  const planeY = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
  const target = new THREE.Vector3();
  raycaster.ray.intersectPlane(planeY, target);
  return target;
}

function onPointerDown(e) {
  if (gameState !== STATE.PANNING) return;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  const pt = getScenePoint(cx, cy);
  const dist = Math.sqrt((pt.x - sieveCurrentX) ** 2 + (pt.z - sieveCurrentZ) ** 2);
  if (dist < 2.5) {
    isDragging = true;
    dragStartX = cx;
    dragStartY = cy;
    // Lift sieve
    gsap.to(sieveGroup.position, { y: 0.25, duration: 0.2, ease: 'power2.out' });
    gsap.to(sieveGroup.scale, { x: 1.05, y: 1.05, z: 1.05, duration: 0.2, yoyo: true, repeat: 1 });
    lastInteractTime = performance.now();
    hintShown = true;
    hintText.classList.remove('visible');
  }
}

function onPointerMove(e) {
  if (!isDragging || gameState !== STATE.PANNING) return;
  e.preventDefault();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  const pt = getScenePoint(cx, cy);
  // Clamp to water bounds
  sieveTargetX = Math.max(-5, Math.min(5, pt.x));
  sieveTargetZ = Math.max(-1.4, Math.min(1.4, pt.z));
  lastInteractTime = performance.now();
}

function onPointerUp(e) {
  if (!isDragging || gameState !== STATE.PANNING) return;
  isDragging = false;
  // Drop sieve
  gsap.to(sieveGroup.position, { y: 0.05, duration: 0.1, ease: 'power2.out' });
  // Shake animation
  const baseRot = sieveGroup.rotation.z;
  gsap.timeline()
    .to(sieveGroup.rotation, { z: baseRot + 0.12, duration: 0.07, ease: 'power1.inOut' })
    .to(sieveGroup.rotation, { z: baseRot - 0.12, duration: 0.07, ease: 'power1.inOut' })
    .to(sieveGroup.rotation, { z: baseRot + 0.10, duration: 0.07, ease: 'power1.inOut' })
    .to(sieveGroup.rotation, { z: baseRot - 0.10, duration: 0.07, ease: 'power1.inOut' })
    .to(sieveGroup.rotation, { z: baseRot + 0.08, duration: 0.07, ease: 'power1.inOut' })
    .to(sieveGroup.rotation, { z: baseRot, duration: 0.07, ease: 'power1.inOut' });

  // Sort particles
  sortParticles();
}

gameCanvas.addEventListener('mousedown', onPointerDown);
gameCanvas.addEventListener('mousemove', onPointerMove);
gameCanvas.addEventListener('mouseup', onPointerUp);
gameCanvas.addEventListener('touchstart', onPointerDown, { passive: false });
gameCanvas.addEventListener('touchmove', onPointerMove, { passive: false });
gameCanvas.addEventListener('touchend', onPointerUp);

// ============================================
// PARTICLE SORTING
// ============================================

function sortParticles() {
  let goldFound = 0, rubyFound = 0;
  const sx = sieveCurrentX, sz = sieveCurrentZ;

  for (const p of particles) {
    if (p.caught) continue;
    const dx = p.mesh.position.x - sx;
    const dz = p.mesh.position.z - sz;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < 1.5) {
      p.caught = true;
      if (p.type === PARTICLE_TYPES.GOLD) {
        p.inSieve = true;
        goldFound++;
        goldCount++;
        score++;
        // Gold glow in sieve
        gsap.to(p.mesh.material, { emissiveIntensity: 0.8, duration: 0.3, yoyo: true, repeat: 1 });
      } else if (p.type === PARTICLE_TYPES.RUBY) {
        p.inSieve = true;
        rubyFound++;
        rubyCount++;
        score += 100;
        gsap.to(p.mesh.material, { emissiveIntensity: 1.0, duration: 0.3, yoyo: true, repeat: 3 });
      } else if (p.type === PARTICLE_TYPES.ROCK) {
        if (Math.random() < 0.7) {
          // Tumble out
          p.vx = 2 + Math.random() * 3;
          p.vz = (Math.random() - 0.5) * 2;
          p.caught = false;
          spawnEffect(p.mesh.position.x, p.mesh.position.y, p.mesh.position.z, 0x6B5B4F, 3, 1.5, 0.4);
        } else {
          p.inSieve = true;
        }
      } else if (p.type === PARTICLE_TYPES.SAND) {
        if (Math.random() < 0.95) {
          // Wash through
          gsap.to(p.mesh.material, { opacity: 0, duration: 0.3, onComplete: () => {
            p.mesh.visible = false;
            p.opacity = 0;
          }});
          spawnEffect(p.mesh.position.x, p.mesh.position.y - 0.1, p.mesh.position.z, 0xC9A96E, 5, 0.8, 0.6);
        } else {
          p.inSieve = true;
        }
      }
    }
  }

  // Visual feedback
  if (goldFound > 0 || rubyFound > 0) {
    const burstCount = goldFound > 0 ? 8 + goldFound * 4 : 0;
    if (rubyFound > 0) {
      spawnEffect(sx, 0.3, sz, 0x8B0000, 12, 2.5, 0.5);
      flash.className = 'red';
      setTimeout(() => flash.className = '', 300);
      scoreDisplay.style.textShadow = '0 0 20px rgba(139,0,0,0.8)';
      gsap.to(scoreDisplay, { scale: 1.5, duration: 0.15, yoyo: true, repeat: 1 });
    }
    if (burstCount > 0) {
      spawnEffect(sx, 0.3, sz, 0xFFD700, burstCount, 2.0, 0.4);
      flash.className = 'gold';
      setTimeout(() => flash.className = '', 400);
    }
    // Score update with roll animation
    const oldScore = parseInt(scoreDisplay.textContent);
    const newScore = score;
    gsap.to({ val: oldScore }, {
      val: newScore,
      duration: 0.3,
      onUpdate: function() { scoreDisplay.textContent = Math.round(this.targets()[0].val); }
    });
    gsap.fromTo(scoreDisplay, { scale: 1 }, { scale: 1.3, duration: 0.15, yoyo: true, repeat: 1 });
    if (rubyFound === 0) {
      scoreDisplay.style.textShadow = '0 0 20px rgba(255,215,0,0.8)';
    }
    setTimeout(() => { scoreDisplay.style.textShadow = '0 0 10px rgba(255,215,0,.3)'; }, 500);
  }
}

// ============================================
// GAME STATE MACHINE
// ============================================

function setState(newState) {
  const oldState = gameState;
  gameState = newState;

  if (newState === STATE.AMBIENT) {
    loadingScreen.classList.add('hidden');
    titleOverlay.classList.remove('hidden');
    actionBtn.textContent = 'START PANNING';
    actionBtn.classList.add('visible');
    hud.classList.remove('visible');
    timerBar.classList.remove('visible');
    scoreLabel.style.opacity = '0';
    // Camera intro animation
    gsap.to(camera.position, { x: -0.5, y: 2.5, z: 6, duration: 10, ease: 'power1.inOut' });
    gsap.to(camera, { onUpdate: () => camera.lookAt(0, 0, 0) });
  }

  if (newState === STATE.PANNING) {
    titleOverlay.classList.add('hidden');
    actionBtn.classList.remove('visible');
    hud.classList.add('visible');
    scoreLabel.style.opacity = '1';
    timerBar.classList.add('visible');
    timeRemaining = 60;
    score = 0; goldCount = 0; rubyCount = 0;
    scoreDisplay.textContent = '0';
    // Reset particles
    for (const p of particles) {
      p.caught = false; p.inSieve = false; p.mesh.visible = true;
      if (p.mesh.material.opacity !== undefined) p.mesh.material.opacity = 1;
    }
    // Reset sieve
    sieveTargetX = -3; sieveTargetZ = 0;
    gsap.to(sieveGroup.position, { x: -3, z: 0, y: 0.05, duration: 0.5 });
    lastInteractTime = performance.now();
    hintShown = false;
  }

  if (newState === STATE.RESULT) {
    isDragging = false;
    timerBar.classList.remove('visible');
    hintText.classList.remove('visible');
    // Center sieve and shake
    gsap.to(sieveGroup.position, { x: 0, z: 0, duration: 0.5, ease: 'power2.out' });
    setTimeout(() => {
      const baseRot = sieveGroup.rotation.z;
      gsap.timeline()
        .to(sieveGroup.rotation, { z: baseRot + 0.15, duration: 0.08, ease: 'power1.inOut' })
        .to(sieveGroup.rotation, { z: baseRot - 0.15, duration: 0.08, ease: 'power1.inOut' })
        .to(sieveGroup.rotation, { z: baseRot + 0.12, duration: 0.08, ease: 'power1.inOut' })
        .to(sieveGroup.rotation, { z: baseRot, duration: 0.08, ease: 'power1.inOut', onComplete: showResultScreen });
    }, 600);
    // Camera pullback
    gsap.to(camera.position, { z: 9, duration: 2, ease: 'power2.out' });
  }
}

function showResultScreen() {
  resultScreen.classList.add('visible');
  resultItems.innerHTML = '';
  bonusBadges.innerHTML = '';

  const timeBonus = Math.floor(timeRemaining * 2);
  let total = score + timeBonus;
  let multiplier = 1;
  const badges = [];

  if (goldCount >= 10) { multiplier += 0.5; badges.push('GOLD RUSH'); }
  else if (goldCount >= 5) { multiplier += 0.2; badges.push('PROSPECTOR'); }
  if (rubyCount > 0) { total += 100 * rubyCount; badges.push('LUCKY STRIKE'); }

  total = Math.floor(total * multiplier);

  const items = [
    { label: 'Gold Nuggets', value: goldCount, icon: '' },
    { label: 'Rubies', value: rubyCount, hidden: rubyCount === 0 },
    { label: 'Time Bonus', value: timeBonus },
    { label: 'TOTAL', value: total, isTotal: true }
  ];

  items.forEach((item, i) => {
    if (item.hidden) return;
    const el = document.createElement('div');
    el.className = 'result-item' + (item.isTotal ? ' result-total' : '');
    el.textContent = `${item.label}: ${item.value}`;
    resultItems.appendChild(el);
    setTimeout(() => el.classList.add('show'), 400 + i * 200);
  });

  badges.forEach((badge, i) => {
    const el = document.createElement('span');
    el.className = 'bonus-badge';
    el.textContent = badge;
    bonusBadges.appendChild(el);
    setTimeout(() => el.classList.add('show'), 1200 + i * 300);
  });

  setTimeout(() => {
    actionBtnResult.style.opacity = '1';
  }, 2000);
}

actionBtn.addEventListener('click', () => setState(STATE.PANNING));
actionBtnResult.addEventListener('click', () => {
  resultScreen.classList.remove('visible');
  resultItems.innerHTML = '';
  bonusBadges.innerHTML = '';
  actionBtnResult.style.opacity = '0';
  setState(STATE.PANNING);
});

// ============================================
// MAIN GAME LOOP
// ============================================

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const time = clock.getElapsedTime();

  // Update water shader
  waterUniforms.uTime.value = time;
  waterUniforms.uSievePos.value.set(sieveCurrentX, sieveCurrentZ);

  // Sieve bobbing
  if (!isDragging && gameState !== STATE.RESULT) {
    sieveGroup.position.y = 0.05 + Math.sin(time * 1.5) * 0.03;
  }

  // Smooth sieve movement (80% responsiveness = water resistance)
  sieveCurrentX += (sieveTargetX - sieveCurrentX) * 4 * dt;
  sieveCurrentZ += (sieveTargetZ - sieveCurrentZ) * 4 * dt;
  sieveGroup.position.x = sieveCurrentX;
  sieveGroup.position.z = sieveCurrentZ;

  // Sieve tilt toward movement
  if (isDragging) {
    const tiltX = (sieveTargetZ - sieveCurrentZ) * 2;
    const tiltZ = -(sieveTargetX - sieveCurrentX) * 2;
    sieveGroup.rotation.x = Math.max(-0.15, Math.min(0.15, tiltX));
    sieveGroup.rotation.z = Math.max(-0.15, Math.min(0.15, tiltZ));
  } else {
    sieveGroup.rotation.x *= 0.9;
    sieveGroup.rotation.z *= 0.9;
  }

  // Update stream particles
  const spawnRate = gameState === STATE.PANNING ? 15 : 8;
  const maxActive = gameState === STATE.PANNING ? 80 : 50;
  let activeCount = 0;

  for (const p of particles) {
    if (!p.mesh.visible) continue;
    activeCount++;
    p.life += dt;

    if (p.inSieve) {
      // Stay in sieve, sink toward center
      const sx = sieveCurrentX, sz = sieveCurrentZ;
      p.mesh.position.x += (sx - p.mesh.position.x) * 3 * dt;
      p.mesh.position.z += (sz - p.mesh.position.z) * 3 * dt;
      p.mesh.position.y += (0.1 - p.mesh.position.y) * 3 * dt;
      p.mesh.rotation.y += p.rotSpeed * dt;
      continue;
    }

    if (p.caught) {
      // Was caught but not kept (e.g., rock tumbling out)
      p.mesh.position.x += p.vx * dt;
      p.mesh.position.z += p.vz * dt;
      p.mesh.rotation.x += p.rotSpeed * dt;
      p.mesh.rotation.z += p.rotSpeed * dt * 0.7;
      if (p.mesh.position.x > 7) { p.mesh.visible = false; p.opacity = 0; }
      continue;
    }

    // Normal flow
    p.mesh.position.x += p.vx * dt;
    const sineOffset = Math.sin(p.life * p.freq + p.phase) * p.amp;
    p.mesh.position.y = -0.4 + sineOffset * 0.5 + Math.sin(p.life * 2 + p.phase) * 0.05;
    // Brownian jitter
    p.mesh.position.z += (Math.random() - 0.5) * 0.3 * dt;
    p.mesh.position.z = Math.max(-1.4, Math.min(1.4, p.mesh.position.z));
    // Rotation
    p.mesh.rotation.y += p.rotSpeed * dt;
    if (p.type === PARTICLE_TYPES.ROCK) {
      p.mesh.rotation.x += p.rotSpeed * 0.5 * dt;
    }
    // Ruby pulse
    if (p.type === PARTICLE_TYPES.RUBY) {
      p.mesh.material.emissiveIntensity = 0.2 + Math.sin(time * 3) * 0.3;
    }

    // Respawn if off-screen
    if (p.mesh.position.x > 7) {
      p.mesh.position.x = -6 - Math.random() * 3;
      p.mesh.position.z = -1.2 + Math.random() * 2.4;
      p.life = 0;
      p.caught = false;
      p.inSieve = false;
      p.mesh.visible = true;
      p.mesh.material.opacity = 1;
    }
  }

  // Spawn new particles
  if (activeCount < maxActive && Math.random() < spawnRate * dt) {
    // Reuse invisible particles first
    const dead = particles.find(p => !p.mesh.visible || p.opacity <= 0);
    if (dead) {
      dead.mesh.position.x = -6 - Math.random() * 3;
      dead.mesh.position.z = -1.2 + Math.random() * 2.4;
      dead.mesh.visible = true;
      dead.opacity = 1;
      dead.material.opacity = 1;
      dead.life = 0;
      dead.caught = false;
      dead.inSieve = false;
    } else if (particles.length < MAX_PARTICLES) {
      spawnParticle();
    }
  }

  // Wake particles during drag
  if (isDragging && Math.random() < 0.4) {
    spawnEffect(sieveCurrentX - 0.3, 0.1, sieveCurrentZ, 0xF5E6C8, 1, 0.5, 0.5);
  }

  // Update effects
  for (let i = effects.length - 1; i >= 0; i--) {
    const e = effects[i];
    e.mesh.position.x += e.vx * dt;
    e.mesh.position.y += e.vy * dt;
    e.mesh.position.z += e.vz * dt;
    e.mesh.rotation.z += e.rotSpeed * dt;
    e.life -= dt;
    e.mesh.material.opacity = Math.max(0, e.life / e.maxLife * 0.8);
    if (e.life <= 0) {
      scene.remove(e.mesh);
      e.mesh.geometry.dispose();
      e.mesh.material.dispose();
      effects.splice(i, 1);
    }
  }

  // Timer
  if (gameState === STATE.PANNING) {
    timeRemaining -= dt;
    if (timeRemaining <= 0) {
      timeRemaining = 0;
      setState(STATE.RESULT);
    }
    const pct = (timeRemaining / 60) * 100;
    timerFill.style.width = pct + '%';
    if (timeRemaining <= 10) {
      timerBar.classList.add('pulse');
    } else {
      timerBar.classList.remove('pulse');
    }

    // Hint after 15s of no interaction
    if (!hintShown && performance.now() - lastInteractTime > 15000) {
      hintText.classList.add('visible');
      hintShown = true;
    }
    if (hintShown && performance.now() - lastInteractTime < 1000) {
      hintText.classList.remove('visible');
    }
  }

  // Camera follow during panning
  if (gameState === STATE.PANNING) {
    const camTargetX = sieveCurrentX * 0.3 - 0.5;
    camera.position.x += (camTargetX - camera.position.x) * 2 * dt;
    camera.position.y = 2.5 + Math.sin(time * 0.8) * 0.1;
    camera.lookAt(sieveCurrentX * 0.2, 0, sieveCurrentZ * 0.1);
  }

  // Dust overlay
  updateDust();

  renderer.render(scene, camera);
}

// ============================================
// LOADING & INIT
// ============================================

const assetsToLoad = [
  './assets/canyon-silhouette.png',
  './assets/sieve-wood.jpg',
  './assets/water-normal.jpg',
  './assets/pan-sand.jpg',
  './assets/nugget-gold.png',
  './assets/nugget-rock.png',
  './assets/dust-mote.png'
];

let loadedCount = 0;
function checkLoad() {
  loadedCount++;
  const pct = (loadedCount / assetsToLoad.length) * 100;
  loadingFill.style.width = pct + '%';
  if (loadedCount >= assetsToLoad.length) {
    setTimeout(() => setState(STATE.AMBIENT), 500);
  }
}

assetsToLoad.forEach(src => {
  const img = new Image();
  img.onload = checkLoad;
  img.onerror = checkLoad;
  img.src = src;
});

// Fallback: if no assets load within 3s, proceed anyway
setTimeout(() => {
  if (gameState === STATE.LOADING) {
    setState(STATE.AMBIENT);
  }
}, 3000);

// Window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  resizeDust();
});

// Start
animate();
</script>
</body>
</html>
