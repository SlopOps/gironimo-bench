<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Guardian - Superhero Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: other;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial Black', 'Impact', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 414px;
            aspect-ratio: 9/16;
            background: linear-gradient(180deg, #0a0a2a 0%, #1a1a3a 100%);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 100, 255, 0.3);
            border-radius: 20px;
            border: 3px solid #0ff;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .ui-element {
            position: absolute;
            pointer-events: auto;
            background: rgba(0, 20, 40, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 10px 15px;
            box-shadow: 0 4px 15px rgba(0, 100, 255, 0.4);
            border: 1px solid rgba(0, 255, 255, 0.3);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        #score-display {
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #0ff;
            text-align: center;
            min-width: 100px;
        }

        #high-score-display {
            top: 20px;
            right: 20px;
            font-size: 18px;
            color: #f0f;
            text-align: center;
            min-width: 100px;
        }

        #health-bar {
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #0f0;
        }

        #health-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #0f0, #0f0 70%, #ff0 70%, #ff0 100%);
            transition: width 0.3s ease;
        }

        #power-up-indicator {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: #ff0;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }

        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 30, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
            transition: opacity 0.5s;
        }

        #start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .title {
            font-size: 42px;
            color: #0ff;
            text-shadow: 4px 4px 0 #f0f, 8px 8px 20px #0ff;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 18px;
            color: #fff;
            margin-bottom: 50px;
            text-align: center;
            line-height: 1.4;
        }

        #start-button {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(90deg, #0ff, #f0f);
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 255, 255, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            pointer-events: auto;
        }

        #start-button:active {
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(0, 255, 255, 0.3);
        }

        #tutorial {
            margin-top: 30px;
            font-size: 16px;
            color: #0f0;
            text-align: center;
            line-height: 1.5;
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 0, 10, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        #game-over-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over-title {
            font-size: 42px;
            color: #f00;
            text-shadow: 4px 4px 0 #ff0, 8px 8px 20px #f00;
            margin-bottom: 30px;
            text-align: center;
        }

        .final-score {
            font-size: 28px;
            color: #0ff;
            margin-bottom: 20px;
        }

        #restart-button {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(90deg, #f00, #ff0);
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 0, 0, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            pointer-events: auto;
        }

        #restart-button:active {
            transform: scale(0.95);
            box-shadow: 0 4px 10px rgba(255, 0, 0, 0.3);
        }

        #three-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #particle-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .tap-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            animation: pulse 1.5s infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        .power-up-icon {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            z-index: 5;
            pointer-events: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px currentColor;
        }

        .power-up-icon::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid currentColor;
            opacity: 0.5;
            animation: expand 1.5s infinite;
        }

        @keyframes expand {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .obstacle {
            position: absolute;
            border-radius: 10px;
            background: linear-gradient(135deg, #500, #a00);
            box-shadow: 0 0 20px rgba(200, 0, 0, 0.7);
            z-index: 3;
            pointer-events: none;
        }

        .collectible {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, #ff0, #f80);
            box-shadow: 0 0 20px rgba(255, 200, 0, 0.8);
            z-index: 4;
            pointer-events: none;
            animation: float 2s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .city-building {
            position: absolute;
            bottom: 0;
            background: linear-gradient(180deg, #222, #444);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            z-index: 2;
        }

        .city-building::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            background: repeating-linear-gradient(90deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 20px);
        }

        .hero-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at heroPosition.x heroPosition.y, rgba(0, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            opacity: 0;
        }

        .shockwave {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #0ff;
            transform: translate(-50%, -50%);
            z-index: 6;
            pointer-events: none;
            animation: shockwave 0.5s ease-out;
        }

        @keyframes shockwave {
            0% { width: 50px; height: 50px; opacity: 1; }
            100% { width: 300px; height: 300px; opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="three-container"></div>
        <div id="particle-container"></div>
        <div id="ui-layer">
            <div id="score-display">SCORE: 0</div>
            <div id="high-score-display">HI: 0</div>
            <div id="health-bar">
                <div id="health-fill"></div>
            </div>
            <div id="power-up-indicator">POWER MODE!</div>
        </div>
        
        <div id="start-screen">
            <div class="title">NEON GUARDIAN</div>
            <div class="subtitle">The city needs a hero! Fly through the neon skyline, dodge obstacles, and collect power orbs. Tap and hold to fly upward, release to descend.</div>
            <div id="tutorial">TAP & HOLD TO FLY UP</div>
            <button id="start-button">START GAME</button>
        </div>
        
        <div id="game-over-screen">
            <div class="game-over-title">MISSION FAILED</div>
            <div class="final-score">SCORE: <span id="final-score">0</span></div>
            <button id="restart-button">TRY AGAIN</button>
        </div>
    </div>

    <script>
        // Game state
        const state = {
            isPlaying: false,
            isGameOver: false,
            score: 0,
            highScore: localStorage.getItem('neonGuardianHighScore') || 0,
            health: 100,
            powerMode: false,
            powerModeTimer: 0,
            heroY: 0.5, // 0-1 normalized position
            heroVelocity: 0,
            heroAcceleration: -0.0015, // Upward acceleration when tapping
            gravity: 0.001,
            obstacles: [],
            collectibles: [],
            particles: [],
            shockwave: null,
            gameSpeed: 0.0005,
            lastTime: 0
        };

        // DOM elements
        const gameContainer = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score-display');
        const highScoreDisplay = document.getElementById('high-score-display');
        const healthFill = document.getElementById('health-fill');
        const powerUpIndicator = document.getElementById('power-up-indicator');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');
        const startButton = document.getElementById('start-button');
        const restartButton = document.getElementById('restart-button');

        // Three.js setup
        let scene, camera, renderer, cityGroup, heroMesh, heroTrail;
        let cityBuildings = [];
        let starsParticleSystem;

        function initThreeJS() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x0a0a2a, 10, 60);

            camera = new THREE.PerspectiveCamera(60, gameContainer.clientWidth / gameContainer.clientHeight, 0.1, 100);
            camera.position.set(0, 5, 15);
            camera.lookAt(0, 5, 0);

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(gameContainer.clientWidth, gameContainer.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('three-container').appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 5);
            scene.add(directionalLight);

            // Create city
            createCity();

            // Create hero
            createHero();

            // Create starfield
            createStarfield();

            // Handle resize
            window.addEventListener('resize', onWindowResize);
        }

        function createCity() {
            cityGroup = new THREE.Group();
            scene.add(cityGroup);

            // Create procedural buildings
            const buildingGeo = new THREE.BoxGeometry(1, 1, 1);
            const buildingMat = new THREE.MeshPhongMaterial({ 
                color: 0x1a1a3a,
                flatShading: true
            });

            for (let i = 0; i < 40; i++) {
                const building = new THREE.Mesh(buildingGeo, buildingMat);
                
                // Random width, depth, height
                const width = 1 + Math.random() * 2;
                const depth = 1 + Math.random() * 2;
                const height = 5 + Math.random() * 15;
                
                building.scale.set(width, height, depth);
                building.position.x = (i - 20) * 3.5;
                building.position.z = -10;
                building.position.y = height / 2;
                
                // Add windows
                const windowGeo = new THREE.PlaneGeometry(0.8, 0.8);
                const windowMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
                
                // Random windows on building
                const numWindows = Math.floor(Math.random() * 5) + 2;
                for (let j = 0; j < numWindows; j++) {
                    const window = new THREE.Mesh(windowGeo, windowMat);
                    const wx = (Math.random() - 0.5) * (width - 0.8);
                    const wy = (Math.random() - 0.5) * (height - 0.8);
                    window.position.set(wx, wy, depth / 2 + 0.01);
                    building.add(window);
                }

                cityGroup.add(building);
                cityBuildings.push(building);
            }
        }

        function createHero() {
            // Create superhero shape
            const heroGroup = new THREE.Group();

            // Main body
            const bodyGeo = new THREE.CapsuleGeometry(0.3, 1, 4, 8);
            const bodyMat = new THREE.MeshPhongMaterial({ 
                color: 0x0000ff,
                emissive: 0x0000aa,
                shininess: 100
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.rotation.z = Math.PI / 2;
            heroGroup.add(body);

            // Cape
            const capeGeo = new THREE.ConeGeometry(0.5, 1.5, 8, 1, true);
            const capeMat = new THREE.MeshPhongMaterial({ 
                color: 0xff0000,
                emissive: 0xaa0000,
                side: THREE.DoubleSide,
                shininess: 50
            });
            const cape = new THREE.Mesh(capeGeo, capeMat);
            cape.rotation.x = Math.PI / 2;
            cape.rotation.z = Math.PI / 2;
            cape.position.x = 0.4;
            cape.position.y = 0.2;
            heroGroup.add(cape);

            // Symbol
            const symbolGeo = new THREE.BoxGeometry(0.4, 0.5, 0.1);
            const symbolMat = new THREE.MeshPhongMaterial({ color: 0xffff00 });
            const symbol = new THREE.Mesh(symbolGeo, symbolMat);
            symbol.position.x = 0;
            symbol.position.y = 0.2;
            heroGroup.add(symbol);

            // Eyes
            const eyeGeo = new THREE.SphereGeometry(0.05, 8, 8);
            const eyeMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
            const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
            leftEye.position.set(0.2, 0.3, 0.31);
            heroGroup.add(leftEye);
            
            const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
            rightEye.position.set(-0.2, 0.3, 0.31);
            heroGroup.add(rightEye);

            heroGroup.position.set(0, 5, 0);
            scene.add(heroGroup);
            heroMesh = heroGroup;

            // Create trail effect
            const trailGeo = new THREE.ConeGeometry(0.1, 1, 8, 1, true);
            const trailMat = new THREE.MeshBasicMaterial({ 
                color: 0x00ffff,
                transparent: true,
                opacity: 0.6
            });
            heroTrail = new THREE.Mesh(trailGeo, trailMat);
            heroTrail.rotation.x = Math.PI / 2;
            heroTrail.position.z = -0.5;
            heroGroup.add(heroTrail);
        }

        function createStarfield() {
            const starGeo = new THREE.BufferGeometry();
            const starCount = 500;
            const positions = new Float32Array(starCount * 3);
            
            for (let i = 0; i < starCount * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 100;
            }
            
            starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const starMat = new THREE.PointsMaterial({ 
                color: 0xffffff,
                size: 0.1,
                transparent: true,
                opacity: 0.8
            });
            
            starsParticleSystem = new THREE.Points(starGeo, starMat);
            scene.add(starsParticleSystem);
        }

        function onWindowResize() {
            camera.aspect = gameContainer.clientWidth / gameContainer.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(gameContainer.clientWidth, gameContainer.clientHeight);
        }

        // Game logic
        function startGame() {
            state.score = 0;
            state.health = 100;
            state.powerMode = false;
            state.powerModeTimer = 0;
            state.heroY = 0.5;
            state.heroVelocity = 0;
            state.gameSpeed = 0.0005;
            state.obstacles = [];
            state.collectibles = [];
            state.particles = [];
            state.isGameOver = false;
            state.isPlaying = true;
            
            startScreen.classList.add('hidden');
            gameOverScreen.classList.remove('visible');
            
            updateUI();
            
            // Clear DOM obstacles
            document.querySelectorAll('.obstacle, .collectible, .power-up-icon, .shockwave').forEach(el => el.remove());
            
            // Reset Three.js city position
            cityGroup.position.x = 0;
            
            state.lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            state.isGameOver = true;
            state.isPlaying = false;
            
            if (state.score > state.highScore) {
                state.highScore = state.score;
                localStorage.setItem('neonGuardianHighScore', state.highScore);
            }
            
            finalScoreDisplay.textContent = state.score;
            gameOverScreen.classList.add('visible');
        }

        function updateUI() {
            scoreDisplay.textContent = `SCORE: ${state.score}`;
            highScoreDisplay.textContent = `HI: ${state.highScore}`;
            healthFill.style.width = `${state.health}%`;
            
            if (state.powerMode) {
                powerUpIndicator.style.opacity = '1';
            } else {
                powerUpIndicator.style.opacity = '0';
            }
        }

        function createObstacle() {
            const width = 1 + Math.random() * 1.5;
            const height = 0.5 + Math.random() * 1;
            const x = Math.random() * (gameContainer.clientWidth - width);
            
            const obstacle = document.createElement('div');
            obstacle.className = 'obstacle';
            obstacle.style.width = `${width}px`;
            obstacle.style.height = `${height}px`;
            obstacle.style.left = `${x}px`;
            obstacle.style.top = `${-height}px`;
            obstacle.style.backgroundColor = state.powerMode ? '#ff0' : '#500';
            
            gameContainer.appendChild(obstacle);
            
            state.obstacles.push({
                element: obstacle,
                x: x,
                y: -height,
                width: width,
                height: height,
                active: true
            });
        }

        function createCollectible() {
            const size = 20 + Math.random() * 15;
            const x = Math.random() * (gameContainer.clientWidth - size);
            
            const collectible = document.createElement('div');
            collectible.className = 'collectible';
            collectible.style.width = `${size}px`;
            collectible.style.height = `${size}px`;
            collectible.style.left = `${x}px`;
            collectible.style.top = `${-size}px`;
            
            gameContainer.appendChild(collectible);
            
            state.collectibles.push({
                element: collectible,
                x: x,
                y: -size,
                size: size,
                active: true
            });
        }

        function createPowerUp() {
            const size = 30;
            const x = Math.random() * (gameContainer.clientWidth - size);
            
            const powerUp = document.createElement('div');
            powerUp.className = 'power-up-icon';
            powerUp.style.width = `${size}px`;
            powerUp.style.height = `${size}px`;
            powerUp.style.left = `${x}px`;
            powerUp.style.top = `${-size}px`;
            powerUp.style.color = '#ff0';
            powerUp.textContent = 'P';
            
            gameContainer.appendChild(powerUp);
            
            state.collectibles.push({
                element: powerUp,
                x: x,
                y: -size,
                size: size,
                active: true,
                isPowerUp: true
            });
        }

        function createExplosion(x, y) {
            const particleCount = 20;
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'absolute';
                particle.style.width = '6px';
                particle.style.height = '6px';
                particle.style.borderRadius = '50%';
                particle.style.backgroundColor = state.powerMode ? '#ff0' : '#f00';
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                particle.style.zIndex = '5';
                gameContainer.appendChild(particle);
                
                const angle = (Math.PI * 2 * i) / particleCount;
                const speed = 2 + Math.random() * 3;
                
                state.particles.push({
                    element: particle,
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1.0,
                    active: true
                });
            }
        }

        function createShockwave() {
            if (state.shockwave) return;
            
            const shockwave = document.createElement('div');
            shockwave.className = 'shockwave';
            shockwave.style.left = `${gameContainer.clientWidth / 2}px`;
            shockwave.style.top = `${state.heroY * gameContainer.clientHeight}px`;
            gameContainer.appendChild(shockwave);
            
            state.shockwave = {
                element: shockwave,
                active: true
            };
            
            setTimeout(() => {
                if (state.shockwave && state.shockwave.element) {
                    state.shockwave.element.remove();
                    state.shockwave = null;
                }
            }, 500);
        }

        function spawnManager() {
            // Spawn obstacles
            if (Math.random() < 0.03) {
                createObstacle();
            }
            
            // Spawn collectibles
            if (Math.random() < 0.015) {
                if (Math.random() < 0.2) {
                    createPowerUp();
                } else {
                    createCollectible();
                }
            }
        }

        function updateGameObjects(deltaTime) {
            const containerHeight = gameContainer.clientHeight;
            const containerWidth = gameContainer.clientWidth;
            
            // Update hero position
            if (state.isPlaying && !state.isGameOver) {
                // Apply input
                if (isTouching) {
                    state.heroVelocity += state.heroAcceleration;
                }
                
                // Apply gravity
                state.heroVelocity -= state.gravity;
                
                // Update Y position (0-1)
                state.heroY += state.heroVelocity;
                state.heroY = Math.max(0, Math.min(1, state.heroY));
                
                // Update hero visual
                if (heroMesh) {
                    heroMesh.position.y = state.heroY * 10 + 2;
                    
                    // Rotate based on velocity
                    heroMesh.rotation.z = state.heroVelocity * 2;
                    
                    // Update trail
                    if (heroTrail) {
                        heroTrail.position.y = heroMesh.position.y - 1;
                        heroTrail.scale.setScalar(1 + Math.abs(state.heroVelocity) * 2);
                    }
                }
                
                // Create hero glow effect
                if (heroGlow) {
                    heroGlow.style.opacity = state.powerMode ? 0.3 : 0.1;
                }
            }
            
            // Update obstacles
            for (let i = state.obstacles.length - 1; i >= 0; i--) {
                const obj = state.obstacles[i];
                obj.y += state.gameSpeed * containerHeight;
                obj.element.style.top = `${obj.y}px`;
                
                // Remove if off screen
                if (obj.y > containerHeight) {
                    obj.element.remove();
                    state.obstacles.splice(i, 1);
                    continue;
                }
                
                // Check collision with hero
                if (state.isPlaying && !state.isGameOver && obj.active) {
                    const heroTop = state.heroY * containerHeight;
                    const heroBottom = heroTop + 40; // Approximate hero height
                    const heroLeft = containerWidth / 2 - 15;
                    const heroRight = heroLeft + 30;
                    
                    if (obj.y + obj.height > heroTop && 
                        obj.y < heroBottom && 
                        obj.x + obj.width > heroLeft && 
                        obj.x < heroRight) {
                        
                        if (state.powerMode) {
                            // Destroy obstacle
                            createExplosion(obj.x + obj.width/2, obj.y + obj.height/2);
                            obj.element.remove();
                            state.obstacles.splice(i, 1);
                            state.score += 10;
                        } else {
                            // Take damage
                            state.health -= 20;
                            createExplosion(heroLeft + 15, heroTop + 20);
                            
                            if (state.health <= 0) {
                                gameOver();
                            }
                            
                            // Temporarily invincible after hit
                            obj.active = false;
                            obj.element.style.opacity = '0.3';
                        }
                        
                        updateUI();
                    }
                }
            }
            
            // Update collectibles
            for (let i = state.collectibles.length - 1; i >= 0; i--) {
                const obj = state.collectibles[i];
                obj.y += state.gameSpeed * containerHeight;
                obj.element.style.top = `${obj.y}px`;
                
                // Remove if off screen
                if (obj.y > containerHeight) {
                    obj.element.remove();
                    state.collectibles.splice(i, 1);
                    continue;
                }
                
                // Check collision with hero
                if (state.isPlaying && !state.isGameOver && obj.active) {
                    const heroTop = state.heroY * containerHeight;
                    const heroBottom = heroTop + 40;
                    const heroLeft = containerWidth / 2 - 15;
                    const heroRight = heroLeft + 30;
                    
                    if (obj.y + obj.size > heroTop && 
                        obj.y < heroBottom && 
                        obj.x + obj.size > heroLeft && 
                        obj.x < heroRight) {
                        
                        if (obj.isPowerUp) {
                            // Activate power mode
                            state.powerMode = true;
                            state.powerModeTimer = 500; // 5 seconds at 60fps
                            createShockwave();
                        } else {
                            // Collect points
                            state.score += 5;
                        }
                        
                        obj.element.remove();
                        state.collectibles.splice(i, 1);
                        updateUI();
                    }
                }
            }
            
            // Update particles
            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                p.element.style.left = `${p.x}px`;
                p.element.style.top = `${p.y}px`;
                p.element.style.opacity = p.life;
                
                if (p.life <= 0) {
                    p.element.remove();
                    state.particles.splice(i, 1);
                }
            }
            
            // Update power mode timer
            if (state.powerMode) {
                state.powerModeTimer--;
                if (state.powerModeTimer <= 0) {
                    state.powerMode = false;
                }
            }
            
            // Update game speed based on score
            if (state.isPlaying && !state.isGameOver) {
                state.gameSpeed = 0.0005 + (state.score / 5000) * 0.0003;
            }
        }

        function updateThreeJS(deltaTime) {
            // Move city towards camera
            cityGroup.position.z += state.gameSpeed * 20;
            if (cityGroup.position.z > 10) {
                cityGroup.position.z = -50;
            }
            
            // Rotate stars slowly
            if (starsParticleSystem) {
                starsParticleSystem.rotation.y += 0.0001;
            }
            
            // Animate hero trail
            if (heroTrail) {
                heroTrail.rotation.x = Math.PI / 2 + Math.sin(Date.now() * 0.01) * 0.1;
            }
        }

        function gameLoop(currentTime) {
            if (!state.isPlaying) return;
            
            const deltaTime = (currentTime - state.lastTime) / 16.67; // Normalize to 60fps
            state.lastTime = currentTime;
            
            spawnManager();
            updateGameObjects(deltaTime);
            updateThreeJS(deltaTime);
            
            // Update score continuously
            if (state.isPlaying && !state.isGameOver) {
                state.score += Math.floor(deltaTime * 10);
                updateUI();
            }
            
            renderer.render(scene, camera);
            requestAnimationFrame(gameLoop);
        }

        // Input handling
        let isTouching = false;
        let touchStartY = 0;

        function handleTouchStart(e) {
            e.preventDefault();
            e.stopPropagation();
            isTouching = true;
            touchStartY = e.touches[0].clientY;
        }

        function handleTouchEnd(e) {
            e.preventDefault();
            e.stopPropagation();
            isTouching = false;
        }

        function handleTouchMove(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        // Initialize
        highScoreDisplay.textContent = `HI: ${state.highScore}`;
        initThreeJS();

        // Add explicit touch handlers to buttons to ensure they work
        startButton.addEventListener('touchstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            startGame();
        });

        restartButton.addEventListener('touchstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            startGame();
        });

        // Also keep click handlers for desktop
        startButton.addEventListener('click', startGame);
        restartButton.addEventListener('click', startGame);
        
        // Container touch handlers for game input
        gameContainer.addEventListener('touchstart', handleTouchStart, { passive: false });
        gameContainer.addEventListener('touchend', handleTouchEnd, { passive: false });
        gameContainer.addEventListener('touchmove', handleTouchMove, { passive: false });
        
        // Mouse fallback for testing on desktop
        gameContainer.addEventListener('mousedown', () => isTouching = true);
        gameContainer.addEventListener('mouseup', () => isTouching = false);
        gameContainer.addEventListener('mousemove', () => isTouching = false);

        // Initial render
        renderer.render(scene, camera);
    </script>
</body>
</html>
