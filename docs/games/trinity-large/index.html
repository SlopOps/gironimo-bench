<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Farm Catch - Harvest Time!</title>
    <style>
        :root {
            --sky-blue: #87CEEB;
            --grass-green: #7CFC00;
            --dirt-brown: #8B4513;
            --cloud-white: #FFFFFF;
            --sun-yellow: #FFD700;
            --apple-red: #FF4444;
            --egg-white: #FFFAF0;
            --milk-white: #F5F5DC;
            --rotten-purple: #8A2BE2;
            --rock-gray: #696969;
            --basket-color: #FFA500;
            --ui-text: #2E8B57;
        }

        * {
            box-sizing: border-box;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--sky-blue);
            font-family: 'Comic Sans MS', 'Marker Felt', cursive, sans-serif;
            user-select: none;
        }

        /* Game container with fixed 9:16 aspect ratio */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 640px; /* Mobile max width */
            max-height: 1136px; /* 9:16 ratio */
            margin: 0 auto;
            overflow: hidden;
            background: linear-gradient(to bottom, 
                var(--sky-blue) 0%, 
                var(--sky-blue) 60%, 
                var(--grass-green) 60%, 
                var(--grass-green) 85%, 
                var(--dirt-brown) 85%, 
                var(--dirt-brown) 100%);
        }

        /* Three.js background canvas */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Main game canvas */
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* UI overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        /* Score display */
        #score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 32px;
            font-weight: bold;
            color: var(--ui-text);
            text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
            pointer-events: auto;
        }

        /* Timer display */
        #timer-display {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 32px;
            font-weight: bold;
            color: var(--ui-text);
            text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
            pointer-events: auto;
        }

        /* Instructions overlay */
        #instructions {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            pointer-events: auto;
            max-width: 80%;
            z-index: 100;
        }

        #instructions h1 {
            color: var(--ui-text);
            margin-top: 0;
            font-size: 36px;
        }

        #instructions p {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }

        #instructions .btn {
            background: var(--ui-text);
            color: white;
            padding: 18px 45px;
            font-size: 26px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
            min-width: 200px;
        }

        #instructions .btn:active {
            transform: scale(0.95);
            box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        /* Game over overlay */
        #game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: auto;
        }

        #game-over h2 {
            color: var(--ui-text);
            font-size: 48px;
            margin-bottom: 30px;
        }

        #game-over .final-score {
            font-size: 36px;
            color: white;
            margin-bottom: 40px;
        }

        /* Particle container */
        #particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* Touch indicator */
        #touch-indicator {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: var(--ui-text);
            opacity: 0.7;
            animation: pulse 2s infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.3; }
        }

        /* Responsive check */
        @media (max-width: 640px) {
            #game-container {
                width: 100vw;
                height: calc(100vw * 9 / 16);
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Three.js Background -->
        <canvas id="bg-canvas"></canvas>
        
        <!-- Main Game Canvas -->
        <canvas id="game-canvas"></canvas>
        
        <!-- Particle System -->
        <div id="particles"></div>
        
        <!-- UI Layer -->
        <div id="ui-layer">
            <div id="score-display">0</div>
            <div id="timer-display">60</div>
            <div id="touch-indicator">Drag to move basket</div>
        </div>
        
        <!-- Start Screen -->
        <div id="instructions">
            <h1>Farm Catch</h1>
            <p>Harvest the falling goodies!</p>
            <p>Catch apples, eggs & milk</p>
            <p>Avoid rocks & rotten food</p>
            <button class="btn" id="start-btn">Start Farming</button>
        </div>
        
        <!-- Game Over Screen -->
        <div id="game-over">
            <h2>Time's Up!</h2>
            <div class="final-score">Score: <span id="final-score">0</span></div>
            <button class="btn" id="restart-btn">Farm Again</button>
        </div>
    </div>

    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // ============================================
        // GAME CONFIGURATION
        // ============================================
        const CONFIG = {
            GAME_DURATION: 60, // seconds
            BASE_FALL_SPEED: 3,
            SPEED_INCREMENT: 0.005, // speed increases over time
            SPAWN_RATE: 0.05, // probability per frame
            MAX_MISSES: 10,
            BASKET_WIDTH: 100,
            BASKET_HEIGHT: 60,
            COLLECTIBLES: [
                { type: 'apple', color: '#FF4444', points: 10, weight: 0.4 },
                { type: 'egg', color: '#FFFAF0', points: 15, weight: 0.3 },
                { type: 'milk', color: '#F5F5DC', points: 20, weight: 0.2 },
                { type: 'golden', color: '#FFD700', points: 50, weight: 0.1 }
            ],
            OBSTACLES: [
                { type: 'rock', color: '#696969', penalty: -20, weight: 0.6 },
                { type: 'rotten', color: '#8A2BE2', penalty: -10, weight: 0.4 }
            ]
        };

        // ============================================
        // GAME STATE MANAGEMENT
        // ============================================
        class GameState {
            constructor() {
                this.score = 0;
                this.timeLeft = CONFIG.GAME_DURATION;
                this.misses = 0;
                this.gameOver = false;
                this.isRunning = false;
                this.frameCount = 0;
                this.fallSpeed = CONFIG.BASE_FALL_SPEED;
                this.collectibles = [];
                this.particles = [];
            }

            reset() {
                this.score = 0;
                this.timeLeft = CONFIG.GAME_DURATION;
                this.misses = 0;
                this.gameOver = false;
                this.isRunning = false;
                this.frameCount = 0;
                this.fallSpeed = CONFIG.BASE_FALL_SPEED;
                this.collectibles = [];
                this.particles = [];
            }

            update() {
                if (!this.isRunning || this.gameOver) return;

                this.frameCount++;
                
                // Decrease time
                if (this.frameCount % 60 === 0) {
                    this.timeLeft--;
                    if (this.timeLeft <= 0) {
                        this.gameOver = true;
                        endGame();
                    }
                }

                // Increase speed over time
                this.fallSpeed += CONFIG.SPEED_INCREMENT;

                // Spawn new items
                if (Math.random() < CONFIG.SPAWN_RATE) {
                    this.spawnItem();
                }

                // Update existing items
                for (let i = this.collectibles.length - 1; i >= 0; i--) {
                    const item = this.collectibles[i];
                    item.y += this.fallSpeed;

                    // Check if item missed the basket
                    if (item.y > gameHeight + 50) {
                        if (item.type !== 'golden') { // Golden apples are rare and shouldn't count as misses
                            this.misses++;
                            if (this.misses >= CONFIG.MAX_MISSES) {
                                this.gameOver = true;
                                endGame();
                            }
                        }
                        this.collectibles.splice(i, 1);
                    }
                }

                // Update particles
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= 0.02;
                    p.size *= 0.95;

                    if (p.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }
            }

            spawnItem() {
                // Choose between collectible or obstacle
                const isCollectible = Math.random() < 0.7; // 70% chance collectible
                
                let item;
                if (isCollectible) {
                    // Weighted random selection
                    const rand = Math.random();
                    let cumulative = 0;
                    for (const col of CONFIG.COLLECTIBLES) {
                        cumulative += col.weight;
                        if (rand < cumulative) {
                            item = {
                                type: col.type,
                                color: col.color,
                                points: col.points,
                                x: Math.random() * (gameWidth - 40) + 20,
                                y: -30,
                                width: 30,
                                height: 30,
                                collected: false
                            };
                            break;
                        }
                    }
                } else {
                    // Obstacle
                    const rand = Math.random();
                    let cumulative = 0;
                    for (const obs of CONFIG.OBSTACLES) {
                        cumulative += obs.weight;
                        if (rand < cumulative) {
                            item = {
                                type: obs.type,
                                color: obs.color,
                                penalty: obs.penalty,
                                x: Math.random() * (gameWidth - 40) + 20,
                                y: -30,
                                width: 30,
                                height: 30,
                                collected: false
                            };
                            break;
                        }
                    }
                }

                if (item) {
                    this.collectibles.push(item);
                }
            }

            checkCollisions(basket) {
                for (const item of this.collectibles) {
                    if (!item.collected && 
                        item.x < basket.x + basket.width &&
                        item.x + item.width > basket.x &&
                        item.y < basket.y + basket.height &&
                        item.y + item.height > basket.y) {
                        
                        // Collision detected
                        item.collected = true;
                        
                        if (item.points) {
                            // Good item
                            this.score += item.points;
                            createParticles(item.x + item.width/2, item.y + item.height/2, item.color);
                        } else if (item.penalty) {
                            // Bad item
                            this.score += item.penalty; // Penalty is negative
                            createParticles(item.x + item.width/2, item.y + item.height/2, item.color, 10);
                            this.misses++; // Extra miss for obstacle
                            if (this.misses >= CONFIG.MAX_MISSES) {
                                this.gameOver = true;
                                endGame();
                            }
                        }
                        
                        // Remove item
                        const index = this.collectibles.indexOf(item);
                        if (index > -1) {
                            this.collectibles.splice(index, 1);
                        }
                    }
                }
            }
        }

        // ============================================
        // BASKET CLASS
        // ============================================
        class Basket {
            constructor() {
                this.width = CONFIG.BASKET_WIDTH;
                this.height = CONFIG.BASKET_HEIGHT;
                this.x = gameWidth / 2 - this.width / 2;
                this.y = gameHeight - 150;
                this.color = 'var(--basket-color)';
                this.targetX = this.x; // For smooth movement
            }

            update(touchX) {
                // Smooth follow with easing
                const dx = touchX - this.x - this.width/2;
                this.x += dx * 0.2;
                
                // Keep within bounds
                if (this.x < 0) this.x = 0;
                if (this.x > gameWidth - this.width) this.x = gameWidth - this.width;
            }

            draw(ctx) {
                // Basket body
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.roundRect(this.x, this.y, this.width, this.height, 10);
                ctx.fill();
                
                // Basket texture lines
                ctx.strokeStyle = '#E67E00';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(this.x + 10, this.y + 5);
                ctx.lineTo(this.x + 10, this.y + this.height - 5);
                ctx.moveTo(this.x + 30, this.y + 5);
                ctx.lineTo(this.x + 30, this.y + this.height - 5);
                ctx.moveTo(this.x + 50, this.y + 5);
                ctx.lineTo(this.x + 50, this.y + this.height - 5);
                ctx.moveTo(this.x + 70, this.y + 5);
                ctx.lineTo(this.x + 70, this.y + this.height - 5);
                ctx.stroke();
                
                // Handle
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(this.x + this.width/2 - 10, this.y);
                ctx.lineTo(this.x + this.width/2 - 10, this.y - 30);
                ctx.lineTo(this.x + this.width/2 + 10, this.y - 30);
                ctx.lineTo(this.x + this.width/2 + 10, this.y);
                ctx.stroke();
                
                // Handle arc
                ctx.beginPath();
                ctx.arc(this.x + this.width/2, this.y - 30, 15, 0, Math.PI * 2);
                ctx.fillStyle = '#8B4513';
                ctx.fill();
            }
        }

        // ============================================
        // THREE.JS BACKGROUND SCENE
        // ============================================
        class FarmBackground {
            constructor() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, gameWidth / gameHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ 
                    canvas: document.getElementById('bg-canvas'),
                    alpha: true 
                });
                this.renderer.setSize(gameWidth, gameHeight);
                this.renderer.setClearColor(0x87CEEB, 0); // Transparent
                
                this.objects = [];
                this.init();
            }

            init() {
                // Add sun
                const sunGeometry = new THREE.CircleGeometry(30, 32);
                const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xFFD700 });
                const sun = new THREE.Mesh(sunGeometry, sunMaterial);
                sun.position.set(gameWidth * 0.8, gameHeight * 0.2, 10);
                this.scene.add(sun);
                this.objects.push({ mesh: sun, type: 'sun' });

                // Add clouds (simple shapes)
                for (let i = 0; i < 5; i++) {
                    const cloudGroup = new THREE.Group();
                    
                    // Cloud puffs
                    for (let j = 0; j < 5; j++) {
                        const puffSize = 20 + Math.random() * 15;
                        const puffGeo = new THREE.SphereGeometry(puffSize, 16, 16);
                        const puffMat = new THREE.MeshBasicMaterial({ color: 0xFFFFFF });
                        const puff = new THREE.Mesh(puffGeo, puffMat);
                        
                        const angle = (j / 5) * Math.PI * 2;
                        const radius = puffSize * 0.8;
                        puff.position.set(
                            Math.cos(angle) * radius,
                            Math.sin(angle) * radius,
                            0
                        );
                        
                        cloudGroup.add(puff);
                    }
                    
                    cloudGroup.position.set(
                        Math.random() * gameWidth,
                        Math.random() * gameHeight * 0.4 + 50,
                        5
                    );
                    cloudGroup.scale.set(0.5 + Math.random() * 0.5, 0.5 + Math.random() * 0.5, 1);
                    
                    this.scene.add(cloudGroup);
                    this.objects.push({ 
                        mesh: cloudGroup, 
                        type: 'cloud', 
                        speed: 0.2 + Math.random() * 0.3,
                        originalX: cloudGroup.position.x 
                    });
                }

                // Add distant hills
                const hillCount = 3;
                for (let i = 0; i < hillCount; i++) {
                    const hillGeo = new THREE.CircleGeometry(150 + i * 50, 32);
                    const hillMat = new THREE.MeshBasicMaterial({ 
                        color: 0x7CFC00,
                        transparent: true,
                        opacity: 0.3
                    });
                    const hill = new THREE.Mesh(hillGeo, hillMat);
                    hill.position.set(
                        (i - hillCount/2) * 300,
                        gameHeight * 0.65,
                        2
                    );
                    hill.scale.y = 0.5;
                    hill.scale.x = 0.5;
                    this.scene.add(hill);
                    this.objects.push({ mesh: hill, type: 'hill', originalY: hill.position.y });
                }

                // Add trees (simple cones)
                const treeCount = 8;
                for (let i = 0; i < treeCount; i++) {
                    const treeGroup = new THREE.Group();
                    
                    // Tree trunk
                    const trunkGeo = new THREE.CylinderGeometry(8, 12, 30, 16);
                    const trunkMat = new THREE.MeshBasicMaterial({ color: 0x8B4513 });
                    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                    trunk.position.y = 15;
                    treeGroup.add(trunk);
                    
                    // Tree foliage (cone)
                    const foliageGeo = new THREE.ConeGeometry(30, 50, 8);
                    const foliageMat = new THREE.MeshBasicMaterial({ color: 0x228B22 });
                    const foliage = new THREE.Mesh(foliageGeo, foliageMat);
                    foliage.position.y = 50;
                    treeGroup.add(foliage);
                    
                    // Position trees along the sides
                    const side = Math.random() < 0.5 ? -1 : 1;
                    treeGroup.position.set(
                        gameWidth * 0.15 * side + (Math.random() - 0.5) * 100,
                        gameHeight * 0.75,
                        3
                    );
                    
                    this.scene.add(treeGroup);
                    this.objects.push({ 
                        mesh: treeGroup, 
                        type: 'tree',
                        swaySpeed: 0.5 + Math.random() * 0.5,
                        swayOffset: Math.random() * Math.PI * 2
                    });
                }

                this.camera.position.z = 50;
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                
                // Rotate sun slowly
                this.objects.forEach(obj => {
                    if (obj.type === 'sun') {
                        obj.mesh.rotation.z += 0.001;
                    } else if (obj.type === 'cloud') {
                        obj.mesh.position.x -= obj.speed;
                        if (obj.mesh.position.x < -100) {
                            obj.mesh.position.x = gameWidth + 100;
                        }
                    } else if (obj.type === 'tree') {
                        // Gentle sway
                        obj.mesh.rotation.z = Math.sin(Date.now() * 0.001 * obj.swaySpeed + obj.swayOffset) * 0.05;
                    }
                });

                this.renderer.render(this.scene, this.camera);
            }
        }

        // ============================================
        // PARTICLE SYSTEM
        // ============================================
        function createParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'absolute';
                particle.style.width = '8px';
                particle.style.height = '8px';
                particle.style.backgroundColor = color;
                particle.style.borderRadius = '50%';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.pointerEvents = 'none';
                particle.style.zIndex = '6';
                
                // Random velocity
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 3;
                
                particle.vx = Math.cos(angle) * speed;
                particle.vy = Math.sin(angle) * speed;
                particle.life = 1.0;
                particle.size = 8;
                
                document.getElementById('particles').appendChild(particle);
                
                // Store particle data for animation
                gameState.particles.push({
                    element: particle,
                    x: x,
                    y: y,
                    vx: particle.vx,
                    vy: particle.vy,
                    life: particle.life,
                    size: particle.size
                });
            }
        }

        function updateParticles() {
            gameState.particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                p.size *= 0.95;
                
                // Update DOM element
                p.element.style.left = p.x + 'px';
                p.element.style.top = p.y + 'px';
                p.element.style.opacity = p.life;
                p.element.style.width = p.size + 'px';
                p.element.style.height = p.size + 'px';
                
                if (p.life <= 0) {
                    p.element.remove();
                    gameState.particles.splice(index, 1);
                }
            });
        }

        // ============================================
        // MAIN GAME LOGIC
        // ============================================
        const gameContainer = document.getElementById('game-container');
        const gameCanvas = document.getElementById('game-canvas');
        const ctx = gameCanvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const timerDisplay = document.getElementById('timer-display');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const instructions = document.getElementById('instructions');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreDisplay = document.getElementById('final-score');

        // Set canvas size based on container
        function resizeCanvas() {
            const container = document.getElementById('game-container');
            gameCanvas.width = container.clientWidth;
            gameCanvas.height = container.clientHeight;
            
            // Update game dimensions
            gameWidth = gameCanvas.width;
            gameHeight = gameCanvas.height;
            
            // Adjust basket position if needed
            if (basket) {
                basket.x = gameWidth / 2 - basket.width / 2;
                basket.y = gameHeight - 150;
            }
        }

        let gameWidth, gameHeight;
        let basket, gameState, farmBackground;

        // Initialize game
        function initGame() {
            resizeCanvas();
            basket = new Basket();
            gameState = new GameState();
            farmBackground = new FarmBackground();
            farmBackground.animate();
            
            // Event listeners
            startBtn.addEventListener('click', startGame);
            startBtn.addEventListener('touchstart', startGame);
            restartBtn.addEventListener('click', restartGame);
            restartBtn.addEventListener('touchstart', restartGame);
            
            // Touch/mouse controls
            gameContainer.addEventListener('touchmove', handleTouch, { passive: false });
            gameContainer.addEventListener('touchstart', handleTouch, { passive: false });
            gameContainer.addEventListener('mousemove', handleMouseMove);
            
            // Prevent context menu
            gameContainer.addEventListener('contextmenu', e => e.preventDefault());
            
            // Also allow pressing any key to start
            document.addEventListener('keydown', function startOnKey(e) {
                if (!gameState.isRunning && !gameState.gameOver) {
                    startGame();
                    document.removeEventListener('keydown', startOnKey);
                } else if (gameState.gameOver) {
                    restartGame();
                    document.removeEventListener('keydown', startOnKey);
                }
            });
            
            // Start render loop
            render();
        }

        function startGame() {
            if (gameState.isRunning) return;
            instructions.style.display = 'none';
            gameState.isRunning = true;
            gameLoop();
        }

        function restartGame() {
            if (gameState.gameOver) {
                gameState.reset();
                gameOverScreen.style.display = 'none';
                gameState.isRunning = true;
                gameLoop();
            }
        }

        function handleTouch(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = gameContainer.getBoundingClientRect();
            const touchX = touch.clientX - rect.left;
            if (basket) {
                basket.targetX = touchX;
            }
        }

        function handleMouseMove(e) {
            const rect = gameContainer.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            if (basket) {
                basket.targetX = mouseX;
            }
        }

        function gameLoop() {
            if (!gameState.isRunning || gameState.gameOver) return;
            
            gameState.update();
            basket.update(basket.targetX || gameWidth/2);
            gameState.checkCollisions(basket);
            
            // Continue loop
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameOverScreen.style.display = 'flex';
            finalScoreDisplay.textContent = gameState.score;
        }

        function render() {
            // Clear canvas
            ctx.clearRect(0, 0, gameWidth, gameHeight);
            
            // Draw ground line
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, gameHeight - 100);
            ctx.lineTo(gameWidth, gameHeight - 100);
            ctx.stroke();
            
            // Draw basket
            if (basket) {
                basket.draw(ctx);
            }
            
            // Draw collectibles
            gameState.collectibles.forEach(item => {
                // Item body
                ctx.fillStyle = item.color;
                ctx.beginPath();
                if (item.type === 'apple') {
                    // Draw apple shape
                    ctx.ellipse(item.x + item.width/2, item.y + item.height/2, 
                               item.width/2, item.height/2, 0, 0, Math.PI * 2);
                } else if (item.type === 'egg') {
                    // Draw egg shape
                    ctx.moveTo(item.x + item.width/2, item.y);
                    ctx.quadraticCurveTo(item.x + item.width, item.y + item.height/2,
                                        item.x + item.width/2, item.y + item.height);
                    ctx.quadraticCurveTo(item.x, item.y + item.height/2,
                                        item.x + item.width/2, item.y);
                } else if (item.type === 'milk') {
                    // Draw milk bottle shape
                    ctx.beginPath();
                    ctx.moveTo(item.x + item.width/2, item.y + 5);
                    ctx.lineTo(item.x + item.width - 5, item.y + 5);
                    ctx.lineTo(item.x + item.width - 5, item.y + item.height - 5);
                    ctx.lineTo(item.x + 5, item.y + item.height - 5);
                    ctx.lineTo(item.x + 5, item.y + 5);
                    ctx.fill();
                } else if (item.type === 'golden') {
                    // Golden apple with sparkle
                    ctx.ellipse(item.x + item.width/2, item.y + item.height/2, 
                               item.width/2, item.height/2, 0, 0, Math.PI * 2);
                    ctx.fillStyle = '#FFD700';
                    ctx.fill();
                    // Add sparkle
                    ctx.fillStyle = '#FFFFE0';
                    ctx.beginPath();
                    ctx.moveTo(item.x + item.width/2, item.y);
                    ctx.lineTo(item.x + item.width/2 - 3, item.y + item.height/3);
                    ctx.lineTo(item.x, item.y + item.height/3);
                    ctx.lineTo(item.x + item.width/2 - 8, item.y + item.height/2);
                    ctx.lineTo(item.x, item.y + item.height/2 + 5);
                    ctx.lineTo(item.x + item.width/2, item.y + item.height/2 + 3);
                    ctx.lineTo(item.x + item.width, item.y + item.height/2 + 5);
                    ctx.lineTo(item.x + item.width/2 + 8, item.y + item.height/2);
                    ctx.lineTo(item.x + item.width, item.y + item.height/3);
                    ctx.lineTo(item.x + item.width/2 + 3, item.y + item.height/3);
                    ctx.fill();
                } else if (item.type === 'rock') {
                    // Draw rock
                    ctx.beginPath();
                    ctx.moveTo(item.x + item.width/2, item.y);
                    ctx.lineTo(item.x + item.width, item.y + item.height/2);
                    ctx.lineTo(item.x + item.width/2, item.y + item.height);
                    ctx.lineTo(item.x, item.y + item.height/2);
                    ctx.closePath();
                    ctx.fill();
                } else if (item.type === 'rotten') {
                    // Draw rotten food (apple shape but purple)
                    ctx.ellipse(item.x + item.width/2, item.y + item.height/2, 
                               item.width/2, item.height/2, 0, 0, Math.PI * 2);
                }
            });
            
            // Update and draw particles
            updateParticles();
            
            // Update UI
            scoreDisplay.textContent = gameState.score;
            timerDisplay.textContent = gameState.timeLeft;
            
            requestAnimationFrame(render);
        }

        // Handle window resize
        window.addEventListener('resize', resizeCanvas);

        // Start everything
        initGame();
    </script>
</body>
</html>
