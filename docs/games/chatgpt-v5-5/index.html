<!DOCTYPE html>
<html lang="en">

<title>Deep Tide Fishing</title>
<style>
/* ========================================================= */
/* GLOBAL RESET                                              */
/* ========================================================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html,
body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: none;
    background: #02111b;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    background:
        radial-gradient(circle at top, rgba(33, 140, 173, 0.25), transparent 40%),
        radial-gradient(circle at bottom, rgba(1, 18, 38, 0.8), transparent 55%),
        linear-gradient(180deg, #082032 0%, #031521 45%, #01070e 100%);
}

/* ========================================================= */
/* GAME FRAME                                                */
/* ========================================================= */
#gameShell {
    position: relative;
    width: min(100vw, 56.25vh);
    height: min(177.77vw, 100vh);
    max-width: 100vw;

canvas {

}

/* ========================================================= */

#ui {
    position: absolute;

#topBar {

.panel {

#reelButton {
    position: absolute;

    transform: translateX(-50%);
    width: 120px;

    background:

        0 0 40px rgba(0,0,0,0.45),

#gameOverCard h2 {

}

#gameOverCard p {

}

#restartBtn {

    padding: 20px 28px;

#depthLines {
    position: absolute;
    inset: 0;

        );
}

/* ========================================================= */
/* BUBBLES                                                    */
/* ========================================================= */
.bubble {
    position: absolute;

}

@keyframes bubbleRise {
    0% {
        transform: translateY(0px) translateX(0px);
        opacity: 0;
    }

    }

        opacity: 0;
    }
}

/* ========================================================= */
/* FISH FLASH                                                 */
/* ========================================================= */
.catchFlash {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(255,255,255,0));

}

@keyframes flashPop {
    0% {
        transform: scale(0.2);
        opacity: 1;
    }

        transform: scale(3);
        opacity: 0;
    }
}

/* ========================================================= */
/* MOBILE TWEAKS                                              */
/* ========================================================= */
@media (min-width: 700px) {
    #centerPrompt h1 {
        font-size: 70px;
    }

    #centerPrompt p {
        font-size: 28px;
    }

    #reelHint {
        font-size: 28px;
    }

    #gameOverCard h2 {
        font-size: 70px;
    }

    #gameOverCard p {
        font-size: 42px;
    }

    #restartBtn {
        font-size: 34px;
    }
}
</style>
</head>
<body>
<div id="gameShell">

    <canvas id="oceanCanvas"></canvas>

    <div id="depthLines"></div>

    <div id="ui">

        <div id="topBar">
            <div class="panel">
                <div class="label">FISH</div>
                <div class="value" id="scoreValue">0</div>
            </div>

            <div class="panel">
                <div class="label">TIME</div>
                <div class="value" id="timeValue">60</div>
            </div>
        </div>

        <div id="centerPrompt">
            <h1>🎣</h1>
            <p>DRAG HOOK • REEL FAST</p>
        </div>

        <div id="reelHint">
            Hold the glowing reel button when fish bite!
        </div>

        <div id="comboMeter">
            <div id="comboFill"></div>
            <div id="comboText">COMBO</div>
        </div>

        <div id="reelButton">
            REEL
        </div>
    </div>

    <div id="gameOver">
        <div id="gameOverCard">
            <h2>🌊</h2>
            <p id="finalScore">0 Fish</p>
            <button id="restartBtn">FISH AGAIN</button>
        </div>
    </div>

</div>

<script>
/* ========================================================= */
/* CANVAS SETUP                                               */
/* ========================================================= */
const canvas = document.getElementById('oceanCanvas');
const ctx = canvas.getContext('2d');

const shell = document.getElementById('gameShell');

let w = 0;
let h = 0;

function resize() {
    w = shell.clientWidth;
    h = shell.clientHeight;

    canvas.width = w * devicePixelRatio;
    canvas.height = h * devicePixelRatio;

    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';

    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

window.addEventListener('resize', resize);
resize();

/* ========================================================= */
/* GAME STATE                                                 */
/* ========================================================= */
let score = 0;
let timer = 60;
let combo = 0;
let gameStarted = false;
let gameEnded = false;
let reeling = false;
let fishCaught = 0;

const scoreValue = document.getElementById('scoreValue');
const timeValue = document.getElementById('timeValue');
const comboFill = document.getElementById('comboFill');
const centerPrompt = document.getElementById('centerPrompt');
const reelButton = document.getElementById('reelButton');
const finalScore = document.getElementById('finalScore');
const gameOver = document.getElementById('gameOver');
const restartBtn = document.getElementById('restartBtn');

/* ========================================================= */
/* INPUT                                                      */
/* ========================================================= */
let pointer = {
    x: 0,
    y: 0,
    down: false
};

canvas.addEventListener('pointerdown', (e) => {
    pointer.down = true;

    const rect = canvas.getBoundingClientRect();

    pointer.x = e.clientX - rect.left;
    pointer.y = e.clientY - rect.top;

    if (!gameStarted) {
        gameStarted = true;
        centerPrompt.style.display = 'none';
    }
});

canvas.addEventListener('pointermove', (e) => {
    const rect = canvas.getBoundingClientRect();

    pointer.x = e.clientX - rect.left;
    pointer.y = e.clientY - rect.top;
});

window.addEventListener('pointerup', () => {
    pointer.down = false;
});

reelButton.addEventListener('pointerdown', () => {
    reeling = true;
});

window.addEventListener('pointerup', () => {
    reeling = false;
});

restartBtn.addEventListener('click', resetGame);

/* ========================================================= */
/* WAVES                                                      */
/* ========================================================= */
const waves = [];

for (let i = 0; i < 4; i++) {
    waves.push({
        amp: 10 + i * 8,
        len: 120 + i * 50,
        speed: 0.002 + i * 0.001,
        offset: Math.random() * 1000,
        y: 90 + i * 18,
        alpha: 0.15 - i * 0.02
    });
}

/* ========================================================= */
/* PARTICLES                                                  */
/* ========================================================= */
const particles = [];

function createParticle(x, y, color, amount) {
    for (let i = 0; i < amount; i++) {
        particles.push({
            x,
            y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            size: 2 + Math.random() * 8,
            life: 1,
            color
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        p.x += p.vx;
        p.y += p.vy;

        p.vy += 0.05;
        p.life -= 0.02;

        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }
}

function drawParticles() {
    particles.forEach((p) => {
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    });
}

/* ========================================================= */
/* BUBBLES                                                    */
/* ========================================================= */
function spawnBubble() {
    const bubble = document.createElement('div');

    bubble.className = 'bubble';

    const size = 8 + Math.random() * 22;

    bubble.style.width = size + 'px';
    bubble.style.height = size + 'px';
    bubble.style.left = Math.random() * w + 'px';
    bubble.style.animationDuration = 5 + Math.random() * 6 + 's';

    shell.appendChild(bubble);

    setTimeout(() => {
        bubble.remove();
    }, 12000);
}

setInterval(spawnBubble, 700);

/* ========================================================= */
/* HOOK                                                       */
/* ========================================================= */
const hook = {
    x: w * 0.5,
    y: 160,
    targetX: w * 0.5,
    targetY: 220,
    ropeY: 0,
    glow: 0
};

/* ========================================================= */
/* FISH                                                       */
/* ========================================================= */
const fish = [];

const fishTypes = [
    {
        color: '#ffb347',
        speed: 1.6,
        size: 24,
        points: 1
    },
    {
        color: '#79f2ff',
        speed: 2.4,
        size: 18,
        points: 2
    },
    {
        color: '#ff6b9f',
        speed: 3.2,
        size: 14,
        points: 3
    }
];

function spawnFish() {
    const type = fishTypes[Math.floor(Math.random() * fishTypes.length)];

    const fromLeft = Math.random() > 0.5;

    fish.push({
        x: fromLeft ? -80 : w + 80,
        y: 180 + Math.random() * (h - 380),
        vx: fromLeft ? type.speed : -type.speed,
        size: type.size,
        color: type.color,
        points: type.points,
        wiggle: Math.random() * Math.PI * 2,
        caught: false,
        reel: 0
    });
}

for (let i = 0; i < 8; i++) {
    spawnFish();
}

setInterval(() => {
    if (!gameEnded) {
        spawnFish();
    }
}, 1200);

/* ========================================================= */
/* JELLYFISH                                                  */
/* ========================================================= */
const jellies = [];

for (let i = 0; i < 6; i++) {
    jellies.push({
        x: Math.random() * w,
        y: 200 + Math.random() * h * 0.6,
        phase: Math.random() * Math.PI * 2,
        size: 20 + Math.random() * 20
    });
}

/* ========================================================= */
/* SHARKS                                                     */
/* ========================================================= */
const sharks = [];

function spawnShark() {
    sharks.push({
        x: w + 200,
        y: 250 + Math.random() * (h - 500),
        speed: 5,
        size: 100,
        alpha: 0.2
    });
}

setInterval(() => {
    if (!gameEnded && Math.random() > 0.55) {
        spawnShark();
    }
}, 6000);

/* ========================================================= */
/* TIMER                                                      */
/* ========================================================= */
setInterval(() => {
    if (!gameStarted || gameEnded) {
        return;
    }

    timer--;

    timeValue.textContent = timer;

    if (timer <= 0) {
        endGame();
    }
}, 1000);

/* ========================================================= */
/* GAME FUNCTIONS                                             */
/* ========================================================= */
function addScore(points) {
    combo += 5;

    if (combo > 100) {
        combo = 100;
    }

    score += points + Math.floor(combo / 25);

    scoreValue.textContent = score;

    comboFill.style.height = combo + '%';
}

function reduceCombo() {
    combo -= 0.08;

    if (combo < 0) {
        combo = 0;
    }

    comboFill.style.height = combo + '%';
}

function createCatchFlash(x, y) {
    const flash = document.createElement('div');

    flash.className = 'catchFlash';

    flash.style.width = '100px';
    flash.style.height = '100px';
    flash.style.left = (x - 50) + 'px';
    flash.style.top = (y - 50) + 'px';

    shell.appendChild(flash);

    setTimeout(() => {
        flash.remove();
    }, 900);
}

function endGame() {
    gameEnded = true;

    finalScore.textContent = score + ' Fish';

    gameOver.style.display = 'flex';
}

function resetGame() {
    score = 0;
    timer = 60;
    combo = 0;
    fishCaught = 0;
    gameStarted = false;
    gameEnded = false;

    fish.length = 0;
    sharks.length = 0;
    particles.length = 0;

    scoreValue.textContent = '0';
    timeValue.textContent = '60';
    comboFill.style.height = '0%';

    centerPrompt.style.display = 'block';
    gameOver.style.display = 'none';

    for (let i = 0; i < 8; i++) {
        spawnFish();
    }
}

/* ========================================================= */
/* DRAW OCEAN                                                 */
/* ========================================================= */
function drawBackground(time) {

    const gradient = ctx.createLinearGradient(0, 0, 0, h);

    gradient.addColorStop(0, '#66dcff');
    gradient.addColorStop(0.18, '#1b8bc7');
    gradient.addColorStop(0.5, '#063d62');
    gradient.addColorStop(1, '#02111b');

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, w, h);

    waves.forEach((wave) => {

        ctx.beginPath();

        ctx.moveTo(0, wave.y);

        for (let x = 0; x <= w; x += 12) {
            const y = wave.y + Math.sin(x / wave.len + time * wave.speed + wave.offset) * wave.amp;
            ctx.lineTo(x, y);
        }

        ctx.lineTo(w, 0);
        ctx.lineTo(0, 0);

        ctx.closePath();

        ctx.fillStyle = `rgba(255,255,255,${wave.alpha})`;
        ctx.fill();
    });

    for (let i = 0; i < 10; i++) {

        ctx.beginPath();

        const lightX = w * 0.5 + Math.sin(time * 0.0005 + i) * 150;

        ctx.moveTo(lightX - 50, 0);
        ctx.lineTo(lightX + 80, h);
        ctx.lineTo(lightX + 180, h);
        ctx.lineTo(lightX + 30, 0);

        ctx.fillStyle = 'rgba(255,255,255,0.02)';
        ctx.fill();
    }
}

/* ========================================================= */
/* DRAW JELLYFISH                                             */
/* ========================================================= */
function drawJellies(time) {

    jellies.forEach((j) => {

        j.y += Math.sin(time * 0.001 + j.phase) * 0.3;

        ctx.save();

        ctx.translate(j.x, j.y);

        ctx.globalAlpha = 0.35;

        const pulse = Math.sin(time * 0.004 + j.phase) * 4;

        ctx.fillStyle = '#9ff7ff';

        ctx.beginPath();
        ctx.arc(0, 0, j.size + pulse, Math.PI, 0);
        ctx.fill();

        for (let t = 0; t < 6; t++) {
            ctx.beginPath();
            ctx.moveTo(-j.size / 2 + t * 8, 0);

            for (let py = 0; py < 50; py += 6) {
                ctx.lineTo(
                    -j.size / 2 + t * 8 + Math.sin(py * 0.2 + time * 0.004 + t) * 5,
                    py
                );
            }

            ctx.strokeStyle = 'rgba(159,247,255,0.5)';
            ctx.stroke();
        }

        ctx.restore();
    });
}

/* ========================================================= */
/* DRAW SHARKS                                                */
/* ========================================================= */
function drawSharks() {

    for (let i = sharks.length - 1; i >= 0; i--) {

        const s = sharks[i];

        s.x -= s.speed;

        ctx.save();

        ctx.translate(s.x, s.y);
        ctx.globalAlpha = s.alpha;

        ctx.fillStyle = '#0a1c2a';

        ctx.beginPath();
        ctx.moveTo(-90, 0);
        ctx.lineTo(40, -30);
        ctx.lineTo(100, 0);
        ctx.lineTo(40, 30);
        ctx.closePath();
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(-10, -10);
        ctx.lineTo(20, -70);
        ctx.lineTo(40, -10);
        ctx.closePath();
        ctx.fill();

        ctx.restore();

        if (s.x < -200) {
            sharks.splice(i, 1);
        }
    }
}

/* ========================================================= */
/* DRAW HOOK                                                  */
/* ========================================================= */
function drawHook() {

    hook.targetX = pointer.x || w * 0.5;
    hook.targetY = Math.max(120, Math.min(h - 180, pointer.y || h * 0.5));

    hook.x += (hook.targetX - hook.x) * 0.12;
    hook.y += (hook.targetY - hook.y) * 0.12;

    hook.glow += reeling ? 0.2 : -0.1;

    hook.glow = Math.max(0, Math.min(1, hook.glow));

    ctx.strokeStyle = 'rgba(255,255,255,0.75)';
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(w * 0.5, 0);
    ctx.lineTo(hook.x, hook.y);
    ctx.stroke();

    ctx.save();

    ctx.translate(hook.x, hook.y);

    const glowRadius = 15 + hook.glow * 20;

    const glow = ctx.createRadialGradient(0, 0, 2, 0, 0, glowRadius);

    glow.addColorStop(0, 'rgba(255,255,255,0.9)');
    glow.addColorStop(1, 'rgba(255,255,255,0)');

    ctx.fillStyle = glow;

    ctx.beginPath();
    ctx.arc(0, 0, glowRadius, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 4;

    ctx.beginPath();
    ctx.arc(0, 0, 16, 0.4, Math.PI + 0.4);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(8, 10);
    ctx.lineTo(0, 20);
    ctx.stroke();

    ctx.restore();
}

/* ========================================================= */
/* DRAW FISH                                                  */
/* ========================================================= */
function drawFish(time) {

    for (let i = fish.length - 1; i >= 0; i--) {

        const f = fish[i];

        if (!f.caught) {
            f.x += f.vx;
        }

        f.wiggle += 0.2;

        if (
            !f.caught &&
            Math.hypot(f.x - hook.x, f.y - hook.y) < f.size + 18
        ) {
            f.caught = true;
            createParticle(f.x, f.y, f.color, 12);
        }

        if (f.caught) {

            f.x += (hook.x - f.x) * 0.14;
            f.y += (hook.y - f.y) * 0.14;

            if (reeling) {
                f.reel += 0.04;
                createParticle(f.x, f.y, '#ffffff', 1);
            }

            if (f.reel >= 1) {

                addScore(f.points);
                fishCaught++;

                createParticle(f.x, f.y, '#ffffff', 24);
                createCatchFlash(f.x, f.y);

                fish.splice(i, 1);

                spawnFish();

                continue;
            }
        }

        ctx.save();

        ctx.translate(f.x, f.y);

        if (f.vx > 0) {
            ctx.scale(-1, 1);
        }

        ctx.rotate(Math.sin(f.wiggle) * 0.15);

        const fishGlow = ctx.createRadialGradient(0, 0, 2, 0, 0, f.size * 2);

        fishGlow.addColorStop(0, f.color);
        fishGlow.addColorStop(1, 'rgba(255,255,255,0)');

        ctx.fillStyle = fishGlow;

        ctx.beginPath();
        ctx.arc(0, 0, f.size * 1.8, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = f.color;

        ctx.beginPath();
        ctx.moveTo(-f.size, 0);
        ctx.quadraticCurveTo(0, -f.size, f.size, 0);
        ctx.quadraticCurveTo(0, f.size, -f.size, 0);
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(f.size, 0);
        ctx.lineTo(f.size + f.size * 0.8, -f.size * 0.8);
        ctx.lineTo(f.size + f.size * 0.8, f.size * 0.8);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#ffffff';

        ctx.beginPath();
        ctx.arc(-f.size * 0.3, -3, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();

        if (f.x < -200 || f.x > w + 200) {
            fish.splice(i, 1);
            spawnFish();
        }
    }
}

/* ========================================================= */
/* SEA FLOOR                                                  */
/* ========================================================= */
function drawFloor(time) {

    ctx.fillStyle = '#3d2716';

    ctx.beginPath();
    ctx.moveTo(0, h);

    for (let x = 0; x <= w; x += 30) {
        const y = h - 80 + Math.sin(x * 0.02 + time * 0.001) * 8;
        ctx.lineTo(x, y);
    }

    ctx.lineTo(w, h);
    ctx.closePath();
    ctx.fill();

    for (let i = 0; i < 10; i++) {

        const rockX = (i * 120 + 40) % (w + 120);

        ctx.fillStyle = '#4d3a2d';

        ctx.beginPath();
        ctx.arc(rockX, h - 70, 24 + Math.sin(time * 0.001 + i) * 3, 0, Math.PI * 2);
        ctx.fill();
    }

    for (let i = 0; i < 14; i++) {

        const seaweedX = (i * 60 + 20) % w;

        ctx.strokeStyle = 'rgba(41,180,115,0.7)';
        ctx.lineWidth = 5;

        ctx.beginPath();
        ctx.moveTo(seaweedX, h - 60);

        for (let py = 0; py < 80; py += 10) {
            ctx.lineTo(
                seaweedX + Math.sin(py * 0.1 + time * 0.003 + i) * 10,
                h - 60 - py
            );
        }

        ctx.stroke();
    }
}

/* ========================================================= */
/* MAIN LOOP                                                  */
/* ========================================================= */
function animate(time) {

    requestAnimationFrame(animate);

    drawBackground(time);

    drawJellies(time);

    drawSharks();

    drawFish(time);

    drawHook();

    drawParticles();

    drawFloor(time);

    updateParticles();

    reduceCombo();

    if (gameStarted && !gameEnded) {

        ctx.save();

        ctx.globalAlpha = 0.12;

        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;

        for (let i = 0; i < 20; i++) {

            ctx.beginPath();
            ctx.arc(
                hook.x,
                hook.y,
                20 + i * 14 + Math.sin(time * 0.004 + i) * 3,
                0,
                Math.PI * 2
            );
            ctx.stroke();
        }

        ctx.restore();
    }

    if (!gameStarted) {

        ctx.save();

        ctx.globalAlpha = 0.6 + Math.sin(time * 0.005) * 0.2;

        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 3;

        ctx.beginPath();
        ctx.moveTo(w * 0.5, h * 0.58);
        ctx.lineTo(w * 0.5, h * 0.72);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(w * 0.5 - 20, h * 0.7);
        ctx.lineTo(w * 0.5, h * 0.72);
        ctx.lineTo(w * 0.5 + 20, h * 0.7);
        ctx.stroke();

        ctx.restore();
    }
}

requestAnimationFrame(animate);

/* ========================================================= */
/* AMBIENT SPLASHES                                           */
/* ========================================================= */
setInterval(() => {

    if (gameEnded) {
        return;
    }

    createParticle(
        Math.random() * w,
        80 + Math.random() * 60,
        'rgba(255,255,255,0.9)',
        5
    );

}, 400);

/* ========================================================= */
/* TOUCH VIBRATION                                            */
/* ========================================================= */
function pulseVibrate() {

    if (navigator.vibrate) {
        navigator.vibrate(30);
    }
}

setInterval(() => {

    if (reeling && gameStarted && !gameEnded) {
        pulseVibrate();
    }

}, 180);

/* ========================================================= */
/* PARALLAX WATER DRAG                                        */
/* ========================================================= */
let dragOffset = 0;

canvas.addEventListener('pointermove', () => {

    dragOffset += (pointer.x - w * 0.5) * 0.0002;

    waves.forEach((wave, index) => {
        wave.offset += dragOffset * (index + 1);
    });
});

/* ========================================================= */
/* STARTING PARTICLES                                         */
/* ========================================================= */
for (let i = 0; i < 80; i++) {

    particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: 0,
        vy: -0.2 - Math.random() * 0.3,
        size: 1 + Math.random() * 4,
        life: 0.2 + Math.random() * 0.5,
        color: 'rgba(255,255,255,0.5)'
    });
}

/* ========================================================= */
/* ORCA EVENT                                                 */
/* ========================================================= */
const orca = {
    active: false,
    x: -400,
    y: h * 0.35,
    timer: 0
};

function triggerOrca() {

    if (orca.active || gameEnded) {
        return;
    }

    orca.active = true;
    orca.x = -300;
    orca.timer = 260;
}

setInterval(() => {

    if (Math.random() > 0.7 && gameStarted) {
        triggerOrca();
    }

}, 9000);

function drawOrca() {

    if (!orca.active) {
        return;
    }

    orca.x += 8;
    orca.timer--;

    ctx.save();

    ctx.translate(orca.x, orca.y);

    ctx.fillStyle = '#06131f';

    ctx.beginPath();
    ctx.moveTo(-140, 0);
    ctx.quadraticCurveTo(-20, -70, 140, 0);
    ctx.quadraticCurveTo(-20, 70, -140, 0);
    ctx.fill();

    ctx.fillStyle = '#ffffff';

    ctx.beginPath();
    ctx.arc(40, 10, 30, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(-20, -20);
    ctx.lineTo(20, -120);
    ctx.lineTo(40, -20);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    createParticle(orca.x - 100, orca.y + 20, 'rgba(255,255,255,0.7)', 1);

    if (orca.x > w + 400 || orca.timer <= 0) {
        orca.active = false;
    }
}

/* ========================================================= */
/* SECONDARY RENDER LOOP                                      */
/* ========================================================= */
const originalAnimate = animate;

function megaLoop(time) {

    requestAnimationFrame(megaLoop);

    drawBackground(time);

    drawJellies(time);

    drawSharks();

    drawOrca();

    drawFish(time);

    drawHook();

    drawParticles();

    drawFloor(time);

    updateParticles();

    reduceCombo();

    if (gameStarted && !gameEnded) {

        ctx.save();

        const pulse = 40 + Math.sin(time * 0.01) * 8;

        const radial = ctx.createRadialGradient(
            hook.x,
            hook.y,
            10,
            hook.x,
            hook.y,
            pulse
        );

        radial.addColorStop(0, 'rgba(255,255,255,0.25)');
        radial.addColorStop(1, 'rgba(255,255,255,0)');

        ctx.fillStyle = radial;

        ctx.beginPath();
        ctx.arc(hook.x, hook.y, pulse, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }
}

cancelAnimationFrame(originalAnimate);
requestAnimationFrame(megaLoop);
