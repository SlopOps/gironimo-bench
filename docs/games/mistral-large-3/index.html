<!DOCTYPE html>
<html model=mistral lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wild West Saloon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #FFD700 0%, #8B4513 30%, #CD853F 70%, #F5DEB3 100%);
            height: 100vh;
            width: 100vw;
            touch-action: none;
            position: relative;
            color: #8B4513;
        }
        #app {
            position: relative;
            height: 100%;
            width: 100%;
        }
        #saloon-doors {
            position: absolute;
            bottom: 20vh;
            left: 50%;
            transform: translateX(-50%);
            width: 60vw;
            height: 40vh;
            z-index: 10;
            cursor: grab;
            touch-action: none;
        }
        #door-left, #door-right {
            position: absolute;
            width: 30vw;
            height: 40vh;
            background: #8B4513;
            border: 3px solid #D2B48C;
            top: 0;
            border-radius: 5px;
            transition: transform 0.1s ease;
            transform-origin: center bottom;
        }
        #door-left {
            left: 0;
            transform: rotateY(0deg);
        }
        #door-right {
            right: 0;
            transform: rotateY(0deg);
        }
        #cactus-container {
            position: absolute;
            bottom: 10vh;
            width: 100%;
            height: 30vh;
            z-index: 5;
        }
        .cactus {
            position: absolute;
            width: 8vw;
            height: 20vh;
            background: #228B22;
            border-radius: 3px;
            bottom: 0;
            cursor: pointer;
            transition: transform 0.05s;
        }
        .cactus::before {
            content: '';
            position: absolute;
            width: 6vw;
            height: 5vh;
            background: #228B22;
            border-radius: 50%;
            top: -2.5vh;
            left: 1vw;
        }
        #particle-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }
        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 15vh;
            background: #CD853F;
            z-index: 2;
        }
        #horizon {
            position: absolute;
            bottom: 15vh;
            width: 100%;
            height: 5vh;
            background: linear-gradient(to top, rgba(205,133,63,0.8), transparent);
            z-index: 1;
        }
        #sun {
            position: absolute;
            top: 10vh;
            left: 50%;
            transform: translateX(-50%);
            width: 15vw;
            height: 15vw;
            background: radial-gradient(circle, #FFD700 0%, #FF8C00 50%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            box-shadow: 0 0 30px #FF8C00;
        }
        #saloon-sign {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8vw;
            font-weight: bold;
            text-shadow: 3px 3px 5px rgba(0,0,0,0.5);
            color: #FFD700;
            z-index: 15;
            pointer-events: none;
            text-align: center;
            white-space: nowrap;
        }
        #instructions {
            position: absolute;
            top: 5vh;
            width: 100%;
            text-align: center;
            color: #8B4513;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            z-index: 20;
            pointer-events: none;
            font-size: 4vw;
        }
        .tumbleweed {
            position: absolute;
            width: 10vw;
            height: 10vw;
            background: radial-gradient(circle, #D2B48C 0%, #8B4513 100%);
            border-radius: 50%;
            bottom: 15vh;
            z-index: 3;
            opacity: 0.8;
        }
        @media (min-aspect-ratio: 1/1) {
            #saloon-doors {
                width: 30vw;
                height: 50vh;
            }
            #door-left, #door-right {
                width: 15vw;
                height: 50vh;
            }
            .cactus {
                width: 4vw;
                height: 30vh;
            }
            #saloon-sign {
                font-size: 3vw;
            }
        }
    </style>
</head>
<body>
    
    <!-- ===== GAME MODEL BANNER ===== -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q5R5LECE2Y"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-Q5R5LECE2Y');
    </script>
    <style>
      .model-banner {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        width: 100%;
        box-sizing: border-box;
        z-index: 9999;
        background: rgba(8, 12, 22, 0.92);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.08);
        font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      .banner-inner {
        padding: 10px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .banner-left {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .banner-game-name {
        font-weight: 700;
        font-size: 15px;
        color: #f0f2ff;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        letter-spacing: -0.01em;
      }
      .banner-model-slug {
        font-size: 11px;
        color: rgba(224,228,255,0.45);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }
      .banner-name-group {
        display: flex;
        flex-direction: column;
        gap: 1px;
        min-width: 0;
      }
      .banner-stars {
        font-size: 13px;
        letter-spacing: 2px;
        color: #ffd700;
        flex-shrink: 0;
      }
      .banner-watch {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.08);
        padding: 6px 12px;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 600;
        color: rgba(224,228,255,0.7);
        text-decoration: none;
        transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
        white-space: nowrap;
      }
      .banner-watch:hover {
        background: #FF0000;
        border-color: #FF0000;
        color: #fff;
        box-shadow: 0 4px 16px rgba(255,0,0,0.3);
      }
      .banner-back {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.08);
        padding: 6px 14px;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 600;
        color: rgba(224,228,255,0.7);
        text-decoration: none;
        transition: background 0.2s, border-color 0.2s, color 0.2s;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .banner-back:hover {
        background: rgba(255,255,255,0.1);
        border-color: rgba(255,255,255,0.18);
        color: #f0f2ff;
      }
      .banner-right {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      @media (max-width: 480px) {
        .banner-model-slug { display: none; }
        .banner-watch span { display: none; }
      }
    </style>
    
    <div class="model-banner">
      <div class="banner-inner">
        <div class="banner-left">
          <div class="banner-name-group">
            <div class="banner-game-name" id="banner-game-name">Loading...</div>
            <div class="banner-model-slug" id="banner-model-slug"></div>
          </div>
          <div class="banner-stars" id="banner-stars"></div>
        </div>
        <div class="banner-right">
          <a id="banner-watch" class="banner-watch" href="#" target="_blank" rel="noopener" style="display:none;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
              <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
            </svg>
            <span>Watch</span>
          </a>
          <a href="/games/index.html" class="banner-back">← All Games</a>
        </div>
      </div>
    </div>
    <div style="height: 48px; flex-shrink: 0;"></div>
    
    <script>
      const MODEL_SLUG = "mistral-large-3"; // 🔧 match the `path` column in games.csv
    
      (async function loadGameBanner() {
        try {
          const res = await fetch('../games.csv', { cache: 'no-store' });
          const text = await res.text();
          const rows = text.trim().split('\n').map(r => r.split(','));
          const headers = rows.shift();
          const data = rows.map(row => {
            const obj = {};
            headers.forEach((h, i) => obj[h.trim()] = (row[i] || '').trim());
            return obj;
          });
    
          const match = data.find(row => row.path === MODEL_SLUG);
    
          if (!match) {
            document.getElementById('banner-game-name').textContent = MODEL_SLUG;
            document.getElementById('banner-stars').textContent = '☆☆☆☆☆';
            return;
          }
    
          document.getElementById('banner-game-name').textContent = match.game_name || MODEL_SLUG;
          document.getElementById('banner-model-slug').textContent = match.path;
    
          const starCount = parseInt(match.stars, 10) || 0;
          document.getElementById('banner-stars').textContent =
            '★'.repeat(starCount) + '☆'.repeat(Math.max(0, 5 - starCount));
    
          if (match.youtube_link) {
            const watchEl = document.getElementById('banner-watch');
            watchEl.href = match.youtube_link;
            watchEl.style.display = 'inline-flex';
          }
    
        } catch (err) {
          console.error('Banner error:', err);
          document.getElementById('banner-game-name').textContent = MODEL_SLUG;
        }
      })();
    </script>
    <!-- ===== END GAME MODEL BANNER ===== -->
    
    <div id="app">
        <div id="sun"></div>
        <div id="horizon"></div>
        <div id="ground"></div>
        <div id="saloon-doors">
            <div id="door-left"></div>
            <div id="door-right"></div>
        </div>
        <div id="saloon-sign">SALOON<br><span style="font-size: 0.6em;">TAP CACTI • DRAG DOORS</span></div>
        <div id="cactus-container"></div>
        <div id="particle-container"></div>
        <div id="instructions"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script>
        // --- Wild West 3D Saloon Scene ---
        document.addEventListener('DOMContentLoaded', () => {
            // --- DOM Elements ---
            const app = document.getElementById('app');
            const saloonDoors = document.getElementById('saloon-doors');
            const doorLeft = document.getElementById('door-left');
            const doorRight = document.getElementById('door-right');
            const cactusContainer = document.getElementById('cactus-container');
            const particleContainer = document.getElementById('particle-container');
            const saloonSign = document.getElementById('saloon-sign');
            const instructions = document.getElementById('instructions');

            // --- Particle System ---
            class ParticleSystem {
                constructor() {
                    this.particles = [];
                    this.maxParticles = 300;
                }

                create(x, y) {
                    for (let i = 0; i < 50; i++) {
                        if (this.particles.length >= this.maxParticles) {
                            const oldParticle = this.particles.shift();
                            if (oldParticle.element.parentNode) {
                                oldParticle.element.remove();
                            }
                        }

                        const particle = document.createElement('div');
                        particle.classList.add('particle');
                        particle.style.left = `${x}px`;
                        particle.style.top = `${y}px`;
                        // Random color: green or brown
                        const color = Math.random() > 0.7 ? '#8B4513' : '#228B22';
                        particle.style.backgroundColor = color;
                        particle.style.width = `${Math.random() * 12 + 3}px`;
                        particle.style.height = particle.style.width;
                        particle.style.opacity = '1';

                        // Random angle and velocity
                        const angle = Math.random() * Math.PI * 2;
                        const velocity = Math.random() * 10 + 5;
                        const vx = Math.cos(angle) * velocity;
                        const vy = Math.sin(angle) * velocity;
                        const life = Math.random() * 1000 + 500;

                        particle.dataset = {
                            vx,
                            vy,
                            life,
                            start: Date.now(),
                            element: particle
                        };

                        particleContainer.appendChild(particle);
                        this.particles.push(particle.dataset);
                    }
                }

                update() {
                    const now = Date.now();
                    for (let i = this.particles.length - 1; i >= 0; i--) {
                        const p = this.particles[i];
                        const elapsed = now - parseFloat(p.start);
                        const progress = elapsed / parseFloat(p.life);

                        if (progress >= 1) {
                            p.element.remove();
                            this.particles.splice(i, 1);
                            continue;
                        }

                        // Apply gravity
                        const y = parseFloat(p.element.style.top) + p.vy + (0.3 * elapsed * 0.01);
                        const x = parseFloat(p.element.style.left) + p.vx;
                        p.element.style.left = `${x}px`;
                        p.element.style.top = `${y}px`;
                        p.element.style.opacity = 1 - progress;
                    }
                }
            }

            const particleSystem = new ParticleSystem();

            // --- Cactus Interaction ---
            function createCacti() {
                const count = window.innerWidth > 600 ? 10 : 6;
                for (let i = 0; i < count; i++) {
                    const cactus = document.createElement('div');
                    cactus.classList.add('cactus');
                    cactus.style.left = `${Math.random() * 90 + 5}vw`;
                    cactus.addEventListener('click', (e) => {
                        const rect = cactus.getBoundingClientRect();
                        const x = rect.left + rect.width / 2;
                        const y = rect.top + rect.height / 2;
                        particleSystem.create(x, y);

                        // Visual feedback: shake the cactus
                        cactus.style.transform = 'scale(0.9) rotate(5deg)';
                        setTimeout(() => cactus.style.transform = 'scale(1.1) rotate(-5deg)', 50);
                        setTimeout(() => cactus.style.transform = 'scale(1) rotate(0deg)', 100);
                    });
                    cactusContainer.appendChild(cactus);
                }
            }

            // --- Saloon Doors Physics ---
            let isDragging = false;
            let startX, startY;
            let doorLeftAngle = 0;
            let doorRightAngle = 0;
            let velocity = 0;
            let animationId;

            function initDrag(e) {
                isDragging = true;
                startX = e.clientX || e.touches[0].clientX;
                startY = e.clientY || e.touches[0].clientY;
                cancelAnimationFrame(animationId);
                document.body.style.cursor = 'grabbing';
                e.preventDefault();
            }

            function drag(e) {
                if (!isDragging) return;
                const x = e.clientX || e.touches[0].clientX;
                const deltaX = x - startX;

                doorLeftAngle = Math.min(Math.max(deltaX * 0.01, -Math.PI / 3), Math.PI / 3);
                doorRightAngle = -doorLeftAngle;

                doorLeft.style.transform = `rotateY(${doorLeftAngle}rad)`;
                doorRight.style.transform = `rotateY(${doorRightAngle}rad)`;

                velocity = deltaX - (x - (e.clientX || e.touches[0].clientX));
            }

            function endDrag() {
                if (!isDragging) return;
                isDragging = false;
                document.body.style.cursor = '';

                let momentum = velocity * 0.02;

                function animateMomentum() {
                    doorLeftAngle += momentum;
                    doorRightAngle -= momentum;

                    momentum *= 0.95;

                    if (Math.abs(momentum) < 0.001) {
                        doorLeftAngle *= 0.9;
                        doorRightAngle *= 0.9;
                        if (Math.abs(doorLeftAngle) < 0.01) {
                            doorLeftAngle = 0;
                            doorRightAngle = 0;
                        }
                    }

                    doorLeftAngle = Math.min(Math.max(doorLeftAngle, -Math.PI / 3), Math.PI / 3);
                    doorRightAngle = -doorLeftAngle;

                    doorLeft.style.transform = `rotateY(${doorLeftAngle}rad)`;
                    doorRight.style.transform = `rotateY(${doorRightAngle}rad)`;

                    if (Math.abs(momentum) > 0.001 || Math.abs(doorLeftAngle) > 0.01) {
                        animationId = requestAnimationFrame(animateMomentum);
                    }
                }

                animateMomentum();
            }

            saloonDoors.addEventListener('mousedown', initDrag);
            saloonDoors.addEventListener('touchstart', initDrag);
            document.addEventListener('mousemove', drag);
            document.addEventListener('touchmove', drag);
            document.addEventListener('mouseup', endDrag);
            document.addEventListener('touchend', endDrag);

            // --- Tumbleweeds ---
            function createTumbleweeds() {
                for (let i = 0; i < 3; i++) {
                    const tumbleweed = document.createElement('div');
                    tumbleweed.classList.add('tumbleweed');
                    tumbleweed.style.left = `${Math.random() * 90 + 5}vw`;
                    app.appendChild(tumbleweed);

                    let pos = 0;
                    function animateTumbleweed() {
                        pos += 0.5;
                        tumbleweed.style.left = `${(pos + Math.random() * 2) % 100}vw`;
                        requestAnimationFrame(animateTumbleweed);
                    }
                    animateTumbleweed();
                }
            }

            // --- 3D Saloon Scene (Three.js) ---
            let scene, camera, renderer;
            function initThreeJS() {
                scene = new THREE.Scene();
                scene.background = null;

                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 2, 5);

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.domElement.style.position = 'absolute';
                renderer.domElement.style.top = '0';
                renderer.domElement.style.left = '0';
                renderer.domElement.style.zIndex = '3';
                renderer.domElement.style.pointerEvents = 'none';
                app.prepend(renderer.domElement);

                // Lighting
                const ambientLight = new THREE.AmbientLight(0xFFFFFF, 0.5);
                scene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(0xFFD700, 0.8);
                directionalLight.position.set(1, 1, 1);
                scene.add(directionalLight);

                // Saloon Building
                const saloonGeometry = new THREE.BoxGeometry(4, 2, 3);
                const saloonMaterial = new THREE.MeshStandardMaterial({
                    color: 0x8B4513,
                    roughness: 0.7,
                    metalness: 0.1
                });
                const saloon = new THREE.Mesh(saloonGeometry, saloonMaterial);
                saloon.position.y = 1;
                scene.add(saloon);

                // Roof
                const roofGeometry = new THREE.ConeGeometry(2.5, 1, 4);
                roofGeometry.rotateX(Math.PI / 2);
                const roofMaterial = new THREE.MeshStandardMaterial({
                    color: 0xCD853F,
                    roughness: 0.8
                });
                const roof = new THREE.Mesh(roofGeometry, roofMaterial);
                roof.position.set(0, 2.5, 0);
                scene.add(roof);

                // Windows
                const windowGeometry = new THREE.PlaneGeometry(0.5, 0.5);
                const windowMaterial = new THREE.MeshStandardMaterial({
                    color: 0xADD8E6,
                    transparent: true,
                    opacity: 0.7
                });
                const window1 = new THREE.Mesh(windowGeometry, windowMaterial);
                window1.position.set(1, 1, 1.51);
                scene.add(window1);

                const window2 = new THREE.Mesh(windowGeometry, windowMaterial);
                window2.position.set(-1, 1, 1.51);
                scene.add(window2);

                // Animate
                function animate() {
                    requestAnimationFrame(animate);
                    particleSystem.update();
                    renderer.render(scene, camera);
                }
                animate();
            }

            // --- Parallax Scroll Effect ---
            function setupParallax() {
                window.addEventListener('scroll', () => {
                    const scrollY = window.scrollY;
                    const sun = document.getElementById('sun');
                    const horizon = document.getElementById('horizon');
                    sun.style.transform = `translateX(-50%) translateY(${scrollY * 0.3}px)`;
                    horizon.style.bottom = `${15 + scrollY * 0.5}vh`;
                });
            }

            // --- Initialize ---
            createCacti();
            createTumbleweeds();
            initThreeJS();
            setupParallax();

            // --- Resize Handling ---
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // --- Dust Clouds ---
            const dustClouds = [];
            for (let i = 0; i < 5; i++) {
                const cloud = document.createElement('div');
                cloud.style.position = 'absolute';
                cloud.style.width = `${Math.random() * 20 + 10}vw`;
                cloud.style.height = '5vh';
                cloud.style.background = 'rgba(255, 255, 255, 0.3)';
                cloud.style.borderRadius = '50%';
                cloud.style.bottom = `${Math.random() * 30 + 20}vh`;
                cloud.style.left = `${Math.random() * 90 + 5}vw`;
                cloud.style.zIndex = '4';
                cloud.style.opacity = '0.5';
                app.appendChild(cloud);
                dustClouds.push(cloud);

                let pos = 0;
                function animateDust() {
                    pos += 0.2;
                    cloud.style.left = `${(pos + Math.random() * 2) % 100}vw`;
                    requestAnimationFrame(animateDust);
                }
                animateDust();
            }
        });
    </script>
