<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SMASH STAGE - Rock & Roll Destruction</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

@font-face {
  font-family: 'StageFont';
  src: local('Impact'), local('Arial Black'), local('Helvetica Neue');
}

:root {
  --blood: #cc0000;
  --blood-dark: #8a0000;
  --blood-light: #ff3333;
  --electric-blue: #00d4ff;
  --neon-pink: #ff0066;
  --smoke: #1a1a1a;
  --ash: #2a2a2a;
  --charcoal: #0d0d0d;
  --gold: #ffcc00;
  --gold-dark: #b38f00;
  --wood: #8B4513;
  --wood-dark: #5D2906;
  --metal: #4a4a4a;
  --metal-shine: #7a7a7a;
  --cyber-purple: #9d00ff;
  --laser-green: #00ff88;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--charcoal);
  font-family: 'StageFont', Impact, 'Arial Black', sans-serif;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

#stage-container {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

#canvas-3d {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

#canvas-particles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

#canvas-grid {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  pointer-events: none;
  opacity: 0.3;
}

#ui-layer {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 10;
  pointer-events: none;
  display: flex;
  flex-direction: column;
}

#top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
  pointer-events: none;
}

#top-bar .stat-box {
  background: rgba(204, 0, 0, 0.3);
  border: 2px solid var(--blood);
  border-radius: 8px;
  padding: 6px 14px;
  color: var(--gold);
  font-size: 16px;
  text-shadow: 0 0 10px var(--blood);
  letter-spacing: 2px;
  min-width: 70px;
  text-align: center;
}

#top-bar .stat-box .label {
  display: block;
  font-size: 9px;
  color: var(--electric-blue);
  text-transform: uppercase;
  letter-spacing: 3px;
}

#top-bar .stat-box .value {
  display: block;
  font-size: 22px;
  line-height: 1.2;
}

#game-area {
  flex: 1;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px;
}

#smash-zone {
  width: 260px;
  height: 260px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  pointer-events: auto;
  perspective: 800px;
  margin: 20px 0;
}

#smash-zone .instrument-sprite {
  width: 160px;
  height: 160px;
  position: relative;
  transition: transform 0.1s ease;
  filter: drop-shadow(0 0 20px rgba(255, 51, 51, 0.5));
}

#smash-zone .instrument-sprite svg {
  width: 100%;
  height: 100%;
}

#smash-zone .instrument-sprite.broken {
  animation: breakAnim 0.6s ease-out forwards;
}

@keyframes breakAnim {
  0% { transform: rotate(0deg) scale(1); }
  20% { transform: rotate(-15deg) scale(1.1); }
  40% { transform: rotate(20deg) scale(0.95); }
  60% { transform: rotate(-10deg) scale(1.05); }
  80% { transform: rotate(5deg) scale(0.98); }
  100% { transform: rotate(0deg) scale(1); filter: none; opacity: 0.7; }
}

#smash-zone .impact-ring {
  position: absolute;
  width: 60px;
  height: 60px;
  border: 3px solid var(--electric-blue);
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
  transform: scale(0);
}

#smash-zone .impact-ring.active {
  animation: impactPulse 0.5s ease-out forwards;
}

@keyframes impactPulse {
  0% { transform: scale(0); opacity: 1; }
  100% { transform: scale(4); opacity: 0; border-width: 1px; }
}

#smash-zone .combo-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: var(--gold);
  font-size: 48px;
  text-shadow: 0 0 20px var(--gold), 0 0 40px var(--neon-pink);
  pointer-events: none;
  opacity: 0;
  z-index: 5;
}

#smash-zone .combo-text.show {
  animation: comboPop 0.8s ease-out forwards;
}

@keyframes comboPop {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  20% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
  40% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -100%) scale(0.8); }
}

#controls-area {
  padding: 15px;
  text-align: center;
  pointer-events: auto;
}

#smash-btn {
  background: linear-gradient(180deg, var(--blood) 0%, var(--blood-dark) 100%);
  border: 3px solid var(--gold);
  border-radius: 50%;
  width: 130px;
  height: 130px;
  color: var(--gold);
  font-size: 20px;
  font-family: inherit;
  font-weight: bold;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(204, 0, 0, 0.5), inset 0 0 20px rgba(255,204,0,0.2);
  transition: all 0.1s;
  position: relative;
  overflow: hidden;
}

#smash-btn:active {
  transform: scale(0.9);
  box-shadow: 0 0 10px rgba(204, 0, 0, 0.8);
}

#smash-btn::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(from 0deg, transparent, rgba(255,204,0,0.3), transparent);
  animation: spinGlow 3s linear infinite;
  opacity: 0.5;
}

@keyframes spinGlow {
  100% { transform: rotate(360deg); }
}

#smash-btn .btn-inner {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
}

#smash-btn .btn-icon {
  font-size: 32px;
  line-height: 1;
  margin-bottom: 2px;
}

#instruction {
  color: var(--electric-blue);
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 10px;
  text-shadow: 0 0 10px var(--electric-blue);
}

#progress-container {
  width: 90%;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  margin: 8px auto;
  overflow: hidden;
  border: 1px solid var(--blood);
}

#progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--blood), var(--neon-pink), var(--electric-blue));
  border-radius: 3px;
  transition: width 0.3s;
  box-shadow: 0 0 10px var(--blood);
}

#stage-floor {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 60px;
  background: linear-gradient(0deg, var(--charcoal), transparent);
  z-index: 2;
  pointer-events: none;
}

#screen-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 100;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s;
}

#screen-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

#start-screen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at center, #1a0000 0%, #0d0d0d 70%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 101;
}

#start-screen .title {
  font-size: 42px;
  color: var(--gold);
  text-shadow: 0 0 30px var(--blood), 0 0 60px var(--blood), 0 0 100px var(--neon-pink);
  letter-spacing: 8px;
  margin-bottom: 15px;
  text-transform: uppercase;
  animation: titlePulse 2s ease-in-out infinite;
}

@keyframes titlePulse {
  0%, 100% { transform: scale(1); text-shadow: 0 0 30px var(--blood), 0 0 60px var(--blood); }
  50% { transform: scale(1.05); text-shadow: 0 0 50px var(--blood), 0 0 100px var(--blood), 0 0 150px var(--neon-pink); }
}

#start-screen .subtitle {
  font-size: 12px;
  color: var(--electric-blue);
  letter-spacing: 4px;
  margin-bottom: 30px;
  text-transform: uppercase;
}

#start-screen .start-btn {
  background: linear-gradient(180deg, var(--blood) 0%, var(--blood-dark) 100%);
  border: 3px solid var(--gold);
  border-radius: 50px;
  padding: 16px 40px;
  color: var(--gold);
  font-size: 18px;
  font-family: inherit;
  font-weight: bold;
  letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(204, 0, 0, 0.5);
  transition: all 0.2s;
}

#start-screen .start-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 50px rgba(204, 0, 0, 0.8);
}

#game-over-screen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at center, rgba(50,0,0,0.9) 0%, rgba(0,0,0,0.95) 100%);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 102;
}

#game-over-screen.show {
  display: flex;
}

#game-over-screen .game-over-title {
  font-size: 36px;
  color: var(--blood);
  text-shadow: 0 0 20px var(--blood);
  letter-spacing: 6px;
  margin-bottom: 15px;
  text-transform: uppercase;
}

#game-over-screen .final-score {
  font-size: 56px;
  color: var(--gold);
  text-shadow: 0 0 30px var(--gold);
  margin-bottom: 25px;
}

#game-over-screen .restart-btn {
  background: linear-gradient(180deg, var(--blood) 0%, var(--blood-dark) 100%);
  border: 2px solid var(--gold);
  border-radius: 30px;
  padding: 14px 36px;
  color: var(--gold);
  font-size: 16px;
  font-family: inherit;
  font-weight: bold;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
}

#floating-points {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 20;
}

.float-point {
  position: absolute;
  color: var(--gold);
  font-size: 20px;
  font-weight: bold;
  text-shadow: 0 0 10px var(--gold);
  pointer-events: none;
  animation: floatUp 1s ease-out forwards;
}

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
}

#screen-shake {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 50;
  pointer-events: none;
}

#screen-shake.shaking {
  animation: shake 0.4s ease-out;
}

@keyframes shake {
  0% { transform: translate(0, 0) rotate(0deg); }
  10% { transform: translate(-8px, -8px) rotate(-2deg); }
  20% { transform: translate(8px, -4px) rotate(2deg); }
  30% { transform: translate(-6px, 4px) rotate(0deg); }
  40% { transform: translate(6px, 6px) rotate(-1deg); }
  50% { transform: translate(-4px, -4px) rotate(1deg); }
  60% { transform: translate(4px, 2px) rotate(0deg); }
  70% { transform: translate(-2px, -2px) rotate(-0.5deg); }
  80% { transform: translate(2px, 2px) rotate(0.5deg); }
  90% { transform: translate(-1px, -1px) rotate(0deg); }
  100% { transform: translate(0, 0) rotate(0deg); }
}

#speaker-indicator {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 3px;
  pointer-events: none;
  z-index: 5;
}

.speaker-bar {
  width: 5px;
  background: var(--electric-blue);
  border-radius: 2px;
  height: 4px;
  transition: height 0.1s;
  box-shadow: 0 0 5px var(--electric-blue);
}

#vignette {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 5;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.8) 100%);
}

#flash-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  z-index: 51;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.05s;
}

#flash-overlay.flash {
  opacity: 0.7;
}

#scanlines {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 6;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.04) 2px,
    rgba(0,0,0,0.04) 4px
  );
}

#glitch-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 7;
  pointer-events: none;
  opacity: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent 0px,
    transparent 2px,
    rgba(255,0,102,0.04) 2px,
    rgba(255,0,102,0.04) 4px
  );
}

#glitch-overlay.active {
  animation: glitchAnim 0.4s ease-out;
}

@keyframes glitchAnim {
  0% { transform: translateX(0); opacity: 0.15; }
  20% { transform: translateX(-5px); }
  40% { transform: translateX(5px); opacity: 0.2; }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
  100% { transform: translateX(0); opacity: 0; }
}

#combo-meter {
  position: absolute;
  top: 75px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  pointer-events: none;
  text-align: center;
}

#combo-meter .combo-label {
  font-size: 9px;
  color: var(--electric-blue);
  letter-spacing: 4px;
  text-transform: uppercase;
}

#combo-meter .combo-value {
  font-size: 32px;
  color: var(--gold);
  text-shadow: 0 0 20px var(--gold);
  opacity: 0;
  transition: opacity 0.15s;
}

#combo-meter .combo-value.visible {
  opacity: 1;
}

#multiplier {
  position: absolute;
  top: 115px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  pointer-events: none;
}

#multiplier .mult-value {
  font-size: 14px;
  color: var(--neon-pink);
  text-shadow: 0 0 10px var(--neon-pink);
  opacity: 0;
  transition: opacity 0.15s;
}

#multiplier .mult-value.visible {
  opacity: 1;
}

#energy-bar {
  position: absolute;
  top: 8px;
  width: 180px;
  height: 3px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  z-index: 10;
  overflow: hidden;
}

#energy-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blood), var(--neon-pink));
  width: 0%;
  transition: width 0.15s;
  box-shadow: 0 0 8px var(--blood);
}

#instrument-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  pointer-events: auto;
  z-index: 15;
  position: relative;
}

.instrument-btn {
  background: rgba(0,0,0,0.6);
  border: 2px solid var(--metal);
  border-radius: 6px;
  padding: 6px 12px;
  color: #aaa;
  font-size: 10px;
  font-family: inherit;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}

.instrument-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.instrument-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(255,204,0,0.15);
  box-shadow: 0 0 15px rgba(255,204,0,0.3);
  text-shadow: 0 0 5px var(--gold);
}

@media (max-width: 400px) {
  #smash-btn {
    width: 110px;
    height: 110px;
    font-size: 16px;
  }
  #smash-btn .btn-icon {
    font-size: 24px;
  }
  .title {
    font-size: 32px !important;
  }
}
</style>
</head>

<script>
  const MODEL_SLUG = "ling-1t"; // 🔧 match the `path` column in games.csv

  (async function loadGameBanner() {
    try {
      const res = await fetch('../games.csv', { cache: 'no-store' });
      const text = await res.text();
      const rows = text.trim().split('\n').map(r => r.split(','));
      const headers = rows.shift();
      const data = rows.map(row => {
        const obj = {};
        headers.forEach((h, i) => obj[h.trim()] = (row[i] || '').trim());
        return obj;
      });

      const match = data.find(row => row.path === MODEL_SLUG);

      if (!match) {
        document.getElementById('banner-game-name').textContent = MODEL_SLUG;
        document.getElementById('banner-stars').textContent = '☆☆☆☆☆';
        return;
      }

      document.getElementById('banner-game-name').textContent = match.game_name || MODEL_SLUG;
      document.getElementById('banner-model-slug').textContent = match.path;

      const starCount = parseInt(match.stars, 10) || 0;
      document.getElementById('banner-stars').textContent =
        '★'.repeat(starCount) + '☆'.repeat(Math.max(0, 5 - starCount));

      if (match.youtube_link) {
        const watchEl = document.getElementById('banner-watch');
        watchEl.href = match.youtube_link;
        watchEl.style.display = 'inline-flex';
      }

    } catch (err) {
      console.error('Banner error:', err);
      document.getElementById('banner-game-name').textContent = MODEL_SLUG;
    }
  })();
</script>

<script>

(function() {
  'use strict';
  
  // ============================================
  // GAME STATE
  // ============================================
  const GameState = {
    score: 0,
    timeLeft: 30,
    smashes: 0,
    combo: 0,

    isPlaying: false,
    gameTime: 0,
    energy: 0,

    totalDamage: 0
  };
  
  // DOM Elements
  const $ = id => document.getElementById(id);
  const scoreValue = $('score-value');
  const timeValue = $('time-value');
  const smashesValue = $('smashes-value');
  const multiValue = $('multi-value');

  const instrumentSprite = $('instrument-sprite');

  const instrumentBtns = document.querySelectorAll('.instrument-btn');
  const canvas3D = $('canvas-3d');
  const canvasParticles = $('canvas-particles');
  const canvasGrid = $('canvas-grid');
  
  // Canvas contexts
  const ctx3D = canvas3D.getContext('2d');
  const ctxParticles = canvasParticles.getContext('2d');
  const ctxGrid = canvasGrid.getContext('2d');
  
  // SVG elements
  const guitarSvg = $('guitar-svg');
  const drumsSvg = $('drums-svg');
  const ampSvg = $('amp-svg');
  
  // Three.js globals
  let scene, camera, renderer;
  let objects3D = [];
  let particles = [];
  let sparks = [];
  let debris = [];
  let smokeParticles = [];
  let laserBeams = [];
  
  // Audio context
  let audioCtx;
  
  // ============================================
  // RESIZE
  // ============================================
  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas3D.width = w;
    canvas3D.height = h;
    canvasParticles.width = w;
    canvasParticles.height = h;
    canvasGrid.width = w;
    canvasGrid.height = h;
    drawGrid();
    
    if (renderer) {
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
  }
  
  function drawGrid() {
    const ctx = ctxGrid;
    ctx.clearRect(0, 0, canvasGrid.width, canvasGrid.height);
    ctx.strokeStyle = 'rgba(255, 0, 102, 0.08)';
    ctx.lineWidth = 1;
    
    const gridSize = 50;
    for (let x = 0; x < canvasGrid.width; x += gridSize) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, canvasGrid.height);
      ctx.stroke();
    }
    for (let y = 0; y < canvasGrid.height; y += gridSize) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(canvasGrid.width, y);
      ctx.stroke();
    }
  }

    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x050505, 8, 40);
    
    camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 10);
    
    renderer = new THREE.WebGLRenderer({
      canvas: canvas3D,
      alpha: true,
      antialias: true

  // ============================================
  // ANIMATION LOOPS

  let lastTime3D = 0;
  
  function animate3D(timestamp) {
    if (!GameState.isPlaying) return;
    
    const delta = (timestamp - lastTime3D) / 1000;
    lastTime3D = timestamp;
    
    objects3D.forEach(obj => {
      obj.rotation.y += 0.003;
      obj.position.x = Math.sin(timestamp * 0.001) * 0.3;
    });
    
    THREE_SCENE.objs.mainLight.position.x = Math.sin(timestamp * 0.002) * 3;
    THREE_SCENE.objs.laserLight.position.y = 5 + Math.sin(timestamp * 0.003) * 2;
    
    camera.position.x = Math.sin(timestamp * 0.0008) * 0.8;
    camera.position.y = 5 + Math.cos(timestamp * 0.0005) * 0.5;
    camera.lookAt(0, 0, 0);
    
    try {
      THREE_SCENE.objs.renderer.render(THREE_SCENE.objs.scene, THREE_SCENE.objs.camera);
    } catch(e) {}
    
    requestAnimationFrame(animate3D);
  }
  
  function animateParticles(timestamp) {
    const ctx = ctxParticles;
    ctx.clearRect(0, 0, canvasParticles.width, canvasParticles.height);
    
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.x += s.vx;
      s.y += s.vy;
      s.vy += 0.4;
      s.vx *= 0.97;
      s.life -= s.decay;
      
      if (s.life <= 0) {
        sparks.splice(i, 1);
        continue;
      }
      
      ctx.globalAlpha = s.life;
      
      if (s.trail.length > 0) {
        ctx.strokeStyle = s.color;
        ctx.lineWidth = s.size * 0.5 * s.life;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        for (let t = 0; t < Math.min(s.trail.length, 5); t++) {
          ctx.lineTo(s.trail[t].x, s.trail[t].y);
        }
        ctx.stroke();
      }
      
      s.trail.unshift({ x: s.x, y: s.y });
      if (s.trail.length > 10) s.trail.pop();
      
      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * s.life);
      grad.addColorStop(0, s.color);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
      ctx.fill();
    }
    
    for (let i = debris.length - 1; i >= 0; i--) {
      const d = debris[i];
      d.x += d.vx;
      d.y += d.vy;
      d.vy += 0.5;
      d.vx *= 0.98;
      d.rotation += d.rotSpeed;
      d.life -= d.decay;
      
      if (d.life <= 0) {
        debris.splice(i, 1);
        continue;
      }
      
      ctx.globalAlpha = d.life;
      ctx.fillStyle = d.color;
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.rotation);
      
      if (d.shape === 'rect') {
        ctx.fillRect(-d.size/2, -d.size/4, d.size, d.size/2);
      } else {
        ctx.beginPath();
        ctx.moveTo(0, -d.size/2);
        ctx.lineTo(d.size/2, d.size/2);
        ctx.lineTo(-d.size/2, d.size/2);
        ctx.closePath();
        ctx.fill();
      }
      
      ctx.restore();
      
      ctx.globalAlpha = d.life * 0.2;
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(d.x, canvasParticles.height - 10, d.size * 0.5, 3, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    
    for (let i = smokeParticles.length - 1; i >= 0; i--) {
      const s = smokeParticles[i];
      s.x += s.vx;
      s.y += s.vy;
      s.vx *= 0.98;
      s.vy -= 0.1;
      s.life -= s.decay;
      s.size += 0.5;
      
      if (s.life <= 0) {
        smokeParticles.splice(i, 1);
        continue;
      }
      
      const alpha = s.life * 0.3;
      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size);
      grad.addColorStop(0, `rgba(40, 40, 40, ${alpha})`);
      grad.addColorStop(0.5, `rgba(30, 30, 30, ${alpha * 0.5})`);
      grad.addColorStop(1, 'rgba(15, 15, 15, 0)');
      
      ctx.globalAlpha = 1;
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
    }
    
    for (let i = laserBeams.length - 1; i >= 0; i--) {
      const l = laserBeams[i];
      l.length += 15;
      l.life -= l.decay;
      
      if (l.life <= 0) {
        laserBeams.splice(i, 1);
        continue;
      }
      
      ctx.globalAlpha = l.life * 0.6;
      
      const glowGrad = ctx.createLinearGradient(l.x, l.y - l.width/2, l.x, l.y + l.width/2);
      glowGrad.addColorStop(0, 'transparent');
      glowGrad.addColorStop(0.5, l.color);
      glowGrad.addColorStop(1, 'transparent');
      ctx.strokeStyle = glowGrad;
      ctx.lineWidth = l.width * 3;
      ctx.beginPath();
      ctx.moveTo(l.x, l.y);
      ctx.lineTo(l.x + l.length * 0.3, l.y - l.length * 0.5);
      ctx.stroke();
      
      ctx.globalAlpha = l.life;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = l.width * 0.5;
      ctx.beginPath();
      ctx.moveTo(l.x, l.y);
      ctx.lineTo(l.x + l.length * 0.3, l.y - l.length * 0.5);
      ctx.stroke();
    }
    
    ctx.globalAlpha = 1;
    requestAnimationFrame(animateParticles);
  }

  function initAudio() {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      console.log('Audio not available');
    }
  }
  
  function playSmashSound(type) {
    if (!audioCtx) return;
    
    try {
      const bufferSize = audioCtx.sampleRate * 0.15;
      const buffer = audioCtx.createBuffer(2, bufferSize, audioCtx.sampleRate);
      
      for (let ch = 0; ch < 2; ch++) {
        const data = buffer.getChannelData(ch);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
        }
      }
      
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = type === 'drums' ? 150 : type === 'amp' ? 100 : 250;
      filter.Q.value = 1;
      
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      noise.start();
      
      if (type !== 'drums') {
        const osc = audioCtx.createOscillator();
        const oscGain = audioCtx.createGain();
        osc.type = 'sine';
        const freq = type === 'amp' ? 400 : 600;
        osc.frequency.value = freq + Math.random() * 200;
        oscGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(oscGain);
        oscGain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      }
      
      if (type === 'drums') {
        const osc = audioCtx.createOscillator();
        const oscGain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = 80;
        oscGain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(oscGain);
        oscGain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
      }
    } catch(e) {}
  }
  
  function playComboSound(combo) {
    if (!audioCtx) return;
    
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.value = 150 + combo * 80;
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    } catch(e) {}
  }

  // ============================================
  // GAME LOGIC - REBALANCED
  // ============================================
  function calculateScore() {
    const baseScore = 250;
    const comboBonus = GameState.combo * 20;
    const multiplier = Math.pow(1.5, GameState.multiplier - 1);
    return Math.floor((baseScore + comboBonus) * multiplier);
  }
  
  function performSmash(e) {
    if (!GameState.isPlaying) return;
    
    const now = Date.now();
    if (now - GameState.lastSmashTime < 180) return;
    GameState.lastSmashTime = now;
    
    GameState.smashes++;
    GameState.combo++;
    GameState.totalDamage++;
    
    if (GameState.comboTimer) {
      clearTimeout(GameState.comboTimer);
    }
    GameState.comboTimer = setTimeout(() => {
      if (GameState.isPlaying && GameState.combo > 0) {
        resetCombo();
      }
    }, 2500);
    
    if (GameState.combo > 0) {
      GameState.multiplier = Math.min(GameState.multiplier + 0.15, 4);
    }
    
    const points = calculateScore();
    GameState.score += points;
    
    scoreValue.textContent = GameState.score.toLocaleString();
    smashesValue.textContent = GameState.smashes;
    multiValue.textContent = GameState.multiplier.toFixed(1) + 'x';
    
    const damagePercent = Math.min((GameState.totalDamage / 50) * 100, 100);
    progressBar.style.width = damagePercent + '%';
    
    if (GameState.combo > 1) {
      comboValue.textContent = 'x' + GameState.combo;
      comboValue.classList.add('visible');
      multValue.textContent = 'x' + GameState.multiplier.toFixed(1) + ' MULTIPLIER';
      multValue.classList.add('visible');
      
      if (GameState.combo > GameState.maxCombo) {
        GameState.maxCombo = GameState.combo;
      }
      
      playComboSound(GameState.combo);
    }
    
    if (GameState.combo > 2) {
      comboText.textContent = GameState.combo + 'x COMBO!';
      comboText.classList.add('show');
      setTimeout(() => comboText.classList.remove('show'), 800);
    }
    
    instrumentSprite.classList.add('broken');
    setTimeout(() => instrumentSprite.classList.remove('broken'), 600);
    
    impactRing.classList.remove('active');
    void impactRing.offsetWidth;
    impactRing.classList.add('active');
    
    const rect = smashZone.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    
    if (GameState.combo > 3) {
      createShockwave(cx, cy);
    }
    
    createFloatingText(
      cx + (Math.random() - 0.5) * 80,
      cy + (Math.random() - 0.5) * 60,
      '+' + points.toLocaleString(),
      GameState.combo > 3 ? '#00ff88' : GameState.combo > 1 ? '#ffcc00' : '#ff3333'
    );
    
    const type = GameState.currentInstrument;
    let particleCount, debrisCount;
    
    if (type === 'drums') {
      particleCount = 40;
      debrisCount = 15;
    } else if (type === 'amp') {
      particleCount = 50;
      debrisCount = 20;
    } else {
      particleCount = 30;
      debrisCount = 10;
    }
    
    createSparks(cx, cy, particleCount);
    createSmoke(cx, cy, 12);
    createDebris(cx, cy, debrisCount, type);
    
    if (GameState.combo % 5 === 0 && GameState.combo > 0) {
      createLaserBeam(cx, cy);
      for (let i = 0; i < 5; i++) {
        setTimeout(() => {
          createSparks(cx + (Math.random() - 0.5) * 200, cy + (Math.random() - 0.5) * 200, 25);
        }, i * 50);
      }
    }
    
    if (GameState.combo > 5) {
      screenShakeEffect();
    }
    
    if (GameState.combo > 8) {
      glitchEffect();
    }
    
    screenFlash();
    playSmashSound(type);
    
    const crackCount = Math.floor(GameState.totalDamage / 6);
    for (let i = GameState.cracks || 0; i < crackCount; i++) {
      addRandomCrack();
    }
    GameState.cracks = crackCount;
  }
  
  function addRandomCrack() {
    const currentSvg = document.querySelector('#instrument-sprite svg');
    if (!currentSvg) return;
    
    const existingCracks = currentSvg.querySelectorAll('.damage-crack');
    if (existingCracks.length >= 8) return;
    
    const crack = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const x = 20 + Math.random() * 160;
    const y = 20 + Math.random() * 160;
    const len = 10 + Math.random() * 20;
    const angle = Math.random() * Math.PI * 2;
    
    crack.setAttribute('d', 
      `M${x},${y} ` +
      `Q${x+Math.cos(angle)*len/2+Math.random()*10-5},${y+Math.sin(angle)*len/2+Math.random()*10-5} ` +
      `${x+Math.cos(angle)*len},${y+Math.sin(angle)*len}`
    );
    crack.setAttribute('fill', 'none');
    crack.setAttribute('stroke', '#111');
    crack.setAttribute('stroke-width', '1.5');
    crack.setAttribute('stroke-linecap', 'round');
    crack.classList.add('damage-crack');
    currentSvg.appendChild(crack);
  }
  
  function resetCombo() {
    GameState.combo = 0;
    GameState.multiplier = 1;
    comboValue.classList.remove('visible');
    multValue.classList.remove('visible');
  }

  function startTimer() {
    const timerInterval = setInterval(() => {
      if (!GameState.isPlaying) {
        clearInterval(timerInterval);
        return;
      }
      
      GameState.timeLeft--;
      GameState.gameTime++;
      timeValue.textContent = GameState.timeLeft;
      
      GameState.energy = (GameState.energy + 2) % 100;
      energyFill.style.width = GameState.energy + '%';
      
      if (GameState.gameTime % 10 === 0) {
        updateSpeakerBars();
      }
      
      if (GameState.timeLeft <= 10) {
        timeValue.style.color = '#ff3333';
        timeValue.style.textShadow = '0 0 10px #ff3333';
      }
      
      if (GameState.timeLeft <= 0) {
        clearInterval(timerInterval);
        endGame();
      }
    }, 1000);
  }
  
  // ============================================
  // GAME FLOW
  // ============================================
  function startGame() {
    GameState.score = 0;
    GameState.timeLeft = 30;
    GameState.smashes = 0;
    GameState.combo = 0;
    GameState.maxCombo = 0;
    GameState.totalDamage = 0;
    GameState.energy = 0;
    GameState.multiplier = 1;
    GameState.isPlaying = true;
    
    scoreValue.textContent = '0';
    timeValue.textContent = '30';
    smashesValue.textContent = '0';
    multiValue.textContent = '1.0x';
    progressBar.style.width = '0%';
    comboValue.textContent = 'x1';
    comboValue.classList.remove('visible');
    multValue.classList.remove('visible');
    timeValue.style.color = '';
    timeValue.style.textShadow = '';
    energyFill.style.width = '0%';
    
    sparks = [];
    debris = [];
    smokeParticles = [];
    laserBeams = [];
    
    document.querySelectorAll('.damage-crack').forEach(c => c.remove());
    GameState.cracks = 0;
    
    instrumentSprite.style.opacity = '1';
    
    startScreen.style.display = 'none';
    gameOverScreen.classList.remove('show');
    
    if (!audioCtx) {
      initAudio();
    }
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    
    startTimer();
    lastTime3D = performance.now();
    animate3D(lastTime3D);
    animateParticles();
  }
  
  function endGame() {
    GameState.isPlaying = false;
    
    finalScore.textContent = GameState.score.toLocaleString();
    gameOverScreen.classList.add('show');
    
    const rect = smashZone.getBoundingClientRect();
    createSparks(rect.left + rect.width/2, rect.top + rect.height/2, 100);
    createDebris(rect.left + rect.width/2, rect.top + rect.height/2, 50, GameState.currentInstrument);
    createSmoke(rect.left + rect.width/2, rect.top + rect.height/2, 30);
    
    for (let i = 0; i < 5; i++) {
      setTimeout(() => {
        screenFlash();
        createLaserBeam(rect.left + Math.random() * 300, rect.top + Math.random() * 300);
      }, i * 200);
    }
    
    screenShakeEffect();
    instrumentSprite.style.opacity = '0.2';
  }
  
  // ============================================
  // EVENT HANDLERS
  // ============================================
  function handleSmash(e) {
    e.preventDefault();
    performSmash(e);
  }
  
  function handleMouseMove(e) {
    if (!GameState.isPlaying) return;
    const x = (e.clientX / window.innerWidth - 0.5) * 10;
    const y = (e.clientY / window.innerHeight - 0.5) * 5;
    objects3D.forEach(obj => {
      obj.position.x = x * 0.2;
    });
  }
  
  // ============================================
  // INITIALIZATION
  // ============================================
  function init() {
    resize();
    window.addEventListener('resize', resize);
    
    smashBtn.addEventListener('click', handleSmash);
    smashZone.addEventListener('click', handleSmash);
    smashZone.addEventListener('touchstart', function(e) {
      e.preventDefault();
      handleSmash(e);
    }, { passive: false });
    
    document.addEventListener('mousemove', handleMouseMove);
    
    instrumentBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        switchInstrument(this.dataset.instrument);
      });
    });
    
    startBtn.addEventListener('click', startGame);
    restartBtn.addEventListener('click', startGame);
    
    guitarSvg.style.display = 'block';
    drumsSvg.style.display = 'none';
    ampSvg.style.display = 'none';
    
    switchInstrument('guitar');
    drawGrid();
  }
  
  init();
  init3DScene();
  animateParticles();
  updateSpeakerBars();
  setInterval(updateSpeakerBars, 150);
  
})();
</script>
</body>
</html>
