<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SMASH STAGE - Rock & Roll Destruction</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

@font-face {
  font-family: 'StageFont';
  src: local('Impact'), local('Arial Black'), local('Helvetica Neue');
}

:root {
  --blood: #cc0000;
  --blood-dark: #8a0000;
  --blood-light: #ff3333;
  --electric-blue: #00d4ff;
  --neon-pink: #ff0066;
  --smoke: #1a1a1a;
  --ash: #2a2a2a;
  --charcoal: #0d0d0d;
  --gold: #ffcc00;
  --gold-dark: #b38f00;
  --wood: #8B4513;
  --wood-dark: #5D2906;
  --metal: #4a4a4a;
  --metal-shine: #7a7a7a;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--charcoal);
  font-family: 'StageFont', Impact, 'Arial Black', sans-serif;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

#stage-container {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

#canvas-3d {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

#canvas-particles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  pointer-events: none;
}

#ui-layer {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 10;
  pointer-events: none;
  display: flex;
  flex-direction: column;
}

#top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
  pointer-events: none;
}

#top-bar .stat-box {
  background: rgba(204, 0, 0, 0.3);
  border: 2px solid var(--blood);
  border-radius: 8px;
  padding: 6px 14px;
  color: var(--gold);
  font-size: 18px;
  text-shadow: 0 0 10px var(--blood);
  letter-spacing: 2px;
  min-width: 80px;
  text-align: center;
}

#top-bar .stat-box .label {
  display: block;
  font-size: 10px;
  color: var(--electric-blue);
  text-transform: uppercase;
  letter-spacing: 3px;
}

#top-bar .stat-box .value {
  display: block;
  font-size: 24px;
  line-height: 1.2;
}

#game-area {
  flex: 1;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

#smash-zone {
  width: 280px;
  height: 280px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  pointer-events: auto;
  perspective: 800px;
}

#smash-zone .guitar-sprite {
  width: 180px;
  height: 180px;
  position: relative;
  transition: transform 0.1s ease;
  filter: drop-shadow(0 0 20px rgba(255, 51, 51, 0.5));
}

#smash-zone .guitar-sprite svg {
  width: 100%;
  height: 100%;
}

#smash-zone .guitar-sprite.broken {
  animation: breakAnim 0.6s ease-out forwards;
}

@keyframes breakAnim {
  0% { transform: rotate(0deg) scale(1); }
  20% { transform: rotate(-15deg) scale(1.1); }
  40% { transform: rotate(20deg) scale(0.95); }
  60% { transform: rotate(-10deg) scale(1.05); }
  80% { transform: rotate(5deg) scale(0.98); }
  100% { transform: rotate(0deg) scale(1); filter: none; opacity: 0.7; }
}

#smash-zone .impact-ring {
  position: absolute;
  width: 60px;
  height: 60px;
  border: 3px solid var(--electric-blue);
  border-radius: 50%;
  pointer-events: none;
  opacity: 0;
  transform: scale(0);
}

#smash-zone .impact-ring.active {
  animation: impactPulse 0.5s ease-out forwards;
}

@keyframes impactPulse {
  0% { transform: scale(0); opacity: 1; }
  100% { transform: scale(4); opacity: 0; border-width: 1px; }
}

#smash-zone .combo-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: var(--gold);
  font-size: 48px;
  text-shadow: 0 0 20px var(--gold), 0 0 40px var(--neon-pink);
  pointer-events: none;
  opacity: 0;
  z-index: 5;
}

#smash-zone .combo-text.show {
  animation: comboPop 0.8s ease-out forwards;
}

@keyframes comboPop {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  20% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
  40% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -100%) scale(0.8); }
}

#controls-area {
  padding: 20px;
  text-align: center;
  pointer-events: auto;
}

#smash-btn {
  background: linear-gradient(180deg, var(--blood) 0%, var(--blood-dark) 100%);
  border: 3px solid var(--gold);
  border-radius: 50%;
  width: 140px;
  height: 140px;
  color: var(--gold);
  font-size: 24px;
  font-family: inherit;
  font-weight: bold;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(204, 0, 0, 0.5), inset 0 0 20px rgba(255,204,0,0.2);
  transition: all 0.1s;
  position: relative;
  overflow: hidden;
}

#smash-btn:active {
  transform: scale(0.9);
  box-shadow: 0 0 10px rgba(204, 0, 0, 0.8);
}

#smash-btn::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(from 0deg, transparent, rgba(255,204,0,0.3), transparent);
  animation: spinGlow 3s linear infinite;
  opacity: 0.5;
}

@keyframes spinGlow {
  100% { transform: rotate(360deg); }
}

#smash-btn .btn-inner {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
}

#smash-btn .btn-icon {
  font-size: 36px;
  line-height: 1;
  margin-bottom: 4px;
}

#instruction {
  color: var(--electric-blue);
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 12px;
  text-shadow: 0 0 10px var(--electric-blue);
}

#progress-container {
  width: 90%;
  height: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  margin: 10px auto;
  overflow: hidden;
  border: 1px solid var(--blood);
}

#progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--blood), var(--neon-pink), var(--electric-blue));
  border-radius: 4px;
  transition: width 0.3s;
  box-shadow: 0 0 10px var(--blood);
}

#stage-floor {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 60px;
  background: linear-gradient(0deg, var(--charcoal), transparent);
  z-index: 2;
  pointer-events: none;
}

#screen-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 100;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s;
}

#screen-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

#start-screen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at center, #1a0000 0%, #0d0d0d 70%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 101;
}

#start-screen .title {
  font-size: 48px;
  color: var(--gold);
  text-shadow: 0 0 30px var(--blood), 0 0 60px var(--blood), 0 0 100px var(--neon-pink);
  letter-spacing: 8px;
  margin-bottom: 20px;
  text-transform: uppercase;
  animation: titlePulse 2s ease-in-out infinite;
}

@keyframes titlePulse {
  0%, 100% { transform: scale(1); text-shadow: 0 0 30px var(--blood), 0 0 60px var(--blood); }
  50% { transform: scale(1.05); text-shadow: 0 0 50px var(--blood), 0 0 100px var(--blood), 0 0 150px var(--neon-pink); }
}

#start-screen .subtitle {
  font-size: 14px;
  color: var(--electric-blue);
  letter-spacing: 4px;
  margin-bottom: 40px;
  text-transform: uppercase;
}

#start-screen .start-btn {
  background: linear-gradient(180deg, var(--blood) 0%, var(--blood-dark) 100%);
  border: 3px solid var(--gold);
  border-radius: 50px;
  padding: 16px 48px;
  color: var(--gold);
  font-size: 20px;
  font-family: inherit;
  font-weight: bold;
  letter-spacing: 4px;
  text-transform: uppercase;
  cursor: pointer;
  box-shadow: 0 0 30px rgba(204, 0, 0, 0.5);
  transition: all 0.2s;
}

#start-screen .start-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 50px rgba(204, 0, 0, 0.8);
}

#game-over-screen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at center, rgba(50,0,0,0.9) 0%, rgba(0,0,0,0.95) 100%);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 102;
}

#game-over-screen.show {
  display: flex;
}

#game-over-screen .game-over-title {
  font-size: 42px;
  color: var(--blood);
  text-shadow: 0 0 20px var(--blood);
  letter-spacing: 6px;
  margin-bottom: 20px;
  text-transform: uppercase;
}

#game-over-screen .final-score {
  font-size: 64px;
  color: var(--gold);
  text-shadow: 0 0 30px var(--gold);
  margin-bottom: 30px;
}

#game-over-screen .restart-btn {
  background: linear-gradient(180deg, var(--blood) 0%, var(--blood-dark) 100%);
  border: 2px solid var(--gold);
  border-radius: 30px;
  padding: 14px 36px;
  color: var(--gold);
  font-size: 16px;
  font-family: inherit;
  font-weight: bold;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
}

#floating-points {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 20;
}

.float-point {
  position: absolute;
  color: var(--gold);
  font-size: 24px;
  font-weight: bold;
  text-shadow: 0 0 10px var(--gold);
  pointer-events: none;
  animation: floatUp 1s ease-out forwards;
}

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
}

#screen-shake {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 50;
  pointer-events: none;
}

#screen-shake.shaking {
  animation: shake 0.3s ease-out;
}

@keyframes shake {
  0% { transform: translate(0, 0) rotate(0deg); }
  10% { transform: translate(-5px, -5px) rotate(-1deg); }
  20% { transform: translate(5px, -3px) rotate(1deg); }
  30% { transform: translate(-4px, 2px) rotate(0deg); }
  40% { transform: translate(3px, 4px) rotate(-0.5deg); }
  50% { transform: translate(-2px, -2px) rotate(0.5deg); }
  60% { transform: translate(2px, 1px) rotate(0deg); }
  70% { transform: translate(-1px, -1px) rotate(-0.2deg); }
  80% { transform: translate(1px, 1px) rotate(0.2deg); }
  90% { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(0, 0) rotate(0deg); }
}

#speaker-indicator {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 4px;
  pointer-events: none;
  z-index: 5;
}

.speaker-bar {
  width: 6px;
  background: var(--electric-blue);
  border-radius: 3px;
  height: 4px;
  transition: height 0.15s;
  box-shadow: 0 0 5px var(--electric-blue);
}

#vignette {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 5;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
}

#flash-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  z-index: 51;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.05s;
}

#flash-overlay.flash {
  opacity: 0.6;
}

/* Stage spotlight beams */
.spotlight {
  position: absolute;
  bottom: 0;
  width: 300px;
  height: 400px;
  background: radial-gradient(ellipse at top center, rgba(255,51,51,0.15) 0%, transparent 70%);
  pointer-events: none;
  z-index: 1;
}

.spotlight.left { left: -50px; }
.spotlight.right { right: -50px; }

/* CRT scanline effect */
#scanlines {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 6;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
}

/* Glitch overlay */
#glitch-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 7;
  pointer-events: none;
  opacity: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent 0px,
    transparent 2px,
    rgba(255,0,102,0.03) 2px,
    rgba(255,0,102,0.03) 4px
  );
}

#glitch-overlay.active {
  animation: glitchAnim 0.3s ease-out;
}

@keyframes glitchAnim {
  0% { transform: translateX(0); opacity: 0.1; }
  20% { transform: translateX(-3px); }
  40% { transform: translateX(3px); opacity: 0.15; }
  60% { transform: translateX(-2px); }
  80% { transform: translateX(2px); }
  100% { transform: translateX(0); opacity: 0; }
}

/* Combo meter */
#combo-meter {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  pointer-events: none;
  text-align: center;
}

#combo-meter .combo-label {
  font-size: 10px;
  color: var(--electric-blue);
  letter-spacing: 4px;
  text-transform: uppercase;
}

#combo-meter .combo-value {
  font-size: 36px;
  color: var(--gold);
  text-shadow: 0 0 20px var(--gold);
  opacity: 0;
  transition: opacity 0.15s;
}

#combo-meter .combo-value.visible {
  opacity: 1;
}

/* Combo multiplier */
#multiplier {
  position: absolute;
  top: 130px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  pointer-events: none;
}

#multiplier .mult-value {
  font-size: 18px;
  color: var(--neon-pink);
  text-shadow: 0 0 10px var(--neon-pink);
  opacity: 0;
  transition: opacity 0.15s;
}

#multiplier .mult-value.visible {
  opacity: 1;
}

/* Energy bar decorative */
#energy-bar {
  position: absolute;
  top: 10px;
  width: 200px;
  height: 4px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  z-index: 10;
  overflow: hidden;
}

#energy-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blood), var(--neon-pink));
  width: 0%;
  transition: width 0.15s;
  box-shadow: 0 0 10px var(--blood);
}

/* Responsive */
@media (max-width: 400px) {
  #smash-btn {
    width: 120px;
    height: 120px;
    font-size: 18px;
  }
  #smash-btn .btn-icon {
    font-size: 28px;
  }
  .title {
    font-size: 36px !important;
  }
}
</style>
</head>
<body>

<div id="stage-container">
  <canvas id="canvas-3d"></canvas>
  <canvas id="canvas-particles"></canvas>
  
  <div class="spotlight left"></div>
  <div class="spotlight right"></div>
  
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="glitch-overlay"></div>
  <div id="screen-shake"></div>
  <div id="flash-overlay"></div>
  
  <div id="ui-layer">
    <div id="energy-bar">
      <div id="energy-fill"></div>
    </div>
    
    <div id="top-bar">
      <div class="stat-box">
        <span class="label">SCORE</span>
        <span class="value" id="score-value">0</span>
      </div>
      <div class="stat-box">
        <span class="label">TIME</span>
        <span class="value" id="time-value">60</span>
      </div>
      <div class="stat-box">
        <span class="label">SMASHES</span>
        <span class="value" id="smashes-value">0</span>
      </div>
    </div>
    
    <div id="game-area">
      <div id="combo-meter">
        <div class="combo-label">COMBO</div>
        <div class="combo-value" id="combo-value">x1</div>
      </div>
      
      <div id="multiplier">
        <div class="mult-value" id="mult-value">x1 MULTIPLIER</div>
      </div>
      
      <div id="smash-zone">
        <div class="impact-ring" id="impact-ring"></div>
        <div class="combo-text" id="combo-text">COMBO!</div>
        <div class="guitar-sprite" id="guitar-sprite">
          <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="neckGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" style="stop-color:#8B4513"/>
                <stop offset="50%" style="stop-color:#D2B48C"/>
                <stop offset="100%" style="stop-color:#654321"/>
              </linearGradient>
              <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#ff4444"/>
                <stop offset="50%" style="stop-color:#cc0000"/>
                <stop offset="100%" style="stop-color:#8a0000"/>
              </linearGradient>
              <radialGradient id="bodyShine" cx="30%" cy="30%" r="70%">
                <stop offset="0%" style="stop-color:rgba(255,200,200,0.6)"/>
                <stop offset="100%" style="stop-color:rgba(255,0,0,0)"/>
              </radialGradient>
              <filter id="glow">
                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                <feMerge>
                  <feMergeNode in="coloredBlur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
            </defs>
            
            <!-- Guitar body -->
            <path d="M100,40 
                     C130,40 150,65 150,100 
                     C150,135 130,160 100,160 
                     C70,160 50,135 50,100 
                     C50,65 70,40 100,40 Z" 
                  fill="url(#bodyGrad)" stroke="#ff6666" stroke-width="3"/>
            
            <!-- Body shine -->
            <ellipse cx="85" cy="80" rx="35" ry="25" fill="url(#bodyShine)"/>
            
            <!-- Scratch marks -->
            <line x1="75" y1="55" x2="85" y2="50" stroke="#ff9999" stroke-width="2" stroke-linecap="round"/>
            <line x1="130" y1="85" x2="120" y2="95" stroke="#8a0000" stroke-width="3" stroke-linecap="round"/>
            <line x1="90" y1="140" x2="100" y2="135" stroke="#ff9999" stroke-width="2" stroke-linecap="round"/>
            
            <!-- Cracks -->
            <path d="M80,70 L85,75 L80,85" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M125,110 L130,118 L122,120" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            
            <!-- Strings hole -->
            <ellipse cx="100" cy="100" rx="22" ry="30" fill="#222" stroke="#444" stroke-width="1"/>
            
            <!-- Strings -->
            <line x1="100" y1="72" x2="100" y2="50" stroke="#ccc" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="95" y1="72" x2="95" y2="50" stroke="#ddd" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="105" y1="72" x2="105" y2="50" stroke="#ddd" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="90" y1="72" x2="90" y2="50" stroke="#eee" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="110" y1="72" x2="110" y2="50" stroke="#eee" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="85" y1="72" x2="85" y2="50" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="115" y1="72" x2="115" y2="50" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
            
            <!-- Bridge lines -->
            <line x1="88" y1="125" x2="90" y2="72" stroke="#aaa" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
            <line x1="100" y1="125" x2="100" y2="72" stroke="#aaa" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
            <line x1="112" y1="125" x2="110" y2="72" stroke="#aaa" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
            
            <!-- Bridge -->
            <rect x="85" y="122" width="30" height="4" fill="#333" rx="1"/>
            
            <!-- Input jack -->
            <circle cx="85" cy="155" r="5" fill="#555" stroke="#777" stroke-width="1"/>
            <circle cx="85" cy="155" r="2" fill="#999"/>
            
            <!-- Neck -->
            <rect x="94" y="0" width="12" height="48" fill="url(#neckGrad)" stroke="#5a3a1a" stroke-width="1"/>
            
            <!-- Fretboard -->
            <rect x="95" y="0" width="10" height="48" fill="#3d2817"/>
            
            <!-- Frets -->

  const THREE_SCENE = {};
  
  // ============================================
  // PARTICLE SYSTEM
  // ============================================
  function createSparks(x, y, count) {
    for (let i = 0; i < count; i++) {
      sparks.push({
        x: x + (Math.random() - 0.5) * 40,
        y: y + (Math.random() - 0.5) * 40,
        vx: (Math.random() - 0.5) * 10,
        vy: (Math.random() - 0.5) * 10 - 5,
        life: 1,
        decay: 0.02 + Math.random() * 0.03,
        size: 2 + Math.random() * 4,
        color: Math.random() > 0.5 ? '#ffcc00' : '#ff3333'
      });
    }
  }
  
  function createSmoke(x, y, count) {
    for (let i = 0; i < count; i++) {
      smokeParticles.push({
        x: x + (Math.random() - 0.5) * 60,
        y: y + (Math.random() - 0.5) * 60,
        vx: (Math.random() - 0.5) * 2,
        vy: -Math.random() * 2 - 1,
        life: 1,
        decay: 0.005 + Math.random() * 0.01,
        size: 10 + Math.random() * 30,
        color: '#333'
      });
    }
  }
  
  function createDebris(x, y, count) {
    for (let i = 0; i < count; i++) {
      debris.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 15,
        vy: -Math.random() * 12 - 5,
        life: 1,
        decay: 0.01 + Math.random() * 0.02,
        size: 3 + Math.random() * 8,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.3,
        color: Math.random() > 0.5 ? '#8B4513' : '#cc0000',
        type: Math.random() > 0.5 ? 'wood' : 'metal'
      });
    }
  }
  
  function createFloatingText(x, y, text, color) {
    const div = document.createElement('div');
    div.className = 'float-point';
    div.textContent = text;
    div.style.left = x + 'px';
    div.style.top = y + 'px';
    div.style.color = color || '#ffcc00';
    floatingPoints.appendChild(div);
    setTimeout(() => {
      if (div.parentNode) div.parentNode.removeChild(div);
    }, 1200);
  }
  
  // ============================================
  // ANIMATION LOOPS
  // ============================================
  let lastTime = 0;
  let frameCount = 0;
  
  function animate3D(timestamp) {
    if (!GameState.isPlaying) return;
    
    const delta = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    
    // Rotate guitar slowly
    THREE_SCENE.guitarMesh.rotation.y += 0.005;
    THREE_SCENE.guitarMesh.rotation.x = Math.sin(timestamp * 0.001) * 0.05;
    
    // Animate light
    THREE_SCENE.lightMesh.rotation.z += 0.02;
    THREE_SCENE.lightMesh.material.opacity = 0.3 + Math.sin(timestamp * 0.003) * 0.2;
    
    // Move camera slightly
    THREE_SCENE.camera.position.x = Math.sin(timestamp * 0.0005) * 0.5;
    THREE_SCENE.camera.lookAt(0, 0, 0);
    
    // Render
    try {
      THREE_SCENE.renderer.render(THREE_SCENE.scene, THREE_SCENE.camera);
    } catch(e) {}
    
    requestAnimationFrame(animate3D);
  }
  
  function animateParticles(timestamp) {
    const ctx = ctxParticles;
    ctx.clearRect(0, 0, canvasParticles.width, canvasParticles.height);
    
    // Update and draw sparks
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.x += s.vx;
      s.y += s.vy;
      s.vy += 0.3; // gravity
      s.life -= s.decay;
      
      if (s.life <= 0) {
        sparks.splice(i, 1);
        continue;
      }
      
      ctx.globalAlpha = s.life;
      ctx.fillStyle = s.color;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
      ctx.fill();
      
      // Trail
      ctx.globalAlpha = s.life * 0.3;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - s.vx * 2, s.y - s.vy * 2);
      ctx.strokeStyle = s.color;
      ctx.lineWidth = s.size * 0.5;
      ctx.stroke();
    }
    
    // Update and draw debris
    for (let i = debris.length - 1; i >= 0; i--) {
      const d = debris[i];
      d.x += d.vx;
      d.y += d.vy;
      d.vy += 0.4;
      d.vx *= 0.98;
      d.rotation += d.rotSpeed;
      d.life -= d.decay;
      
      if (d.life <= 0) {
        debris.splice(i, 1);
        continue;
      }
      
      ctx.globalAlpha = d.life;
      ctx.fillStyle = d.color;
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.rotation);
      
      if (d.type === 'wood') {
        ctx.fillRect(-d.size/2, -d.size/4, d.size, d.size/2);
      } else {
        ctx.beginPath();
        ctx.moveTo(0, -d.size/2);
        ctx.lineTo(d.size/2, d.size/2);
        ctx.lineTo(-d.size/2, d.size/2);
        ctx.closePath();
        ctx.fill();
      }
      
      ctx.restore();
    }
    
    // Update and draw smoke
    for (let i = smokeParticles.length - 1; i >= 0; i--) {
      const s = smokeParticles[i];
      s.x += s.vx;
      s.y += s.vy;
      s.vx *= 0.98;
      s.vy -= 0.1;
      s.life -= s.decay;
      s.size += 0.3;
      
      if (s.life <= 0) {
        smokeParticles.splice(i, 1);
        continue;
      }
      
      const alpha = s.life * 0.4;
      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size);
      grad.addColorStop(0, `rgba(60, 60, 60, ${alpha})`);
      grad.addColorStop(0.5, `rgba(40, 40, 40, ${alpha * 0.5})`);
      grad.addColorStop(1, 'rgba(20, 20, 20, 0)');
      
      ctx.globalAlpha = 1;
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
    }
    
    ctx.globalAlpha = 1;
    requestAnimationFrame(animateParticles);
  }
  
  // ============================================
  // AUDIO FEEDBACK
  // ============================================
  function initAudio() {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {
      console.log('Audio not available');
    }
  }
  
  function playSmashSound() {
    if (!audioCtx) return;
    
    try {
      // Noise burst for breaking sound
      const bufferSize = audioCtx.sampleRate * 0.2;
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      
      for (let i = 0; i < bufferSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
      }
      
      const noise = audioCtx.createBufferSource();
      noise.buffer = buffer;
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 200 + Math.random() * 400;
      filter.Q.value = 1;
      
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
      
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      noise.start();
      
      // Metal ping
      const osc = audioCtx.createOscillator();
      const oscGain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 800 + Math.random() * 400;
      oscGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
      osc.connect(oscGain);
      oscGain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    } catch(e) {}
  }
  
  function playComboSound(combo) {
    if (!audioCtx) return;
    
    try {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 200 + combo * 100;
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    } catch(e) {}
  }
  
  // ============================================
  // VISUAL EFFECTS
  // ============================================
  function screenFlash() {

    setTimeout(() => flashOverlay.classList.remove('flash'), 50);

  function screenShakeEffect() {

  function updateSpeakerBars() {

  // ============================================
  // GAME LOGIC
  // ============================================
  function calculateScore() {
    const baseScore = 100;
    const comboBonus = GameState.combo * 10;
    const multiplier = Math.pow(1.5, GameState.multiplier - 1);
    return Math.floor((baseScore + comboBonus) * multiplier);
  }
  
  function performSmash(e) {
    if (!GameState.isPlaying) return;
    
    const now = Date.now();
    if (now - GameState.lastSmashTime < 200) return;
    GameState.lastSmashTime = now;
    
    GameState.smashes++;
    GameState.combo++;
    GameState.damageLevel = Math.min(GameState.damageLevel + 1, 100);
    
    // Combo timer
    GameState.comboTimer = 2000;
    
    // Calculate multiplier every 5 combos
    if (GameState.combo > 0 && GameState.combo % 3 === 0) {
      GameState.multiplier = Math.min(GameState.multiplier + 0.1, 3);
    }
    
    const points = calculateScore();
    GameState.score += points;
    
    // Update UI
    scoreValue.textContent = GameState.score.toLocaleString();
    smashesValue.textContent = GameState.smashes;
    
    // Progress bar (damage)
    progressBar.style.width = GameState.damageLevel + '%';
    
    // Combo display
    if (GameState.combo > 1) {
      comboValue.textContent = 'x' + GameState.combo;
      comboValue.classList.add('visible');
      multValue.textContent = 'x' + GameState.multiplier.toFixed(1) + ' MULTIPLIER';
      multValue.classList.add('visible');
      
      if (GameState.combo > GameState.maxCombo) {
        GameState.maxCombo = GameState.combo;
      }
      
      playComboSound(GameState.combo);
    }
    
    // Show combo pop-up
    if (GameState.combo > 2) {
      comboText.textContent = GameState.combo + 'x COMBO!';
      comboText.classList.add('show');
      setTimeout(() => comboText.classList.remove('show'), 800);
    }
    
    // Visual effects
    screenFlash();
    
    if (GameState.combo > 5) {
      screenShakeEffect();
    }
    
    if (GameState.combo > 10) {
      glitchEffect();
    }
    
    // Impact ring
    impactRing.classList.remove('active');
    void impactRing.offsetWidth; // Trigger reflow
    impactRing.classList.add('active');
    
    // Guitar shake animation
    guitarSprite.classList.add('broken');
    setTimeout(() => guitarSprite.classList.remove('broken'), 600);
    
    // Floating text
    const rect = smashZone.getBoundingClientRect();
    createFloatingText(
      rect.left + rect.width / 2 + (Math.random() - 0.5) * 100,
      rect.top + rect.height / 2,
      '+' + points.toLocaleString(),
      GameState.combo > 5 ? '#00d4ff' : '#ffcc00'
    );
    
    // Particles at smash location
    createSparks(rect.left + rect.width / 2, rect.top + rect.height / 2, 30);
    createSmoke(rect.left + rect.width / 2, rect.top + rect.height / 2, 15);
    createDebris(rect.left + rect.width / 2, rect.top + rect.height / 2, 10);
    
    // Audio
    playSmashSound();
    
    // Break animation
    if (GameState.damageLevel > 30 && GameState.damageLevel % 20 === 0) {
      addCrack();
    }
    
    // Add dramatic flair for huge combos
    if (GameState.combo % 10 === 0 && GameState.combo > 0) {
      massiveExplosion();
    }
  }
  
  function addCrack() {
    const cracksOnGuitar = document.querySelectorAll('.guitar-crack');
    if (cracksOnGuitar.length >= 5) return;
    
    // Add visual crack to guitar SVG
    const crack = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const x = 60 + Math.random() * 80;
    const y = 50 + Math.random() * 60;
    crack.setAttribute('d', 
      `M${x},${y} ` +
      `Q${x+10+Math.random()*10},${y+10+Math.random()*10} ${x+20+Math.random()*10},${y+5+Math.random()*10} ` +
      `Q${x+30+Math.random()*10},${y+15+Math.random()*10} ${x+25+Math.random()*10},${y+30+Math.random()*10}`
    );
    crack.setAttribute('fill', 'none');
    crack.setAttribute('stroke', '#333333');
    crack.setAttribute('stroke-width', '2');
    crack.setAttribute('stroke-linecap', 'round');
    crack.classList.add('guitar-crack');
    
    const svg = guitarSprite.querySelector('svg');
    svg.appendChild(crack);
  }
  
  function massiveExplosion() {
    const rect = smashZone.getBoundingClientRect();
    for (let i = 0; i < 5; i++) {
      setTimeout(() => {
        createSparks(
          rect.left + rect.width / 2 + (Math.random() - 0.5) * 200,
          rect.top + rect.height / 2 + (Math.random() - 0.5) * 200,
          50
        );
        createDebris(
          rect.left + rect.width / 2 + (Math.random() - 0.5) * 200,
          rect.top + rect.height / 2 + (Math.random() - 0.5) * 200,
          20
        );
        screenFlash();
      }, i * 100);
    }
  }
  
  function resetCombo() {
    GameState.combo = 0;
    GameState.combo = 0;
    GameState.multiplier = 1;
    comboValue.classList.remove('visible');
    multValue.classList.remove('visible');
    GameState.lastSmashTime = 0;
  }
  
  // ============================================
  // TIMER
  // ============================================
  function startTimer() {
    const timerInterval = setInterval(() => {
      if (!GameState.isPlaying) {
        clearInterval(timerInterval);
        return;
      }
      
      GameState.timeLeft--;
      GameState.gameTime++;
      
      timeValue.textContent = GameState.timeLeft;
      
      // Energy bar animation
      GameState.energy = (GameState.energy + 1) % 100;
      energyFill.style.width = GameState.energy + '%';
      
      // Reset combo slowly
      if (GameState.comboTimer > 0) {
        GameState.comboTimer -= 1000;
      } else if (GameState.combo > 0) {
        resetCombo();
      }
      
      // Update speaker bars
      if (GameState.gameTime % 5 === 0) {
        updateSpeakerBars();
      }
      
      if (GameState.timeLeft <= 0) {
        clearInterval(timerInterval);
        endGame();
      }
    }, 1000);
  }
  
  // ============================================
  // GAME FLOW
  // ============================================
  function startGame() {
    // Reset state
    GameState.score = 0;
    GameState.timeLeft = 60;
    GameState.smashes = 0;
    GameState.combo = 0;
    GameState.maxCombo = 0;
    GameState.damageLevel = 0;
    GameState.energy = 0;
    GameState.multiplier = 1;
    GameState.isPlaying = true;
    
    // Reset UI
    scoreValue.textContent = '0';
    timeValue.textContent = '60';
    smashesValue.textContent = '0';
    progressBar.style.width = '0%';
    comboValue.textContent = 'x1';
    comboValue.classList.remove('visible');
    multValue.classList.remove('visible');
    energyFill.style.width = '0%';
    
    // Clear particles
    sparks = [];
    debris = [];
    smokeParticles = [];
    
    // Remove cracks from guitar
    document.querySelectorAll('.guitar-crack').forEach(c => c.remove());
    
    // Hide screens
    startScreen.style.display = 'none';
    gameOverScreen.classList.remove('show');
    
    // Start audio context on first interaction
    if (!audioCtx) {
      initAudio();
    }
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    
    // Start timer
    startTimer();
    
    // Start 3D animation
    lastTime = performance.now();
    animate3D(lastTime);
    animateParticles();
  }
  
  function endGame() {
    GameState.isPlaying = false;
    
    // Show game over
    finalScore.textContent = GameState.score.toLocaleString();
    gameOverScreen.classList.add('show');
    
    // Final explosion
    const rect = smashZone.getBoundingClientRect();
    createSparks(rect.left + rect.width / 2, rect.top + rect.height / 2, 100);
    createDebris(rect.left + rect.width / 2, rect.top + rect.height / 2, 50);
    createSmoke(rect.left + rect.width / 2, rect.top + rect.height / 2, 30);
    screenShakeEffect();
    
    // Fade guitar
    guitarSprite.style.opacity = '0.3';
  }
  
  // ============================================
  // EVENT HANDLERS
  // ============================================
  function handleSmash(e) {
    e.preventDefault();
    performSmash(e);
  }
  
  function handleMouseMove(e) {
    if (!GameState.isPlaying) return;
    
    // Parallax effect on guitar
    const x = (e.clientX / window.innerWidth - 0.5) * 10;
    const y = (e.clientY / window.innerHeight - 0.5) * 5;
    if (THREE_SCENE.guitarMesh) {
      THREE_SCENE.guitarMesh.position.x = x * 0.1;
      THREE_SCENE.guitarMesh.position.y = 0.5 + y * 0.05;
    }
  }
  
  function handleDeviceOrientation(e) {
    if (!GameState.isPlaying || !e.gamma || !e.beta) return;
    
    // Tilt-based smash
    const tiltX = e.gamma / 90; // -1 to 1
    const tiltY = e.beta / 90;   // -1 to 1
    
    if (Math.abs(tiltX) > 0.5 || Math.abs(tiltY) > 0.5) {
      // Don't trigger too fast
      const now = Date.now();
      if (now - GameState.lastSmashTime > 500) {
        performSmash({ preventDefault: () => {} });
      }
    }
  }
  
  // ============================================
  // INITIALIZATION
  // ============================================
  function init() {
    resize();
    window.addEventListener('resize', resize);
    
    // Bind events
    smashBtn.addEventListener('click', handleSmash);
    smashZone.addEventListener('click', handleSmash);
    smashZone.addEventListener('touchstart', function(e) {
      e.preventDefault();
      handleSmash(e);
    }, { passive: false });
    
    document.addEventListener('mousemove', handleMouseMove);
    
    // Device orientation for tilt controls
    if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', handleDeviceOrientation);
    }
    
    // Start button
    startBtn.addEventListener('click', function() {
      startGame();
    });
    
    // Restart button
    restartBtn.addEventListener('click', function() {
      startGame();
    });
    
    // Initial state
    guitarSprite.style.opacity = '1';
  }
  
  // Start everything
  init();
  
  // Initial 3D setup
  init3DScene();
  
  // Initial particles animation (demo)
  animateParticles();
  
  // Demo speaker animation
  updateSpeakerBars();
  setInterval(updateSpeakerBars, 200);
  
})();
</script>
</body>
</html>
