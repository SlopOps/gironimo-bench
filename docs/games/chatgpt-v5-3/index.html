<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Orbital Drift</title>
<style>
/* =========================
   RESET & BASE
========================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: radial-gradient(circle at 50% 20%, #050814, #000000 70%);
  font-family: system-ui, sans-serif;
  touch-action: none;
}

/* =========================
   CANVAS
========================= */
canvas {
  position: fixed;
  top: 0;
  left: 0;
}

/* =========================
   UI LAYER
========================= */
#ui {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

/* HUD */
.hud {
  position: absolute;
  top: 12px;
  left: 12px;
  right: 12px;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  color: #aee7ff;
  letter-spacing: 1px;
}

.fuel-bar {
  position: absolute;
  bottom: 16px;
  left: 12px;
  right: 12px;
  height: 10px;
  border-radius: 10px;
  background: rgba(255,255,255,0.1);
  overflow: hidden;
}

.fuel-fill {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, #00f0ff, #00ffa2);
  transition: width 0.2s linear;
}

/* Instruction pulse */
.instructions {
  position: absolute;
  bottom: 50px;
  left: 12px;
  right: 12px;
  text-align: center;
  font-size: 13px;
  color: #ffffffcc;
  animation: pulse 1.8s infinite;
}

@keyframes pulse {
  0% { opacity: 0.4; transform: translateY(0); }
  50% { opacity: 1; transform: translateY(-4px); }
  100% { opacity: 0.4; transform: translateY(0); }
}

/* Target ring */
.target-ring {
  position: absolute;
  width: 120px;
  height: 120px;
  border: 2px dashed rgba(0,255,255,0.6);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  animation: rotate 8s linear infinite;
}

@keyframes rotate {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

/* Score */
.score {
  position: absolute;
  top: 32px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 18px;
  color: #ffffff;
  letter-spacing: 2px;
}

/* Game Over */
#gameOver {
  position: absolute;
  inset: 0;
  background: radial-gradient(circle, #02060f, #000);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  pointer-events: all;
  opacity: 0;
  transition: opacity 0.4s;
}

#gameOver.active {
  opacity: 1;
}

#gameOver h1 {
  color: #00f0ff;
  font-size: 28px;
  margin-bottom: 16px;
}

#restart {
  pointer-events: all;
  padding: 12px 20px;
  border: 1px solid #00f0ff;
  border-radius: 30px;
  color: #00f0ff;
  cursor: pointer;
  background: transparent;
}

</style>
</head>

<body>

<div id="ui">
  <div class="hud">
    <div>FUEL</div>
    <div id="planetName">Orbiting...</div>
  </div>

  <div class="score" id="score">0</div>

  <div class="fuel-bar">
    <div class="fuel-fill" id="fuelFill"></div>
  </div>

  <div class="instructions">
    DRAG → AIM • RELEASE → TRAVEL
  </div>

  <div class="target-ring" id="targetRing"></div>

  <div id="gameOver">
    <h1>DRIFT LOST</h1>
    <button id="restart">RESTART</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>

<script>
// =========================
// SCENE SETUP
// =========================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// =========================
// STARFIELD PARTICLES
// =========================
const starGeo = new THREE.BufferGeometry();
const starCount = 2000;
const starPositions = new Float32Array(starCount * 3);

for (let i = 0; i < starCount; i++) {
  starPositions[i*3] = (Math.random() - 0.5) * 200;
  starPositions[i*3+1] = (Math.random() - 0.5) * 200;
  starPositions[i*3+2] = (Math.random() - 0.5) * 200;
}

starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));

const starMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.7
});

const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// =========================
// PLANETS
// =========================
const planets = [];
const planetColors = [0x00f0ff, 0xff00cc, 0xffa500, 0x00ff99, 0x9966ff];

function createPlanet(x, y) {
  const geo = new THREE.SphereGeometry(0.5, 32, 32);
  const mat = new THREE.MeshStandardMaterial({
    color: planetColors[Math.floor(Math.random()*planetColors.length)],
    emissive: 0x111111
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, y, 0);

  const light = new THREE.PointLight(mesh.material.color, 1.5, 10);
  mesh.add(light);

  scene.add(mesh);
  planets.push(mesh);
}

for (let i = 0; i < 5; i++) {
  createPlanet((Math.random()-0.5)*10, (Math.random()-0.5)*12);
}

// =========================
// PLAYER SHIP
// =========================
const shipGeo = new THREE.ConeGeometry(0.2, 0.6, 16);
const shipMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const ship = new THREE.Mesh(shipGeo, shipMat);
ship.rotation.x = Math.PI / 2;
scene.add(ship);

let velocity = new THREE.Vector3();
let currentPlanet = planets[0];
ship.position.copy(currentPlanet.position);

// =========================
// LIGHT
// =========================
const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

// =========================
// GAME STATE
// =========================
let dragging = false;
let start = {x:0, y:0};
let fuel = 100;
let score = 0;

// =========================
// INPUT
// =========================
window.addEventListener("pointerdown", e => {
  dragging = true;
  start.x = e.clientX;
  start.y = e.clientY;
});

window.addEventListener("pointerup", e => {
  if (!dragging) return;
  dragging = false;

  const dx = e.clientX - start.x;
  const dy = e.clientY - start.y;

  velocity.set(-dx * 0.01, dy * 0.01, 0);
  fuel -= Math.min(20, Math.hypot(dx,dy)*0.05);
});

// =========================
// COLLISION
// =========================
function checkLanding() {
  for (let p of planets) {
    if (ship.position.distanceTo(p.position) < 0.7) {
      currentPlanet = p;
      velocity.set(0,0,0);
      fuel = Math.min(100, fuel + 30);
      score++;
      explode(p.position);
    }
  }
}

// =========================
// EXPLOSION PARTICLES
// =========================
function explode(pos) {
  const geo = new THREE.BufferGeometry();
  const count = 200;
  const arr = new Float32Array(count*3);

  for (let i=0;i<count;i++){
    arr[i*3]=pos.x;
    arr[i*3+1]=pos.y;
    arr[i*3+2]=pos.z;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(arr,3));

  const mat = new THREE.PointsMaterial({ color: 0xffffaa, size: 0.2 });
  const particles = new THREE.Points(geo, mat);
  scene.add(particles);

  let t=0;
  function anim(){
    t+=0.02;
    const p = geo.attributes.position.array;
    for (let i=0;i<count;i++){
      p[i*3]+= (Math.random()-0.5)*0.2;
      p[i*3+1]+= (Math.random()-0.5)*0.2;
    }
    geo.attributes.position.needsUpdate = true;

    if (t<1) requestAnimationFrame(anim);
    else scene.remove(particles);
  }
  anim();
}

// =========================
// LOOP
// =========================
function animate() {
  requestAnimationFrame(animate);

  // Move ship
  ship.position.add(velocity);

  // Drift slow
  velocity.multiplyScalar(0.99);

  // Rotate stars for parallax
  stars.rotation.y += 0.0005;

  // Check landing
  checkLanding();

  // Fuel drain
  fuel -= 0.02;
  if (fuel <= 0) gameOver();

  updateUI();

  renderer.render(scene, camera);
}

animate();

// =========================
// UI
// =========================
function updateUI(){
  document.getElementById("fuelFill").style.width = fuel + "%";
  document.getElementById("score").innerText = score;
}

// =========================
// GAME OVER
// =========================
function gameOver(){
  document.getElementById("gameOver").classList.add("active");
}

document.getElementById("restart").onclick = () => location.reload();

// =========================
// RESIZE
// =========================
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
