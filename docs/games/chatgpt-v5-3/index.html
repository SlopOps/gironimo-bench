<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Orbital Drift</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%;
  height:100%;
  overflow:hidden;
  background: radial-gradient(circle at 50% 20%, #050814, #000 70%);
  font-family: system-ui, sans-serif;
  touch-action:none;
}

canvas {
  position:fixed;
  top:0;
  left:0;
}

/* UI */
#ui {
  position:fixed;
  inset:0;
  pointer-events:none;
}

.hud {
  position:absolute;
  top:12px;
  left:12px;
  right:12px;
  display:flex;
  justify-content:space-between;
  color:#aee7ff;
  font-size:14px;
}

.score {
  position:absolute;
  top:36px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  font-size:18px;
}

.fuel-bar {
  position:absolute;
  bottom:16px;
  left:12px;
  right:12px;
  height:10px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  overflow:hidden;
}

.fuel-fill {
  height:100%;
  width:100%;
  background:linear-gradient(90deg,#00f0ff,#00ffa2);
}

.instructions {
  position:absolute;
  bottom:48px;
  left:12px;
  right:12px;
  text-align:center;
  color:#fff;
  font-size:13px;
  animation:pulse 1.8s infinite;
}

@keyframes pulse {
  0% {opacity:0.4;}
  50% {opacity:1;}
  100% {opacity:0.4;}
}

#gameOver {
  position:absolute;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

#gameOver.active {
  opacity:1;
  pointer-events:all;
}

#restart {
  margin-top:16px;
  padding:10px 18px;
  border:1px solid #00f0ff;
  background:none;
  color:#00f0ff;
  border-radius:20px;
}
</style>
</head>

<body>

<div id="ui">
  <div class="hud">
    <div>FUEL</div>
    <div id="planetName">Orbit Locked</div>
  </div>

  <div class="score" id="score">0</div>

  <div class="fuel-bar">
    <div class="fuel-fill" id="fuelFill"></div>
  </div>

  <div class="instructions">
    DRAG TO AIM • RELEASE TO TRAVEL
  </div>

  <div id="gameOver">
    <h1 style="color:#00f0ff;">DRIFT LOST</h1>
    <button id="restart">RESTART</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>

<script>
// ================= SCENE =================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ================= STARS =================
const starGeo = new THREE.BufferGeometry();
const starCount = 1500;
const starArray = new Float32Array(starCount * 3);

for(let i=0;i<starCount;i++){
  starArray[i*3] = (Math.random()-0.5)*100;
  starArray[i*3+1] = (Math.random()-0.5)*100;
  starArray[i*3+2] = (Math.random()-0.5)*100;
}

starGeo.setAttribute('position', new THREE.BufferAttribute(starArray,3));

const starMat = new THREE.PointsMaterial({
  size:0.15,
  transparent:true,
  opacity:0.8
});

const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ================= PLANETS =================
const planets = [];
const colors = [0x00f0ff,0xff00cc,0xffa500,0x00ff99,0x9966ff];

function createPlanet(x,y){
  const geo = new THREE.SphereGeometry(0.5,32,32);
  const mat = new THREE.MeshStandardMaterial({
    color: colors[Math.floor(Math.random()*colors.length)],
    emissive:0x111111
  });

  const mesh = new THREE.Mesh(geo,mat);
  mesh.position.set(x,y, Math.random()*-2);

  const light = new THREE.PointLight(mesh.material.color,1.5,8);
  mesh.add(light);

  scene.add(mesh);
  planets.push(mesh);
}

// safer spawn range
for(let i=0;i<6;i++){
  createPlanet((Math.random()-0.5)*6, (Math.random()-0.5)*8);
}

// ================= SHIP =================
const shipGeo = new THREE.ConeGeometry(0.2,0.6,16);
const shipMat = new THREE.MeshBasicMaterial({color:0xffffff});
const ship = new THREE.Mesh(shipGeo, shipMat);
ship.rotation.x = Math.PI/2;
ship.position.z = 0.5;
scene.add(ship);

let currentPlanet = planets[0];
ship.position.copy(currentPlanet.position);

// ================= LIGHT =================
scene.add(new THREE.AmbientLight(0xffffff,0.6));

// ================= GAME =================
let velocity = new THREE.Vector3();
let dragging = false;
let start = {x:0,y:0};
let fuel = 100;
let score = 0;
let started = false;

// ================= INPUT =================
window.addEventListener("pointerdown", e=>{
  dragging = true;
  started = true;
  start.x = e.clientX;
  start.y = e.clientY;
});

window.addEventListener("pointerup", e=>{
  if(!dragging) return;
  dragging = false;

  const dx = e.clientX - start.x;
  const dy = e.clientY - start.y;

  velocity.set(-dx*0.01, dy*0.01, 0);
  fuel -= Math.min(20, Math.hypot(dx,dy)*0.05);
});

// ================= EXPLOSION =================
function explode(pos){
  const geo = new THREE.BufferGeometry();
  const count = 150;
  const arr = new Float32Array(count*3);

  for(let i=0;i<count;i++){
    arr[i*3]=pos.x;
    arr[i*3+1]=pos.y;
    arr[i*3+2]=pos.z;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(arr,3));

  const mat = new THREE.PointsMaterial({ size:0.2, color:0xffffaa });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);

  let t=0;
  function anim(){
    t+=0.02;
    const p = geo.attributes.position.array;
    for(let i=0;i<count;i++){
      p[i*3]+= (Math.random()-0.5)*0.2;
      p[i*3+1]+= (Math.random()-0.5)*0.2;
    }
    geo.attributes.position.needsUpdate = true;

    if(t<1) requestAnimationFrame(anim);
    else scene.remove(pts);
  }
  anim();
}

// ================= LANDING =================
function checkLanding(){
  for(let p of planets){
    if(ship.position.distanceTo(p.position) < 0.7){
      currentPlanet = p;
      velocity.set(0,0,0);
      fuel = Math.min(100, fuel + 30);
      score++;
      explode(p.position);
    }
  }
}

// ================= LOOP =================
function animate(){
  requestAnimationFrame(animate);

  ship.position.add(velocity);
  velocity.multiplyScalar(0.99);

  // CAMERA FOLLOW (FIX)
  camera.position.x += (ship.position.x - camera.position.x)*0.08;
  camera.position.y += (ship.position.y - camera.position.y)*0.08;

  stars.rotation.y += 0.0005;

  checkLanding();

  if(started) fuel -= 0.02;
  if(fuel <= 0) gameOver();

  updateUI();
  renderer.render(scene,camera);
}

animate();

// ================= UI =================
function updateUI(){
  document.getElementById("fuelFill").style.width = fuel + "%";
  document.getElementById("score").innerText = score;
}

// ================= GAME OVER =================
function gameOver(){
  document.getElementById("gameOver").classList.add("active");
}

document.getElementById("restart").onclick = ()=>location.reload();

// ================= RESIZE =================
window.addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
