<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Singularity</title>

<style>
/* =========================
   RESET + BASE
========================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: radial-gradient(circle at center, #050508 0%, #000 70%);
    font-family: system-ui, -apple-system, sans-serif;
    color: white;
    touch-action: none;
}

/* =========================
   UI LAYER
========================= */
#ui {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

#instruction {
    position: absolute;
    top: 5%;
    left: 5%;
    font-size: 14px;
    opacity: 0.8;
    letter-spacing: 1px;
}

#score {
    position: absolute;
    top: 5%;
    right: 5%;
    font-size: 14px;
    opacity: 0.8;
}

#centerWarning {
    position: absolute;
    bottom: 10%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    opacity: 0.9;
    text-align: center;
}

#pulseRing {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    transform: translate(-50%, -50%);
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
    100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
}

/* =========================
   CANVAS
========================= */
canvas {
    display: block;
}

/* =========================
   DISTORTION OVERLAY
========================= */
#distortion {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 60%);
    mix-blend-mode: overlay;
    pointer-events: none;
    animation: warp 6s infinite linear;
}

@keyframes warp {
    0% { transform: scale(1) rotate(0deg); }
    100% { transform: scale(1.1) rotate(360deg); }
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="ui">
    <div id="instruction">DRAG TO ESCAPE GRAVITY</div>
    <div id="score">TIME: 0</div>
    <div id="centerWarning">DON’T FALL IN</div>
    <div id="pulseRing"></div>
</div>

<div id="distortion"></div>

<script>
/* =========================
   SETUP
========================= */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W, H, CX, CY;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    CX = W / 2;
    CY = H / 2;
}
resize();
window.addEventListener("resize", resize);

/* =========================
   PLAYER
========================= */
const player = {
    x: CX,
    y: CY - 200,
    vx: 0,
    vy: 0,
    size: 6,
    alive: true
};

/* =========================
   INPUT
========================= */
let dragging = false;
let targetX = 0;
let targetY = 0;

window.addEventListener("pointerdown", e => {
    dragging = true;
    targetX = e.clientX;
    targetY = e.clientY;
});

window.addEventListener("pointermove", e => {
    targetX = e.clientX;
    targetY = e.clientY;
});

window.addEventListener("pointerup", () => dragging = false);

/* =========================
   PARTICLES
========================= */
let particles = [];

function spawnParticle(x, y) {
    return {
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2,
        life: 100 + Math.random() * 100,
        size: Math.random() * 2 + 0.5
    };
}

for (let i = 0; i < 400; i++) {
    particles.push(spawnParticle(Math.random() * W, Math.random() * H));
}

/* =========================
   EXPLOSION
========================= */
function explode(x, y) {
    for (let i = 0; i < 60; i++) {
        particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,
            life: 50,
            size: Math.random() * 3
        });
    }
}

/* =========================
   GRAVITY WELL
========================= */
function applyGravity(obj) {
    let dx = CX - obj.x;
    let dy = CY - obj.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    let force = 200 / (dist * 0.5);

    obj.vx += dx / dist * force * 0.02;
    obj.vy += dy / dist * force * 0.02;
}

/* =========================
   GAME LOOP
========================= */
let time = 0;

function update() {
    time++;

    if (player.alive) {
        applyGravity(player);

        if (dragging) {
            player.vx += (targetX - player.x) * 0.01;
            player.vy += (targetY - player.y) * 0.01;
        }

        player.x += player.vx;
        player.y += player.vy;

        player.vx *= 0.98;
        player.vy *= 0.98;

        let dx = player.x - CX;
        let dy = player.y - CY;
        let dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 30) {
            player.alive = false;
            explode(player.x, player.y);
        }
    }

    particles.forEach(p => {
        applyGravity(p);

        p.x += p.vx;
        p.y += p.vy;
        p.life--;

        if (p.life < 0) {
            Object.assign(p, spawnParticle(Math.random() * W, Math.random() * H));
        }

        let dx = p.x - CX;
        let dy = p.y - CY;
        let dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 20) {
            Object.assign(p, spawnParticle(Math.random() * W, Math.random() * H));
        }
    });

    document.getElementById("score").innerText = "TIME: " + Math.floor(time / 60);
}

/* =========================
   DRAW BLACK HOLE
========================= */
function drawBlackHole() {
    let gradient = ctx.createRadialGradient(CX, CY, 5, CX, CY, 120);
    gradient.addColorStop(0, "#000");
    gradient.addColorStop(0.3, "#050508");
    gradient.addColorStop(0.6, "#0a0a15");
    gradient.addColorStop(1, "transparent");

    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(CX, CY, 120, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(CX, CY, 25, 0, Math.PI * 2);
    ctx.fillStyle = "#000";
    ctx.fill();
}

/* =========================
   DRAW PARTICLES
========================= */
function drawParticles() {
    particles.forEach(p => {
        let dx = p.x - CX;
        let dy = p.y - CY;
        let dist = Math.sqrt(dx * dx + dy * dy);

        let hue = 200 + dist;
        ctx.fillStyle = `hsl(${hue}, 80%, 70%)`;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });
}

/* =========================
   DRAW PLAYER
========================= */
function drawPlayer() {
    if (!player.alive) return;

    ctx.beginPath();
    ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();
}

/* =========================
   TRAILS
========================= */
function drawTrails() {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, W, H);
}

/* =========================
   LOOP
========================= */
function loop() {
    drawTrails();
    update();
    drawParticles();
    drawBlackHole();
    drawPlayer();

    requestAnimationFrame(loop);
}

loop();

/* =========================
   EXTRA ATMOSPHERE
========================= */
setInterval(() => {
    explode(
        CX + (Math.random() - 0.5) * 100,
        CY + (Math.random() - 0.5) * 100
    );
}, 2000);

/* =========================
   SUBTLE CAMERA SHAKE
========================= */
setInterval(() => {
    document.body.style.transform =
        `translate(${(Math.random()-0.5)*2}px, ${(Math.random()-0.5)*2}px)`;
}, 50);

/* =========================
   DEPTH SWIRL EFFECT
========================= */
setInterval(() => {
    particles.forEach(p => {
        let angle = Math.atan2(p.y - CY, p.x - CX);
        angle += 0.02;

        let dist = Math.hypot(p.x - CX, p.y - CY);

        p.x = CX + Math.cos(angle) * dist;
        p.y = CY + Math.sin(angle) * dist;
    });
}, 30);

/* =========================
   END STATE RESET
========================= */
setInterval(() => {
    if (!player.alive) {
        player.x = CX;
        player.y = CY - 200;
        player.vx = 0;
        player.vy = 0;
        player.alive = true;
        time = 0;
    }
}, 3000);

</script>

</body>
</html>
