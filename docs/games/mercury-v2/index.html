<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Surf’s Up – Beach Surfing Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">
  <!-- Three.js from a reliable CDN -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #87CEEB, #1E90FF);
      font-family: 'Rubik', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    #gameContainer {
      position: relative;
      width: 100%;
      height: calc(100vw * 16 / 9);
      max-height: 100vh;
      margin: 0 auto;
      overflow: hidden;
      background: #001f3f;
    }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #ui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 0.5rem;
      color: #fff;
      display: flex;
      justify-content: space-between;
      font-size: 1rem;
      pointer-events: none;
    }
    #score, #timer {
      background: rgba(0,0,0,0.5);
      padding: 0.25rem 0.5rem;
      border-radius: 0.5rem;
    }
    #startScreen {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 1.5rem;
      z-index: 10;
    }
    #startScreen h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 700;
    }
    #startScreen p {
      margin-top: 1rem;
      font-size: 1rem;
    }
    #startButton {
      margin-top: 1.5rem;
      padding: 0.8rem 2rem;
      font-size: 1.2rem;
      font-weight: 700;
      font-family: 'Rubik', sans-serif;
      background: #ffd700;
      color: #001f3f;
      border: none;
      border-radius: 2rem;
      cursor: pointer;
      transition: background 0.2s;
      z-index: 11;
    }
    #startButton:hover {
      background: #ffea70;
    }
    #startButton:active {
      background: #e6c200;
    }
    #gameOverScreen {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.8);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 1.5rem;
      z-index: 10;
    }
    #gameOverScreen h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 700;
    }
    #gameOverScreen p {
      margin-top: 1rem;
      font-size: 1rem;
    }
    .touchHint {
      position: absolute;
      bottom: 1rem;
      width: 2rem;
      height: 2rem;
      opacity: 0.8;
    }
    #leftHint { left: 1rem; }
    #rightHint { right: 1rem; }
    #muteBtn, #pauseBtn {
      position: absolute;
      width: 2rem;
      height: 2rem;
      opacity: 0.8;
      cursor: pointer;
    }
    #muteBtn { right: 1rem; bottom: 4rem; }
    #pauseBtn { right: 1rem; bottom: 7rem; }
    #pauseOverlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      color: #fff;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      z-index: 20;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
      <div id="score">Score: 0</div>
      <div id="timer">Time: 30</div>
    </div>
    <div id="startScreen">
      <h1>Surf’s Up!</h1>
      <p>Tap left/right to steer. Survive 30 seconds.</p>
      <button id="startButton">Start</button>
    </div>
    <div id="gameOverScreen" style="display:none;">
      <h1>Game Over</h1>
      <p id="finalScore">Score: 0</p>
      <p>Tap anywhere to restart.</p>
    </div>
    <img id="leftHint" class="touchHint" src="https://unpkg.com/lucide-static@latest/icons/arrow-left.svg" alt="Left">
    <img id="rightHint" class="touchHint" src="https://unpkg.com/lucide-static@latest/icons/arrow-right.svg" alt="Right">
    <div id="pauseOverlay">Paused</div>
  </div>

  <script>
    // Wait for the page to be fully loaded before running the game
    window.addEventListener('DOMContentLoaded', function() {
      // ---------------------------------------------------------
      //  Global Variables & Constants
      // ---------------------------------------------------------
      let scene, camera, renderer;
      let waveMesh, surferMesh;
      let obstacles = [];
      let particleSystem;
      let burstSystem;
      let score = 0;
      let timeLeft = 30;
      let gameState = 'ready'; // 'ready' | 'playing' | 'paused' | 'over'
      const waveWidth = 20;
      const waveDepth = 200;
      const waveSegments = 200;
      const obstacleSpeed = 0.2;
      const maxObstacles = 5;
      const spawnInterval = 2000;
      let lastSpawnTime = 0;
      let lastUpdateTime = 0;
      const clock = new THREE.Clock();

      const uiScore = document.getElementById('score');
      const uiTimer = document.getElementById('timer');
      const startScreen = document.getElementById('startScreen');
      const gameOverScreen = document.getElementById('gameOverScreen');
      const finalScoreEl = document.getElementById('finalScore');
      const pauseOverlay = document.getElementById('pauseOverlay');

      let audioCtx;
      let mute = false;
      let splashBuffer = null;
      let collisionBuffer = null;

      let sunMesh;
      const clouds = [];

      // ---------------------------------------------------------
      //  Initialization
      // ---------------------------------------------------------
      init();
      animate();

      // ---------------------------------------------------------
      //  Function: init
      // ---------------------------------------------------------
      function init() {
        const canvas = document.getElementById('gameCanvas');
        renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(canvas.clientWidth, canvas.clientHeight);

        scene = new THREE.Scene();

        const fov = 60;
        const aspect = canvas.clientWidth / canvas.clientHeight;
        camera = new THREE.PerspectiveCamera(fov, aspect, 0.1, 1000);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);
        const sunLight = new THREE.DirectionalLight(0xffe0b2, 0.6);
        sunLight.position.set(-10, 10, 5);
        scene.add(sunLight);

        createWave();
        createSurfer();
        createParticleSystem();
        createBurstSystem();
        createSun();
        createClouds();
        createUIButtons();

        window.addEventListener('resize', onWindowResize);
        window.addEventListener('touchstart', onTouchStart);
        window.addEventListener('click', onClick);

        document.getElementById('startButton').addEventListener('click', function(e) {
          e.stopPropagation();
          if (gameState === 'ready') startGame();
        });

        initAudio();
        updateUI();

        setTimeout(() => {
          document.getElementById('leftHint').style.opacity = '0';
          document.getElementById('rightHint').style.opacity = '0';
        }, 5000);
      }

      // (all other functions remain exactly the same as in the original,
      //  but I'll include the full set for completeness and to ensure the fix is complete)

      function createWave() {
        const geometry = new THREE.PlaneGeometry(waveWidth, waveDepth, waveSegments, waveSegments);
        geometry.rotateX(-Math.PI / 2);
        const material = new THREE.MeshPhongMaterial({
          color: 0x1e90ff,
          shininess: 120,
          side: THREE.DoubleSide,
          flatShading: true,
        });
        waveMesh = new THREE.Mesh(geometry, material);
        scene.add(waveMesh);
      }

      function createSurfer() {
        const geometry = new THREE.BoxGeometry(0.5, 0.2, 1);
        const material = new THREE.MeshStandardMaterial({ color: 0xffd700 });
        surferMesh = new THREE.Mesh(geometry, material);
        surferMesh.position.set(0, 0.3, -waveDepth / 2 + 10);
        scene.add(surferMesh);
      }

      function createParticleSystem() {
        const particleCount = 200;
        const positions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
          positions[i * 3] = 0;
          positions[i * 3 + 1] = 0;
          positions[i * 3 + 2] = 0;
          velocities[i * 3] = (Math.random() - 0.5) * 0.2;
          velocities[i * 3 + 1] = Math.random() * 0.5;
          velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.2;
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('velocity', new THREE.BufferAttribute(velocities, 3));
        const material = new THREE.PointsMaterial({
          color: 0xffffff,
          size: 0.05,
          transparent: true,
          opacity: 0.8,
        });
        particleSystem = new THREE.Points(geometry, material);
        particleSystem.visible = false;
        scene.add(particleSystem);
      }

      function createBurstSystem() {
        const burstCount = 300;
        const positions = new Float32Array(burstCount * 3);
        const velocities = new Float32Array(burstCount * 3);
        for (let i = 0; i < burstCount; i++) {
          positions[i * 3] = 0;
          positions[i * 3 + 1] = 0;
          positions[i * 3 + 2] = 0;
          velocities[i * 3] = (Math.random() - 0.5) * 0.6;
          velocities[i * 3 + 1] = Math.random() * 0.8;
          velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.6;
        }
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('velocity', new THREE.BufferAttribute(velocities, 3));
        const material = new THREE.PointsMaterial({
          color: 0xff4500,
          size: 0.07,
          transparent: true,
          opacity: 0.9,
        });
        burstSystem = new THREE.Points(geometry, material);
        burstSystem.visible = false;
        scene.add(burstSystem);
      }

      function createSun() {
        const geometry = new THREE.SphereGeometry(2, 32, 32);
        const material = new THREE.MeshBasicMaterial({ color: 0xffd700 });
        sunMesh = new THREE.Mesh(geometry, material);
        sunMesh.position.set(0, 15, -30);
        scene.add(sunMesh);
      }

      function createClouds() {
        const cloudCount = 8;
        for (let i = 0; i < cloudCount; i++) {
          const geometry = new THREE.PlaneGeometry(5, 2);
          const material = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
          const cloud = new THREE.Mesh(geometry, material);
          const x = (Math.random() - 0.5) * waveWidth * 1.5;
          const y = 8 + Math.random() * 4;
          const z = -Math.random() * waveDepth * 0.5;
          cloud.position.set(x, y, z);
          cloud.rotation.x = -Math.PI / 2;
          clouds.push(cloud);
          scene.add(cloud);
        }
      }

      function createUIButtons() {
        const muteBtn = document.createElement('img');
        muteBtn.id = 'muteBtn';
        muteBtn.src = 'https://unpkg.com/lucide-static@latest/icons/volume-2.svg';
        muteBtn.alt = 'Mute';
        document.getElementById('gameContainer').appendChild(muteBtn);
        muteBtn.addEventListener('click', toggleMute);

        const pauseBtn = document.createElement('img');
        pauseBtn.id = 'pauseBtn';
        pauseBtn.src = 'https://unpkg.com/lucide-static@latest/icons/pause.svg';
        pauseBtn.alt = 'Pause';
        document.getElementById('gameContainer').appendChild(pauseBtn);
        pauseBtn.addEventListener('click', togglePause);
      }

      function onWindowResize() {
        const container = document.getElementById('gameContainer');
        const width = container.clientWidth;
        const height = container.clientHeight;
        renderer.setSize(width, height);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      }

      function onTouchStart(event) {
        if (gameState === 'ready') {
          startGame();
          return;
        }
        if (gameState !== 'playing') return;
        const touch = event.touches[0];
        const x = touch.clientX;
        const width = window.innerWidth;
        if (x < width / 2) {
          moveSurfer(-1);
        } else {
          moveSurfer(1);
        }
      }

      function onClick(event) {
        if (gameState === 'over') startGame();
      }

      function moveSurfer(direction) {
        const step = 0.5;
        surferMesh.position.x += direction * step;
        const halfWidth = waveWidth / 2 - 0.5;
        surferMesh.position.x = Math.max(-halfWidth, Math.min(halfWidth, surferMesh.position.x));
        triggerSplash();
      }

      function triggerSplash() {
        particleSystem.visible = true;
        particleSystem.position.copy(surferMesh.position);
        const positions = particleSystem.geometry.attributes.position.array;
        const velocities = particleSystem.geometry.attributes.velocity.array;
        const count = positions.length / 3;
        for (let i = 0; i < count; i++) {
          positions[i * 3] = 0;
          positions[i * 3 + 1] = 0;
          positions[i * 3 + 2] = 0;
          velocities[i * 3] = (Math.random() - 0.5) * 0.2;
          velocities[i * 3 + 1] = Math.random() * 0.5;
          velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.2;
        }
        particleSystem.geometry.attributes.position.needsUpdate = true;
        particleSystem.geometry.attributes.velocity.needsUpdate = true;
        playSound(splashBuffer);
      }

      function startGame() {
        gameState = 'playing';
        score = 0;
        timeLeft = 30;
        startScreen.style.display = 'none';
        gameOverScreen.style.display = 'none';
        surferMesh.position.set(0, 0.3, -waveDepth / 2 + 10);
        obstacles.forEach(o => scene.remove(o.mesh));
        obstacles = [];
        lastSpawnTime = 0;
        lastUpdateTime = performance.now();
        updateUI();
      }

      function endGame() {
        gameState = 'over';
        finalScoreEl.textContent = `Score: ${score}`;
        gameOverScreen.style.display = 'flex';
        playSound(collisionBuffer);
      }

      function spawnObstacle() {
        const geometry = new THREE.SphereGeometry(0.4, 12, 12);
        const material = new THREE.MeshStandardMaterial({ color: 0xff4500 });
        const mesh = new THREE.Mesh(geometry, material);
        const x = (Math.random() - 0.5) * (waveWidth - 1);
        const z = surferMesh.position.z - waveDepth;
        mesh.position.set(x, 0.4, z);
        scene.add(mesh);
        obstacles.push({ mesh, passed: false });
      }

      function updateObstacles(delta) {
        obstacles.forEach(ob => {
          ob.mesh.position.z += obstacleSpeed * delta * 60;
          if (!ob.passed && ob.mesh.position.z > surferMesh.position.z) {
            ob.passed = true;
            score += 10;
            updateUI();
          }
          const dx = ob.mesh.position.x - surferMesh.position.x;
          const dz = ob.mesh.position.z - surferMesh.position.z;
          const distance = Math.sqrt(dx * dx + dz * dz);
          if (distance < 0.7) {
            spawnBurst(ob.mesh.position.clone());
            endGame();
          }
        });
        obstacles = obstacles.filter(ob => {
          const keep = ob.mesh.position.z < surferMesh.position.z + 10;
          if (!keep) scene.remove(ob.mesh);
          return keep;
        });
      }

      function updateWave(time) {
        const positions = waveMesh.geometry.attributes.position.array;
        const vertexCount = positions.length / 3;
        for (let i = 0; i < vertexCount; i++) {
          const ix = i * 3;
          const x = positions[ix];
          const z = positions[ix + 2];
          const y = Math.sin((x + time * 0.5) * 0.5) * Math.cos((z + time * 0.5) * 0.5) * 0.3;
          positions[ix + 1] = y;
        }
        waveMesh.geometry.attributes.position.needsUpdate = true;
        waveMesh.geometry.computeVertexNormals();
      }

      function updateParticles(delta) {
        if (!particleSystem.visible) return;
        const positions = particleSystem.geometry.attributes.position.array;
        const velocities = particleSystem.geometry.attributes.velocity.array;
        const count = positions.length / 3;
        let anyAlive = false;
        for (let i = 0; i < count; i++) {
          velocities[i * 3 + 1] -= 0.01;
          positions[i * 3] += velocities[i * 3] * delta * 60;
          positions[i * 3 + 1] += velocities[i * 3 + 1] * delta * 60;
          positions[i * 3 + 2] += velocities[i * 3 + 2] * delta * 60;
          if (positions[i * 3 + 1] > -2) anyAlive = true;
        }
        if (!anyAlive) particleSystem.visible = false;
        particleSystem.geometry.attributes.position.needsUpdate = true;
      }

      function updateBurst(delta) {
        if (!burstSystem.visible) return;
        const positions = burstSystem.geometry.attributes.position.array;
        const velocities = burstSystem.geometry.attributes.velocity.array;
        const count = positions.length / 3;
        let anyAlive = false;
        for (let i = 0; i < count; i++) {
          velocities[i * 3 + 1] -= 0.02;
          positions[i * 3] += velocities[i * 3] * delta * 60;
          positions[i * 3 + 1] += velocities[i * 3 + 1] * delta * 60;
          positions[i * 3 + 2] += velocities[i * 3 + 2] * delta * 60;
          if (positions[i * 3 + 1] > -3) anyAlive = true;
        }
        if (!anyAlive) burstSystem.visible = false;
        burstSystem.geometry.attributes.position.needsUpdate = true;
      }

      function spawnBurst(position) {
        burstSystem.visible = true;
        burstSystem.position.copy(position);
        const positions = burstSystem.geometry.attributes.position.array;
        const velocities = burstSystem.geometry.attributes.velocity.array;
        const count = positions.length / 3;
        for (let i = 0; i < count; i++) {
          positions[i * 3] = 0;
          positions[i * 3 + 1] = 0;
          positions[i * 3 + 2] = 0;
          velocities[i * 3] = (Math.random() - 0.5) * 0.6;
          velocities[i * 3 + 1] = Math.random() * 0.8;
          velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.6;
        }
        burstSystem.geometry.attributes.position.needsUpdate = true;
        burstSystem.geometry.attributes.velocity.needsUpdate = true;
      }

      function updateSun(delta) {
        sunMesh.rotation.y += delta * 0.2;
      }

      function updateClouds(delta) {
        clouds.forEach(cloud => {
          cloud.position.x += delta * 0.5;
          if (cloud.position.x > waveWidth / 2 + 5) {
            cloud.position.x = -waveWidth / 2 - 5;
          }
        });
      }

      function updateTimer(delta) {
        if (gameState !== 'playing') return;
        timeLeft -= delta;
        if (timeLeft <= 0) {
          timeLeft = 0;
          endGame();
        }
        updateUI();
      }

      function updateUI() {
        uiScore.textContent = `Score: ${score}`;
        uiTimer.textContent = `Time: ${Math.ceil(timeLeft)}`;
      }

      function toggleMute() {
        mute = !mute;
        const muteBtn = document.getElementById('muteBtn');
        muteBtn.src = mute
          ? 'https://unpkg.com/lucide-static@latest/icons/mute.svg'
          : 'https://unpkg.com/lucide-static@latest/icons/volume-2.svg';
      }

      function togglePause() {
        if (gameState === 'playing') {
          gameState = 'paused';
          pauseOverlay.style.display = 'flex';
        } else if (gameState === 'paused') {
          gameState = 'playing';
          pauseOverlay.style.display = 'none';
          clock.getDelta();
        }
      }

      function initAudio() {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          loadSound('https://cdn.jsdelivr.net/gh/terkelg/awesome-audio@master/splash.wav', buffer => splashBuffer = buffer);
          loadSound('https://cdn.jsdelivr.net/gh/terkelg/awesome-audio@master/collision.wav', buffer => collisionBuffer = buffer);
        } catch (e) {
          console.warn('Web Audio API not supported:', e);
        }
      }

      function loadSound(url, callback) {
        fetch(url)
          .then(r => r.arrayBuffer())
          .then(buf => audioCtx.decodeAudioData(buf))
          .then(decoded => callback(decoded))
          .catch(err => console.error('Audio load error:', err));
      }

      function playSound(buffer) {
        if (mute || !audioCtx) return;
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);
        source.start(0);
      }

      function animate() {
        requestAnimationFrame(animate);
        const now = performance.now();
        const delta = (now - lastUpdateTime) / 1000;
        lastUpdateTime = now;

        if (gameState === 'playing') {
          updateWave(now * 0.001);
          updateObstacles(delta);
          updateParticles(delta);
          updateBurst(delta);
          updateSun(delta);
          updateClouds(delta);
          updateTimer(delta);

          if (now - lastSpawnTime > spawnInterval && obstacles.length < maxObstacles) {
            spawnObstacle();
            lastSpawnTime = now;
          }
        }

        renderer.render(scene, camera);
      }

      function clamp(val, min, max) {
        return Math.max(min, Math.min(max, val));
      }

      function randomRange(min, max) {
        return Math.random() * (max - min) + min;
      }
    });
  </script>
</body>
</html>
