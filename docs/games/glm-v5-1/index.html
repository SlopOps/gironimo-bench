<!DOCTYPE html>
<html model=glm lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1 Overtake</title>
    <style>
        :root {
            --f1-red: #E10600;
            --f1-dark: #15151E;
            --f1-grey: #38383F;
            --asphalt: #1C1C2A;
            --grass: #006F3C;
            --kerb-red: #E10600;
            --kerb-white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-aspect-ratio: 9/16;
            background-color: var(--grass);
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .hud-box {
            background: rgba(21, 21, 30, 0.85);
            border-left: 4px solid var(--f1-red);
            padding: 8px 12px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            backdrop-filter: blur(4px);
            border-radius: 2px;
        }

        .hud-label {
            font-size: 10px;
            color: #aaa;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .hud-value {
            font-size: 20px;
            font-family: 'Courier New', Courier, monospace;
        }

        #speed-display {
            position: absolute;
            bottom: 30px;
            right: 20px;
            color: var(--f1-red);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 28px;
            text-shadow: 0 0 10px rgba(225, 6, 0, 0.5);
        }
        
        #speed-unit {
            font-size: 12px;
            color: white;
            margin-left: 4px;
        }

        #lives-display {
            position: absolute;
            bottom: 30px;
            left: 20px;
            display: flex;
            gap: 8px;
        }

        .life-helmet {
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50% 50% 40% 40%;
            position: relative;
            overflow: hidden;
        }

        .life-helmet::after {
            content: '';
            position: absolute;
            top: 40%;
            left: 0;
            width: 100%;
            height: 60%;
            background: var(--f1-red);
        }

        .life-helmet.lost {
            background: #333;
        }
        .life-helmet.lost::after {
            background: #111;
        }

        #instruction {
            position: absolute;
            bottom: 80px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; color: white; }
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: auto;
        }

        .hidden {
            display: none !important;
        }

        .overlay h1 {
            color: var(--f1-red);
            font-size: 42px;
            font-style: italic;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .overlay h2 {
            color: white;
            font-size: 24px;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .overlay button {
            background: var(--f1-red);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
            transition: transform 0.1s, filter 0.1s;
        }

        .overlay button:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }

        #final-score {
            color: white;
            font-size: 64px;
            font-weight: 900;
            font-family: 'Courier New', Courier, monospace;
            margin-bottom: 10px;
        }
        
        #final-label {
            color: #aaa;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        /* DRS Zones styling */
        .drs-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 10px,
                var(--f1-red) 10px,
                var(--f1-red) 20px
            );
            opacity: 0.3;
        }
    </style>
</head>

<script>
  const MODEL_SLUG = "glm-v5-1"; // 🔧 match the `path` column in games.csv

  (async function loadGameBanner() {
    try {
      const res = await fetch('../games.csv', { cache: 'no-store' });
      const text = await res.text();
      const rows = text.trim().split('\n').map(r => r.split(','));
      const headers = rows.shift();
      const data = rows.map(row => {
        const obj = {};
        headers.forEach((h, i) => obj[h.trim()] = (row[i] || '').trim());
        return obj;
      });

      const match = data.find(row => row.path === MODEL_SLUG);

      if (!match) {
        document.getElementById('banner-game-name').textContent = MODEL_SLUG;
        document.getElementById('banner-stars').textContent = '☆☆☆☆☆';
        return;
      }

      document.getElementById('banner-game-name').textContent = match.game_name || MODEL_SLUG;
      document.getElementById('banner-model-slug').textContent = match.path;

      const starCount = parseInt(match.stars, 10) || 0;
      document.getElementById('banner-stars').textContent =
        '★'.repeat(starCount) + '☆'.repeat(Math.max(0, 5 - starCount));

      if (match.youtube_link) {
        const watchEl = document.getElementById('banner-watch');
        watchEl.href = match.youtube_link;
        watchEl.style.display = 'inline-flex';
      }

    } catch (err) {
      console.error('Banner error:', err);
      document.getElementById('banner-game-name').textContent = MODEL_SLUG;
    }
  })();
</script>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Constants & Config
    const WORLD_W = 360;
    const WORLD_H = 640;
    const LANE_COUNT = 3;
    const TRACK_WIDTH = 240;
    const LANE_WIDTH = TRACK_WIDTH / LANE_COUNT;
    const TRACK_LEFT = (WORLD_W - TRACK_WIDTH) / 2;
    const CAR_W = 40;
    const CAR_H = 90;
    
    // Game State
    let state = 'start'; // start, playing, gameover
    let score = 0;
    let lives = 3;
    let speed = 300; // pixels per second
    let targetLane = 1;
    let playerX = TRACK_LEFT + LANE_WIDTH * 1 + (LANE_WIDTH / 2);
    let playerY = WORLD_H - 120;
    let animFrame = null;
    let lastTime = 0;
    let trackOffset = 0;
    let enemies = [];
    let particles = [];
    let exhaustParticles = [];
    let spawnTimer = 0;
    let invincibleTimer = 0;
    let screenShake = 0;
    
    // DOM elements
    const scoreEl = document.getElementById('score-value');
    const posEl = document.getElementById('pos-value');
    const speedEl = document.getElementById('speed-display');
    const instrEl = document.getElementById('instruction');
    const startScreen = document.getElementById('start-screen');
    const gameoverScreen = document.getElementById('gameover-screen');
    const finalScoreEl = document.getElementById('final-score');

    // Resize Handler
    function resize() {
        const container = document.getElementById('game-container');
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Input Handling
    function handleInput(e) {
        e.preventDefault();
        if (state === 'playing') {
            const touchX = e.touches ? e.touches[0].clientX : e.clientX;
            const screenMid = window.innerWidth / 2;
            
            if (touchX < screenMid) {
                targetLane = Math.max(0, targetLane - 1);
            } else {
                targetLane = Math.min(2, targetLane + 1);
            }
            
            // Spawn tire smoke on lane change
            spawnTireSmoke(playerX, playerY + CAR_H/2);
        }
    }

    document.addEventListener('touchstart', handleInput, {passive: false});
    document.addEventListener('mousedown', handleInput);

    document.getElementById('start-btn').addEventListener('click', () => {
        startGame();
    });

    document.getElementById('restart-btn').addEventListener('click', () => {
        startGame();
    });

    // Game Init
    function startGame() {
        state = 'playing';
        score = 0;
        lives = 3;
        speed = 350;
        targetLane = 1;
        playerX = TRACK_LEFT + LANE_WIDTH * 1 + (LANE_WIDTH / 2);
        enemies = [];
        particles = [];
        exhaustParticles = [];
        spawnTimer = 0;
        invincibleTimer = 0;
        screenShake = 0;
        
        updateHUD();
        updateLives();
        
        startScreen.classList.add('hidden');
        gameoverScreen.classList.add('hidden');
        instrEl.style.display = 'block';
        
        setTimeout(() => {
            instrEl.style.display = 'none';
        }, 3000);

        lastTime = performance.now();
        if(animFrame) cancelAnimationFrame(animFrame);
        loop(lastTime);
    }

    function gameOver() {
        state = 'gameover';
        finalScoreEl.textContent = score;
        gameoverScreen.classList.remove('hidden');
    }

    // Drawing Helpers
    function drawTrack(dt) {
        // Grass
        ctx.fillStyle = '#005C30';
        ctx.fillRect(0, 0, WORLD_W, WORLD_H);
        
        // Runoff area (grey)
        ctx.fillStyle = '#444';
        ctx.fillRect(TRACK_LEFT - 20, 0, TRACK_WIDTH + 40, WORLD_H);
        
        // Asphalt
        ctx.fillStyle = '#1C1C2A';
        ctx.fillRect(TRACK_LEFT, 0, TRACK_WIDTH, WORLD_H);
        
        // Kerbs
        trackOffset = (trackOffset + speed * dt) % 40;
        drawKerbs(TRACK_LEFT - 20, trackOffset); // Left kerb
        drawKerbs(TRACK_LEFT + TRACK_WIDTH, trackOffset); // Right kerb
        
        // Lane lines (dashed)
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.setLineDash([20, 20]);
        ctx.lineDashOffset = -trackOffset * 2;
        
        for(let i=1; i<LANE_COUNT; i++) {
            const x = TRACK_LEFT + LANE_WIDTH * i;
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, WORLD_H);
            ctx.stroke();
        }
        ctx.setLineDash([]);

        // Speed lines (effects of extreme speed)
        if(speed > 600) {
            const intensity = (speed - 600) / 400;
            ctx.strokeStyle = `rgba(255,255,255,${Math.min(intensity * 0.3, 0.3)})`;
            ctx.lineWidth = 1;
            for(let i=0; i<5; i++) {
                const rx = Math.random() * WORLD_W;
                const ry = Math.random() * WORLD_H;
                ctx.beginPath();
                ctx.moveTo(rx, ry);
                ctx.lineTo(rx, ry + 50 + speed*0.1);
                ctx.stroke();
            }
        }
    }

    function drawKerbs(x, offset) {
        const kerbW = 20;
        const blockH = 20;
        const numBlocks = Math.ceil(WORLD_H / blockH) + 2;
        
        for(let i=0; i<numBlocks; i++) {
            const isRed = i % 2 === 0;
            ctx.fillStyle = isRed ? '#E10600' : '#FFFFFF';
            const y = i * blockH - offset;
            ctx.fillRect(x, y, kerbW, blockH);
        }
    }

    function drawF1Car(x, y, color, isPlayer, dt) {
        ctx.save();
        ctx.translate(x, y);
        
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.ellipse(2, 5, 18, 35, 0, 0, Math.PI*2);
        ctx.fill();
        
        // Main Body
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(0, -45); // Nose
        ctx.lineTo(-8, -20);
        ctx.lineTo(-12, 30); // Sidepods
        ctx.lineTo(-16, 45); // Rear
        ctx.lineTo(16, 45);
        ctx.lineTo(12, 30);
        ctx.lineTo(8, -20);
        ctx.closePath();
        ctx.fill();
        
        // Cockpit
        ctx.fillStyle = '#111';
        ctx.beginPath();
        ctx.ellipse(0, -10, 5, 12, 0, 0, Math.PI*2);
        ctx.fill();
        
        // Halo
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(-5, -20);
        ctx.quadraticCurveTo(0, -30, 5, -20);
        ctx.stroke();
        
        // Wheels
        ctx.fillStyle = '#111';
        // Front wheels
        ctx.fillRect(-18, -25, 7, 18);
        ctx.fillRect(11, -25, 7, 18);
        // Rear wheels (wider)
        ctx.fillRect(-20, 25, 9, 22);
        ctx.fillRect(11, 25, 9, 22);
        
        // Rear Wing
        ctx.fillStyle = color;
        ctx.fillRect(-22, 42, 44, 5);
        ctx.fillStyle = '#222';
        ctx.fillRect(-2, 35, 4, 10); // Wing pillar
        
        // Front Wing
        ctx.fillStyle = '#222';
        ctx.fillRect(-20, -45, 40, 3);
        
        // Player glow effect
        if(isPlayer && invincibleTimer > 0) {
            ctx.globalAlpha = Math.abs(Math.sin(invincibleTimer * 10));
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.ellipse(0, 0, 25, 50, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1.0;
        }
        
        ctx.restore();
        
        // Exhaust fire (player only)
        if(isPlayer && speed > 400) {
            const fireSize = (speed - 400) / 15;
            if(Math.random() > 0.2) {
                ctx.fillStyle = `rgba(255, ${Math.floor(100 + Math.random()*100)}, 0, ${0.5 + Math.random()*0.5})`;
                ctx.beginPath();
                ctx.moveTo(x - 3, y + 45);
                ctx.lineTo(x + 3, y + 45);
                ctx.lineTo(x, y + 45 + fireSize + Math.random()*10);
                ctx.fill();
            }
        }
    }

    // Particles
    function spawnSparks(x, y) {
        for(let i=0; i<20; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 300,
                vy: (Math.random() - 0.5) * 200 - 100,
                life: 0.5 + Math.random() * 0.5,
                maxLife: 1.0,
                size: 2 + Math.random() * 2,
                color: Math.random() > 0.5 ? '#FFD700' : '#FFA500'
            });
        }
    }

    function spawnTireSmoke(x, y) {
        for(let i=0; i<5; i++) {
            particles.push({
                x: x + (Math.random() - 0.5) * 20,
                y: y,
                vx: (Math.random() - 0.5) * 40,
                vy: -speed * 0.2,
                life: 0.4 + Math.random() * 0.3,
                maxLife: 0.7,
                size: 5 + Math.random() * 5,
                color: 'rgba(255,255,255,0.4)',
                isSmoke: true
            });
        }
    }

    function updateParticles(dt) {
        for(let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.life -= dt;
            
            if(p.isSmoke) {
                p.size += dt * 20;
                p.vx *= 0.95;
            } else {
                p.vy += 500 * dt; // gravity for sparks
            }
            
            if(p.life <= 0) {
                particles.splice(i, 1);
            }
        }
    }

    function drawParticles() {
        particles.forEach(p => {
            const alpha = p.life / p.maxLife;
            if(p.isSmoke) {
                ctx.fillStyle = `rgba(200,200,200,${alpha * 0.3})`;
            } else {
                ctx.fillStyle = p.color;
            }
            ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
        });
    }

    // Enemies
    const TEAM_COLORS = ['#00D2BE', '#DC0000', '#006F62', '#0090FF', '#2B4562', '#006F62', '#52E252']; // Mercedes, Ferrari, Aston, AlphaTauri, Williams, etc.
    
    function spawnEnemy() {
        const lane = Math.floor(Math.random() * LANE_COUNT);
        const x = TRACK_LEFT + LANE_WIDTH * lane + (LANE_WIDTH / 2);
        const color = TEAM_COLORS[Math.floor(Math.random() * TEAM_COLORS.length)];
        
        // Prevent spawning directly on top of other cars too closely
        const tooClose = enemies.some(e => e.lane === lane && e.y < 150);
        if(tooClose) return;

        enemies.push({
            x: x,
            y: -100,
            lane: lane,
            speed: speed * (0.6 + Math.random() * 0.2), // Slower than player logic speed
            color: color,
            passed: false
        });
    }

    function updateEnemies(dt) {
        spawnTimer -= dt;
        if(spawnTimer <= 0) {
            spawnEnemy();
            // Spawn rate increases with speed
            spawnTimer = Math.max(0.4, 1.5 - (speed - 350) / 500); 
        }

        for(let i = enemies.length - 1; i >= 0; i--) {
            const e = enemies[i];
            // Enemies move down relative to player speed and their own speed
            e.y += (speed - e.speed) * dt; 

            // Check if passed
            if(!e.passed && e.y > playerY + CAR_H) {
                e.passed = true;
                score++;
                updateHUD();
            }

            // Collision Detection
            if(invincibleTimer <= 0) {
                const dx = Math.abs(playerX - e.x);
                const dy = Math.abs(playerY - e.y);
                if(dx < CAR_W - 5 && dy < CAR_H - 10) {
                    // Collision!
                    lives--;
                    updateLives();
                    spawnSparks(playerX, playerY - CAR_H/2);
                    screenShake = 0.3;
                    invincibleTimer = 1.5; // 1.5s invincibility
                    speed = Math.max(350, speed - 100); // Lose speed on crash
                    
                    if(lives <= 0) {
                        gameOver();
                        return;
                    }
                }
            }

            // Remove off-screen
            if(e.y > WORLD_H + 150) {
                enemies.splice(i, 1);
            }
        }
    }

    // HUD Updates
    function updateHUD() {
        scoreEl.textContent = score;
        const displaySpeed = Math.floor(speed * 0.9); // Fake km/h
        speedEl.innerHTML = `${displaySpeed}<span id="speed-unit">km/h</span>`;
        
        // Position logic (simple inverse of score)
        const pos = Math.max(1, 20 - score);
        posEl.textContent = `P${pos}`;
    }

    function updateLives() {
        document.getElementById('life1').className = lives >= 1 ? 'life-helmet' : 'life-helmet lost';
        document.getElementById('life2').className = lives >= 2 ? 'life-helmet' : 'life-helmet lost';
        document.getElementById('life3').className = lives >= 3 ? 'life-helmet' : 'life-helmet lost';
    }

    // Main Loop
    function loop(time) {
        if(state !== 'playing') return;
        
        const dt = Math.min((time - lastTime) / 1000, 0.05); // Cap dt to prevent jumps
        lastTime = time;

        // Update logic
        speed += dt * 8; // Gradually increase speed
        invincibleTimer = Math.max(0, invincibleTimer - dt);
        screenShake = Math.max(0, screenShake - dt);

        // Smooth player movement
        const targetX = TRACK_LEFT + LANE_WIDTH * targetLane + (LANE_WIDTH / 2);
        playerX += (targetX - playerX) * Math.min(1, dt * 15); // Smooth snap

        updateEnemies(dt);
        updateParticles(dt);
        updateHUD();

        // Draw
        ctx.save();
        
        // Apply screen shake
        if(screenShake > 0) {
            const shakeX = (Math.random() - 0.5) * screenShake * 20;
            const shakeY = (Math.random() - 0.5) * screenShake * 20;
            ctx.translate(shakeX, shakeY);
        }

        // Scale context to our 360x640 world
        const scaleX = canvas.width / WORLD_W;
        const scaleY = canvas.height / WORLD_H;
        const scale = Math.min(scaleX, scaleY);
        
        // Center the canvas
        const offsetX = (canvas.width - WORLD_W * scale) / 2;
        const offsetY = (canvas.height - WORLD_H * scale) / 2;
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        // Clip to world bounds to hide shake artifacts
        ctx.beginPath();
        ctx.rect(0, 0, WORLD_W, WORLD_H);
        ctx.clip();

        drawTrack(dt);
        
        // Draw enemies
        enemies.forEach(e => {
            drawF1Car(e.x, e.y, e.color, false, dt);
        });

        // Draw player
        drawF1Car(playerX, playerY, '#FFD700', true, dt); // Gold player car

        drawParticles();

        ctx.restore();

        animFrame = requestAnimationFrame(loop);
    }

    // Initial idle render
    function renderIdle() {
        if(state !== 'start') return;
        const dt = 0.016;
        speed = 300;
        trackOffset = (trackOffset + speed * dt) % 40;
        
        const scaleX = canvas.width / WORLD_W;
        const scaleY = canvas.height / WORLD_H;
        const scale = Math.min(scaleX, scaleY);
        const offsetX = (canvas.width - WORLD_W * scale) / 2;
        const offsetY = (canvas.height - WORLD_H * scale) / 2;

        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);
        
        drawTrack(dt);
        drawF1Car(WORLD_W / 2, WORLD_H / 2, '#E10600', false, dt);
        
        ctx.restore();
        requestAnimationFrame(renderIdle);
    }

    renderIdle();
</script>
</body>
</div>
</body>
