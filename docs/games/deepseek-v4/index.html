<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PIT STOP CHALLENGE - F1 Tire Change</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 20% 10%, #0a0f1e, #03060c);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Rajdhani', 'Orbitron', 'Impact', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            position: relative;
            touch-action: pan-x pan-y; /* prevent zoom while keeping taps */
        }

        /* strict 9:16 portrait container - game fits exactly */
        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            max-height: 800px;
            aspect-ratio: 9 / 16;
            background: #010101;
            box-shadow: 0 0 0 4px #e10600, 0 0 0 8px rgba(225, 6, 0, 0.3);
            overflow: hidden;
            border-radius: 24px;
        }

        /* three.js canvas background (3D scene) */
        #three-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
            pointer-events: none;
        }

        /* UI overlay - all interactive elements on top */
        .ui-overlay {
            position: absolute;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px 20px 32px 20px;
            background: radial-gradient(ellipse at 50% 30%, rgba(0,0,0,0.55), rgba(0,0,0,0.85));
            backdrop-filter: blur(2px);
        }

        /* header: timer + best */
        .pit-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            padding: 12px 18px;
            border-radius: 60px;
            border-left: 4px solid #e10600;
            border-right: 4px solid #e10600;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .timer-box, .best-box {
            text-align: center;
        }
        .timer-label, .best-label {
            font-size: 12px;
            letter-spacing: 2px;
            font-weight: 700;
            color: #ffb347;
            text-transform: uppercase;
            text-shadow: 0 0 3px #ff4500;
        }
        .timer-value, .best-value {
            font-size: 32px;
            font-weight: 900;
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #fff, #e10600);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(225,6,0,0.4);
            letter-spacing: 2px;
        }
        .timer-value {
            font-size: 40px;
        }

        /* Main car zone + wheels grid (F1 Pit style) */
        .car-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 15px 0;
        }
        .wheels-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px 35px;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
        }
        .wheel-card {
            background: radial-gradient(circle at 30% 30%, #1e1e2f, #0b0b12);
            border-radius: 50%;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 3px #444, 0 12px 28px black;
            transition: all 0.07s linear;
            cursor: pointer;
            border: 2px solid #aa2e1e;
            position: relative;
            background-image: radial-gradient(circle at 35% 35%, #3a3a4a, #0f0f17);
        }
        .wheel-card:active {
            transform: scale(0.96);
        }
        .wheel-icon {
            font-size: 44px;
            filter: drop-shadow(2px 2px 0px #e10600);
        }
        .wheel-name {
            font-size: 12px;
            font-weight: bold;
            background: #000000aa;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 6px;
            color: #f5b642;
            letter-spacing: 1px;
        }
        /* changed tire style */
        .wheel-card.changed {
            background: radial-gradient(circle at 30% 30%, #2d4d2d, #0f2e0f);
            box-shadow: 0 0 0 3px #00ffb3, 0 0 15px #00ffaa;
            border-color: #00ffaa;
        }
        .wheel-card.changed .wheel-icon {
            filter: drop-shadow(0 0 6px #0f0);
            content: "✅";
        }
        .wheel-card.disabled-tap {
            opacity: 0.8;
            cursor: default;
        }

        /* status + actions */
        .pit-status {
            background: #000000aa;
            backdrop-filter: blur(8px);
            padding: 12px;
            border-radius: 60px;
            text-align: center;
            font-weight: bold;
            font-size: 17px;
            letter-spacing: 1px;
            color: #ffcc77;
            text-transform: uppercase;
            margin: 8px 0;
            border-top: 1px solid #e10600;
            border-bottom: 1px solid #e10600;
        }

        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 8px;
        }
        .f1-btn {
            background: linear-gradient(95deg, #b31200, #e10600);
            border: none;
            padding: 14px 24px;
            font-weight: 900;
            font-size: 18px;
            letter-spacing: 2px;
            color: white;
            text-transform: uppercase;
            border-radius: 48px;
            box-shadow: 0 5px 0 #630000;
            transition: 0.05s linear;
            cursor: pointer;
            font-family: inherit;
            flex: 1;
            text-align: center;
        }
        .f1-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #630000;
        }
        .reset-btn {
            background: linear-gradient(95deg, #2c2c3a, #1a1a2a);
            box-shadow: 0 5px 0 #0a0a12;
        }
        .hidden {
            display: none;
        }

        /* particle canvas overlay */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        /* small animation / fuel effect */
        @keyframes glowPulse {
            0% { text-shadow: 0 0 2px cyan;}
            100% { text-shadow: 0 0 12px #e10600;}
        }
        .timer-value.active-timer {
            animation: glowPulse 0.5s infinite alternate;
        }
        .instruction {
            font-size: 10px;
            text-align: center;
            color: #ffbc6e;
            background: #000000aa;
            border-radius: 30px;
            padding: 4px;
            margin-top: 5px;
        }
    </style>
</head>

<script>
  const MODEL_SLUG = "deepseek-v4"; // 🔧 match the `path` column in games.csv

  (async function loadGameBanner() {
    try {
      const res = await fetch('../games.csv', { cache: 'no-store' });
      const text = await res.text();
      const rows = text.trim().split('\n').map(r => r.split(','));
      const headers = rows.shift();
      const data = rows.map(row => {
        const obj = {};
        headers.forEach((h, i) => obj[h.trim()] = (row[i] || '').trim());
        return obj;
      });

      const match = data.find(row => row.path === MODEL_SLUG);

      if (!match) {
        document.getElementById('banner-game-name').textContent = MODEL_SLUG;
        document.getElementById('banner-stars').textContent = '☆☆☆☆☆';
        return;
      }

      document.getElementById('banner-game-name').textContent = match.game_name || MODEL_SLUG;
      document.getElementById('banner-model-slug').textContent = match.path;

      const starCount = parseInt(match.stars, 10) || 0;
      document.getElementById('banner-stars').textContent =
        '★'.repeat(starCount) + '☆'.repeat(Math.max(0, 5 - starCount));

      if (match.youtube_link) {
        const watchEl = document.getElementById('banner-watch');
        watchEl.href = match.youtube_link;
        watchEl.style.display = 'inline-flex';
      }

    } catch (err) {
      console.error('Banner error:', err);
      document.getElementById('banner-game-name').textContent = MODEL_SLUG;
    }
  })();
</script>

<script type="module">
    import * as THREE from 'three';

    // ----------------------------- 3D SCENE (F1 CAR + PIT ATMOSPHERE) -----------------------------
    const canvasEl = document.getElementById('three-canvas');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x010101);
    scene.fog = new THREE.FogExp2(0x010101, 0.008);

    const camera = new THREE.PerspectiveCamera(45, 9/16, 0.1, 1000);
    camera.position.set(0, 1.2, 3.2);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ canvas: canvasEl, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;

    // Lights
    const ambLight = new THREE.AmbientLight(0x222222);
    scene.add(ambLight);
    const mainLight = new THREE.DirectionalLight(0xffaa66, 1);
    mainLight.position.set(2, 3, 2);
    mainLight.castShadow = true;
    mainLight.receiveShadow = false;
    scene.add(mainLight);
    const fillLight = new THREE.PointLight(0x4466cc, 0.4);
    fillLight.position.set(-1, 1.5, 1);
    scene.add(fillLight);
    const backLight = new THREE.PointLight(0xff3300, 0.5);
    backLight.position.set(0, 1, -2);
    scene.add(backLight);
    
    // Ground grid (pit lane effect)
    const gridHelper = new THREE.GridHelper(8, 20, 0xe10600, 0x444444);
    gridHelper.position.y = -0.8;
    gridHelper.material.transparent = true;
    gridHelper.material.opacity = 0.35;
    scene.add(gridHelper);
    
    // F1 Car Body (Low poly but recognizable)
    const carGroup = new THREE.Group();
    // Chassis
    const chassisGeo = new THREE.BoxGeometry(0.9, 0.25, 1.6);
    const chassisMat = new THREE.MeshStandardMaterial({ color: 0xcc2200, roughness: 0.3, metalness: 0.85 });
    const chassis = new THREE.Mesh(chassisGeo, chassisMat);
    chassis.castShadow = true;
    chassis.position.y = 0;
    carGroup.add(chassis);
    // Cockpit + halo
    const cockpitGeo = new THREE.SphereGeometry(0.32, 16, 16);
    const cockpitMat = new THREE.MeshStandardMaterial({ color: 0x111122, metalness: 0.7, roughness: 0.2 });
    const cockpit = new THREE.Mesh(cockpitGeo, cockpitMat);
    cockpit.position.set(0, 0.2, 0.35);
    cockpit.scale.set(0.8, 0.4, 0.6);
    carGroup.add(cockpit);
    // Rear wing
    const wingGeo = new THREE.BoxGeometry(1.0, 0.08, 0.25);
    const wingMat = new THREE.MeshStandardMaterial({ color: 0xdd3333 });
    const rearWing = new THREE.Mesh(wingGeo, wingMat);
    rearWing.position.set(0, 0.22, -0.75);
    carGroup.add(rearWing);
    // Front wing
    const frontWingGeo = new THREE.BoxGeometry(0.85, 0.07, 0.2);
    const frontWing = new THREE.Mesh(frontWingGeo, wingMat);
    frontWing.position.set(0, 0.05, 0.85);
    carGroup.add(frontWing);
    // Wheels (cylinders)
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.6, roughness: 0.5 });
    const positions = [[-0.62, -0.1, 0.55], [0.62, -0.1, 0.55], [-0.62, -0.1, -0.65], [0.62, -0.1, -0.65]];
    positions.forEach(pos => {
        const wheelGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.5, 24);
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(pos[0], pos[1], pos[2]);
        wheel.castShadow = true;
        carGroup.add(wheel);
    });
    // air intake
    const intakeGeo = new THREE.CylinderGeometry(0.15, 0.2, 0.4, 8);
    const intakeMat = new THREE.MeshStandardMaterial({ color: 0xdd4422 });
    const intake = new THREE.Mesh(intakeGeo, intakeMat);
    intake.position.set(0, 0.25, -0.45);
    carGroup.add(intake);
    
    scene.add(carGroup);
    carGroup.position.y = -0.3;
    carGroup.position.x = 0;
    
    // rotating camera effect? rotate car slightly
    let time = 0;
    
    // pit crew style floating particles (sparks)
    const particleFieldGeo = new THREE.BufferGeometry();
    const particleCount = 300;
    const particlePositions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
        particlePositions[i*3] = (Math.random() - 0.5) * 6;
        particlePositions[i*3+1] = Math.random() * 2 - 0.5;
        particlePositions[i*3+2] = (Math.random() - 0.5) * 5;
    }
    particleFieldGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    const particleMatField = new THREE.PointsMaterial({ color: 0xff6600, size: 0.03, transparent: true, opacity: 0.5 });
    const dustParticles = new THREE.Points(particleFieldGeo, particleMatField);
    scene.add(dustParticles);
    
    function animate3D() {
        requestAnimationFrame(animate3D);
        time += 0.008;
        // subtle floating & rotation
        carGroup.rotation.y = Math.sin(time * 0.5) * 0.08;
        carGroup.position.y = -0.3 + Math.sin(time * 2.5) * 0.01;
        dustParticles.rotation.y += 0.005;
        dustParticles.rotation.x = Math.sin(time * 0.3) * 0.1;
        renderer.render(scene, camera);
    }
    animate3D();
    
    window.addEventListener('resize', () => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
    });
    
    // ----------------------------- 2D PARTICLE SYSTEM (SPARKS / BURSTS) -----------------------------
    const particleCanvas = document.getElementById('particle-canvas');
    const ctx = particleCanvas.getContext('2d');
    let particles = [];
    
    function resizeParticleCanvas() {
        const container = document.querySelector('.game-container');
        const rect = container.getBoundingClientRect();
        particleCanvas.width = rect.width;
        particleCanvas.height = rect.height;
        particleCanvas.style.width = `${rect.width}px`;
        particleCanvas.style.height = `${rect.height}px`;
    }
    resizeParticleCanvas();
    window.addEventListener('resize', resizeParticleCanvas);
    
    class Spark {
        constructor(x, y, vx, vy, size, color) {
            this.x = x; this.y = y; this.vx = vx; this.vy = vy;
            this.size = size; this.color = color; this.life = 1.0;
            this.decay = 0.02 + Math.random() * 0.03;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.2;
            this.life -= this.decay;
            return this.life > 0;
        }
        draw(ctx) {
            ctx.globalAlpha = this.life * 0.8;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * (0.6 + this.life * 0.5), 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }
    
    function burstParticlesAtElement(element, isVictory = false) {
        const containerRect = document.querySelector('.game-container').getBoundingClientRect();
        const rect = element.getBoundingClientRect();
        const centerX = (rect.left + rect.right) / 2 - containerRect.left;
        const centerY = (rect.top + rect.bottom) / 2 - containerRect.top;
        const count = isVictory ? 45 : 18;
        const colors = isVictory ? ['#ffaa33', '#ff5500', '#ffff66', '#e10600'] : ['#ffaa33', '#ff6600', '#ffcc44'];
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 5;
            const vx = Math.cos(angle) * speed * (isVictory ? 1.8 : 1);
            const vy = Math.sin(angle) * speed * (isVictory ? 1.5 : 0.8) - 2;
            const size = 3 + Math.random() * 6;
            const color = colors[Math.floor(Math.random() * colors.length)];
            particles.push(new Spark(centerX, centerY, vx, vy, size, color));
        }
        if (isVictory) {
            for (let i=0;i<30;i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 3 + Math.random() * 7;
                particles.push(new Spark(centerX, centerY, Math.cos(angle)*speed, Math.sin(angle)*speed - 1, 4, '#ffaa22'));
            }
        }
    }
    
    function updateParticles() {
        ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
        particles = particles.filter(p => p.update());
        particles.forEach(p => p.draw(ctx));
        requestAnimationFrame(updateParticles);
    }
    updateParticles();
    
    // ----------------------------- GAME LOGIC (Pit Stop Mini Game) -----------------------------
    const wheels = ['FL', 'FR', 'RL', 'RR'];
    let wheelStatus = { FL: false, FR: false, RL: false, RR: false };
    let gameActive = false;
    let timerSeconds = 12.0;
    let timerInterval = null;
    let bestTime = localStorage.getItem('f1beststop') ? parseFloat(localStorage.getItem('f1beststop')) : null;
    const timerDisplay = document.getElementById('timerDisplay');
    const bestDisplay = document.getElementById('bestDisplay');
    const statusMsg = document.getElementById('statusMsg');
    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const wheelElements = document.querySelectorAll('.wheel-card');
    
    function updateBestUI() {
        if (bestTime !== null && bestTime > 0) {
            bestDisplay.innerText = bestTime.toFixed(1);
        } else {
            bestDisplay.innerText = '--.-';
        }
    }
    
    function updateTimerUI() {
        timerDisplay.innerText = timerSeconds.toFixed(1);
        if (gameActive && timerSeconds > 0) timerDisplay.classList.add('active-timer');
        else timerDisplay.classList.remove('active-timer');
    }
    
    function checkWin() {
        if (!gameActive) return false;
        const allChanged = wheels.every(w => wheelStatus[w] === true);
        if (allChanged && timerSeconds > 0) {
            // VICTORY pit stop completed
            if (timerInterval) clearInterval(timerInterval);
            gameActive = false;
            const remaining = timerSeconds;
            statusMsg.innerHTML = `🏆 PERFECT STOP! ${remaining.toFixed(1)}s LEFT 🏆`;
            if (bestTime === null || remaining > bestTime) {
                bestTime = remaining;
                localStorage.setItem('f1beststop', bestTime);
                updateBestUI();
                statusMsg.innerHTML = `🏆 NEW RECORD! ${remaining.toFixed(1)}s 🏆`;
            }
            // celebration burst around all wheels
            wheelElements.forEach(w => burstParticlesAtElement(w, true));
            // extra fireworks burst
            for(let i=0;i<3;i++) burstParticlesAtElement(wheelElements[i%4], true);
            disableWheelClicks(true);
            return true;
        }
        return false;
    }
    
    function gameOverTimeout() {
        if (!gameActive) return;
        if (timerSeconds <= 0.0) {
            if (timerInterval) clearInterval(timerInterval);
            gameActive = false;
            statusMsg.innerHTML = `⛔ PIT FAILURE! TIME OUT ⛔`;
            disableWheelClicks(true);
            timerDisplay.innerText = "0.0";
            timerDisplay.classList.remove('active-timer');
            // red particle burst on car body
            const anyWheel = wheelElements[0];
            if (anyWheel) burstParticlesAtElement(anyWheel, false);
        }
    }
    
    function startTimerCountdown() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (gameActive && timerSeconds > 0) {
                timerSeconds -= 0.1;
                if (timerSeconds < 0) timerSeconds = 0;
                updateTimerUI();
                if (timerSeconds <= 0.0) {
                    gameOverTimeout();
                } else {
                    checkWin(); // check after each tick incase last wheel tapped exactly
                }
            } else if (!gameActive) {
                if (timerInterval) clearInterval(timerInterval);
            }
        }, 100);
    }
    
    function resetGameState(keepBest = true) {
        if (timerInterval) clearInterval(timerInterval);
        gameActive = false;
        timerSeconds = 12.0;
        updateTimerUI();
        wheelStatus = { FL: false, FR: false, RL: false, RR: false };
        wheelElements.forEach(el => {
            el.classList.remove('changed');
            el.classList.remove('disabled-tap');
        });
        statusMsg.innerHTML = '🏁 READY FOR PIT STOP 🏁';
        timerDisplay.classList.remove('active-timer');
        disableWheelClicks(false);
        // but interaction only if gameActive false, so start needed
    }
    
    function disableWheelClicks(disabledState) {
        // visual & logical but click listener will check gameActive anyway
        wheelElements.forEach(el => {
            if (disabledState) el.style.pointerEvents = 'none';
            else el.style.pointerEvents = 'auto';
        });
    }
    
    function startPitStop() {
        if (gameActive) return;
        resetGameState();
        gameActive = true;
        wheelStatus = { FL: false, FR: false, RL: false, RR: false };
        wheelElements.forEach(el => {
            el.classList.remove('changed');
            el.style.pointerEvents = 'auto';
        });
        timerSeconds = 12.0;
        updateTimerUI();
        startTimerCountdown();
        statusMsg.innerHTML = '🔥 GO GO GO! CHANGE ALL TIRES 🔥';
        timerDisplay.classList.add('active-timer');
        disableWheelClicks(false);
    }
    
    function handleWheelTap(wheelId, element) {
        if (!gameActive) {
            statusMsg.innerHTML = '🏎️ PRESS "START PIT" FIRST! 🏎️';
            return;
        }
        if (wheelStatus[wheelId] === true) {
            // already changed— make a little spark but no progress
            burstParticlesAtElement(element, false);
            return;
        }
        // successful tire change
        wheelStatus[wheelId] = true;
        element.classList.add('changed');
        burstParticlesAtElement(element, false);
        // pit crew audio feedback (vibration? but just visual)
        // check win condition
        const allDone = wheels.every(w => wheelStatus[w] === true);
        if (allDone && timerSeconds > 0) {
            checkWin();
        } else {
            statusMsg.innerHTML = `⚡ TIRE CHANGED! ${wheels.filter(w => wheelStatus[w]).length}/4 COMPLETE ⚡`;
        }
    }
    
    // attach listeners
    wheelElements.forEach(el => {
        const wheelId = el.getAttribute('data-wheel');
        el.addEventListener('click', (e) => {
            e.stopPropagation();
            handleWheelTap(wheelId, el);
        });
        el.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleWheelTap(wheelId, el);
        });
    });
    
    startBtn.addEventListener('click', () => {
        startPitStop();
    });
    resetBtn.addEventListener('click', () => {
        if (timerInterval) clearInterval(timerInterval);
        gameActive = false;
        resetGameState();
        statusMsg.innerHTML = '🔄 PIT RESET. PRESS START 🔄';
        timerDisplay.innerText = '12.0';
        timerDisplay.classList.remove('active-timer');
        disableWheelClicks(false);
    });
    
    updateBestUI();
    resetGameState();
    disableWheelClicks(false);
    
    // extra small instruction pop for clarity (already visible)
    setTimeout(() => {
        if(!gameActive) statusMsg.innerHTML = '🏁 TAP START → TAP 4 TIRES 🏁';
    }, 800);
</script>
</body>
</html>
