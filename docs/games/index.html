<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Games — AI BATTLE</title>
  <meta name="description" content="Play AI-generated games from AI BATTLE Shorts on Youtube. Each game is built by a different AI model." />
  <link rel="icon" href="/slopops.png" type="image/png">

  <style>
    :root {
      --bg: #0b0f19;
      --card: rgba(255,255,255,0.06);
      --text: #e8eefc;
      --muted: rgba(232,238,252,0.7);
      --accent: #7c5cff;
      --accent2: #00d4ff;
      --border: rgba(255,255,255,0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(1200px 800px at 20% 0%, #1a1440 0%, transparent 60%),
                  radial-gradient(900px 600px at 90% 20%, #0b3b4a 0%, transparent 55%),
                  var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 0;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo {
      font-weight: 700;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
    }

    header {
      text-align: center;
      padding: 60px 0 40px;
    }

    h1 {
      font-size: 42px;
      line-height: 1.1;
      margin: 0 0 16px;
    }

    .gradient {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .muted { color: var(--muted); }

    .games-grid {
      display: grid;
      gap: 16px;
      padding-bottom: 60px;
    }

    .game-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
    }

    .game-card:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.2);
    }

    .game-info {
      flex: 1;
      min-width: 0;
    }

    .game-name {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .game-model {
      font-size: 13px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .game-actions {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .btn-play {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border: none;
      color: #000;
    }

    .btn-play:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-watch {
      background: rgba(255,255,255,0.08);
    }

    .btn-watch:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
    }

    .btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    footer {
      padding: 40px 0;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      border-top: 1px solid var(--border);
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* Mobile */
    @media (max-width: 600px) {
      header { padding: 40px 0 30px; }
      h1 { font-size: 32px; }

      .game-card {
        flex-direction: column;
        align-items: flex-start;
        padding: 20px;
      }

      .game-actions {
        width: 100%;
        flex-wrap: wrap;
      }

      .btn {
        flex: 1;
        justify-content: center;
        min-width: 120px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <nav>
      <div class="logo">🎮 Games</div>
      <a href="/" class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to Bench
      </a>
    </nav>

    <header>
      <h1>AI BATTLE: <span class="gradient">Games</span></h1>
      <p class="muted">Each game was built by a different AI model. Play, compare, and see who's got game.</p>
    </header>

    <div class="games-grid" id="games-grid">
      <!-- Games loaded dynamically -->
    </div>

    <footer>
      Built by <strong>SlopOps</strong> •
      <a href="https://youtube.com/@SlopOps" target="_blank">YouTube</a>
    </footer>
  </div>

  <script>
    async function loadGames() {
      const container = document.getElementById('games-grid');

      try {
        const response = await fetch('games.csv');
        if (!response.ok) throw new Error('Failed to load');

        const csvText = await response.text();
        const games = parseCSV(csvText);

        // Only show live games
        const liveGames = games.filter(g => g.live === true);

        if (liveGames.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M8 15s1.5-2 4-2 4 2 4 2"/>
                <line x1="9" y1="9" x2="9.01" y2="9"/>
                <line x1="15" y1="9" x2="15.01" y2="9"/>
              </svg>
              <p>No games available yet. Check back soon!</p>
            </div>
          `;
          return;
        }

        container.innerHTML = liveGames.map(game => `
          <div class="game-card">
            <div class="game-info">
              <div class="game-name">${escapeHtml(game.game_name || game.path)}</div>
              <div class="game-model">${escapeHtml(game.path)}</div>
            </div>
            <div class="game-actions">
              <a href="./${game.path}/index.html" class="btn btn-play">
                <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                Play
              </a>
              <a href="${escapeHtml(game.youtube_link)}" target="_blank" rel="noopener" class="btn btn-watch">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
                </svg>
                Watch
              </a>
            </div>
          </div>
        `).join('');

      } catch (err) {
        console.error('Error loading games:', err);
        container.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <p>Could not load games. Please try again later.</p>
          </div>
        `;
      }
    }

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];

      const headers = lines[0].split(',').map(h => h.trim());
      const pathIdx = headers.indexOf('path');
      const nameIdx = headers.indexOf('game_name');
      const liveIdx = headers.indexOf('live');
      const youtubeIdx = headers.indexOf('youtube_link');

      return lines.slice(1).map(line => {
        const values = line.split(',').map(v => v.trim());
        return {
          path: values[pathIdx] || '',
          game_name: values[nameIdx] || '',
          live: values[liveIdx]?.toLowerCase() === 'true',
          youtube_link: values[youtubeIdx] || ''
        };
      }).filter(g => g.path);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    loadGames();
  </script>
</body>
</html>
