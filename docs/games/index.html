<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q5R5LECE2Y"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Q5R5LECE2Y');
  </script>

  <link rel="canonical" href="https://gironimo.ai/games/" />

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Games — AI BATTLE</title>
  <meta name="description" content="Play AI-generated games from AI BATTLE Shorts on Youtube. Each game is built by a different AI model." />
  <link rel="icon" href="/slopops.png" type="image/png">

  <!-- Preconnect for Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"></noscript>

  <style>
    :root {
      --bg: #080c16;
      --card: rgba(255,255,255,0.04);
      --card-hover: rgba(255,255,255,0.08);
      --text: #f0f2ff;
      --muted: rgba(224,228,255,0.55);
      --accent-pink: #ff3cac;
      --accent-purple: #a855f7;
      --accent-cyan: #22d3ee;
      --yt-red: #FF0000;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.18);
      --glow-pink: rgba(255,60,172,0.15);
      --glow-cyan: rgba(34,211,238,0.12);
      --star-color: #ffd700;
      --star-empty: rgba(255,215,0,0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100svh;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Animated Background ── */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      will-change: transform;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.45;
      animation: blobFloat 20s ease-in-out infinite alternate;
    }

    .blob-1 {
      width: 700px; height: 500px;
      background: radial-gradient(circle, rgba(255,60,172,0.25), transparent 70%);
      top: -15%; left: -10%;
      animation-duration: 22s;
    }

    .blob-2 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(168,85,247,0.2), transparent 70%);
      top: 10%; right: -10%;
      animation-duration: 26s;
      animation-delay: -5s;
    }

    .blob-3 {
      width: 500px; height: 400px;
      background: radial-gradient(circle, rgba(34,211,238,0.18), transparent 70%);
      bottom: -10%; left: 30%;
      animation-duration: 24s;
      animation-delay: -10s;
    }

    @keyframes blobFloat {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(40px, -30px) scale(1.05); }
      66%  { transform: translate(-20px, 20px) scale(0.95); }
      100% { transform: translate(30px, -10px) scale(1.02); }
    }

    .dot-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* ── Layout ── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
    }

    .logo {
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple), var(--accent-cyan));
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      box-shadow: 0 0 20px rgba(168,85,247,0.3);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: var(--border-hover);
      color: var(--text);
    }

    .back-btn svg {
      width: 14px; height: 14px;
      transition: transform 0.2s ease;
    }

    .back-btn:hover svg { transform: translateX(-2px); }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 56px 0 40px;
      animation: fadeUp 0.8s ease both;
    }

    h1 {
      font-size: clamp(36px, 7vw, 56px);
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    .gradient-text {
      background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple) 50%, var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 16px;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Sort Controls ── */
    .sort-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      animation: fadeUp 0.6s ease 0.2s both;
    }

    .sort-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }

    .sort-pills {
      display: flex;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px;
      gap: 2px;
    }

    .sort-pill {
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
      font-family: inherit;
    }

    .sort-pill:hover { color: var(--text); background: rgba(255,255,255,0.06); }

    .sort-pill.active {
      color: #fff;
      background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
      box-shadow: 0 2px 10px rgba(168,85,247,0.3);
    }

    .game-count {
      font-size: 12px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      flex-shrink: 0;
    }

    /* ── Game Cards ── */
    .games-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-bottom: 80px;
    }

    .game-card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      transition: background 0.3s ease, border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
      backdrop-filter: blur(12px);
      overflow: hidden;
    }

    .game-card.animate-in {
      animation: fadeUp 0.5s ease both;
    }

    .game-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--accent-pink), var(--accent-purple), var(--accent-cyan));
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: 0 2px 2px 0;
    }

    .game-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--glow-pink), transparent 40%, var(--glow-cyan));
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .game-card:hover {
      background: var(--card-hover);
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(168,85,247,0.08), 0 2px 8px rgba(0,0,0,0.3);
    }

    .game-card:hover::before { opacity: 1; }
    .game-card:hover::after  { opacity: 0.5; }

    .game-info {
      flex: 1;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .game-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .game-model {
      font-size: 12px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    /* ── Stars ── */
    .game-stars {
      display: flex;
      gap: 2px;
      align-items: center;
    }

    .star {
      font-size: 12px;
      line-height: 1;
    }

    .star-filled { color: var(--star-color); }
    .star-empty  { color: var(--star-empty); }

    /* ── Actions ── */
    .game-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 10px;
      border: 1px solid transparent;
      font-weight: 600;
      font-size: 13px;
      font-family: inherit;
      transition: box-shadow 0.25s ease, transform 0.25s ease, background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
      white-space: nowrap;
      cursor: pointer;
      text-decoration: none;
    }

    .btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .btn-play {
      background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple) 60%, var(--accent-cyan));
      color: #fff;
      box-shadow: 0 2px 12px rgba(168,85,247,0.25);
    }

    .btn-play:hover {
      box-shadow: 0 4px 20px rgba(168,85,247,0.4);
      transform: translateY(-1px);
    }

    .btn-play:active {
      transform: translateY(0);
      box-shadow: 0 1px 6px rgba(168,85,247,0.3);
    }

    .btn-watch {
      background: rgba(255,255,255,0.06);
      border-color: var(--border);
      color: var(--muted);
    }

    .btn-watch:hover {
      background: var(--yt-red);
      border-color: var(--yt-red);
      color: #fff;
      box-shadow: 0 4px 20px rgba(255,0,0,0.3);
    }

    .btn-watch:active {
      background: #cc0000;
      border-color: #cc0000;
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      animation: fadeUp 0.8s ease both;
    }

    .empty-icon {
      width: 56px; height: 56px;
      margin: 0 auto 20px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
    }

    .empty-icon svg {
      width: 24px; height: 24px;
      opacity: 0.4;
    }

    /* ── Footer ── */
    footer {
      padding: 32px 0;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
    }

    footer a {
      color: var(--accent-purple);
      transition: color 0.2s;
    }

    footer a:hover {
      color: var(--accent-cyan);
      text-decoration: underline;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .container { padding: 0 16px; }
      header { padding: 40px 0 28px; }
      .subtitle { font-size: 14px; }

      .sort-bar { flex-wrap: wrap; gap: 8px; }
      .game-count { order: -1; width: 100%; }

      .game-card {
        flex-direction: column;
        align-items: stretch;
        padding: 18px;
        gap: 14px;
      }

      .game-name { white-space: normal; font-size: 16px; }
      .game-actions { width: 100%; }

      .btn {
        flex: 1;
        justify-content: center;
        padding: 12px 16px;
        font-size: 14px;
      }

      .blob-1 { width: 400px; height: 300px; }
      .blob-2 { width: 350px; height: 350px; }
      .blob-3 { width: 300px; height: 250px; }
    }

    @media (max-width: 380px) {
      .game-actions { flex-direction: column; }
      .sort-pills { width: 100%; }
      .sort-pill { flex: 1; text-align: center; }
    }

    /* ── Reduced Motion ── */
    @media (prefers-reduced-motion: reduce) {
      .blob { animation: none; }
      .game-card,
      .game-card.animate-in,
      header,
      .sort-bar { animation: none; }
      .game-card:hover,
      .btn-play:hover { transform: none; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>

<body>

  <!-- Animated Background -->
  <div class="bg-layer" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>
  <div class="dot-grid" aria-hidden="true"></div>

  <div class="container">
    <nav aria-label="Site navigation">
      <div class="logo">
        <div class="logo-icon" aria-hidden="true">🎮</div>
        <span>Games</span>
      </div>
      <a href="/" class="back-btn" aria-label="Back to main site">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to Bench
      </a>
    </nav>

    <header>
      <h1>AI BATTLE: <span class="gradient-text">Games</span></h1>
      <p class="subtitle">Each game was built by a different AI model. Play, compare, and see who's got game.</p>
    </header>

    <div class="sort-bar" id="sort-bar" style="display:none;" role="toolbar" aria-label="Sort options">
      <span class="sort-label" id="sort-label">Sort by</span>
      <div class="sort-pills" role="group" aria-labelledby="sort-label">
        <button class="sort-pill active" data-sort="name" onclick="setSort('name')" aria-pressed="true">Game Name</button>
        <button class="sort-pill" data-sort="stars" onclick="setSort('stars')" aria-pressed="false">Top Rated</button>
        <button class="sort-pill" data-sort="model" onclick="setSort('model')" aria-pressed="false">Model</button>
      </div>
      <span class="game-count" id="game-count" aria-live="polite"></span>
    </div>

    <main>
      <div class="games-grid" id="games-grid" aria-label="Games list">
        <!-- Games loaded dynamically -->
      </div>
    </main>

    <footer>
      Built by <strong>SlopOps</strong> ·
      <a href="https://youtube.com/@SlopOps" target="_blank" rel="noopener noreferrer">YouTube</a>
    </footer>
  </div>

  <script>
    let allLiveGames = [];
    let currentSort = 'name';

    async function loadGames() {
      const container = document.getElementById('games-grid');
      try {
        const response = await fetch('games.csv');
        if (!response.ok) throw new Error('Failed to load');

        const csvText = await response.text();
        const games = parseCSV(csvText);
        allLiveGames = games.filter(g => g.live);

        if (allLiveGames.length === 0) {
          container.innerHTML = renderEmpty('No games available yet. Check back soon!');
          return;
        }

        document.getElementById('sort-bar').style.display = '';
        renderGames();

      } catch (err) {
        console.error('Error loading games:', err);
        container.innerHTML = renderEmpty('Could not load games. Please try again later.');
      }
    }

    function setSort(sortKey) {
      currentSort = sortKey;
      document.querySelectorAll('.sort-pill').forEach(pill => {
        const isActive = pill.dataset.sort === sortKey;
        pill.classList.toggle('active', isActive);
        pill.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });
      renderGames();
    }

    function renderStars(count) {
      const filled = Math.min(Math.max(parseInt(count, 10) || 0, 0), 5);
      const empty  = 5 - filled;
      const label  = `${filled} out of 5 stars`;
      let html = `<div class="game-stars" role="img" aria-label="${label}">`;
      for (let i = 0; i < filled; i++) html += `<span class="star star-filled" aria-hidden="true">★</span>`;
      for (let i = 0; i < empty;  i++) html += `<span class="star star-empty"  aria-hidden="true">☆</span>`;
      html += '</div>';
      return html;
    }

    function renderGames() {
      const container = document.getElementById('games-grid');

      const sorted = [...allLiveGames].sort((a, b) => {
        if (currentSort === 'stars') return b.stars - a.stars;
        if (currentSort === 'model') return a.path.localeCompare(b.path);
        return (a.game_name || a.path).localeCompare(b.game_name || b.path);
      });

      const count = sorted.length;
      document.getElementById('game-count').textContent = count + ' game' + (count !== 1 ? 's' : '');

      container.innerHTML = sorted.map((game, i) => `
        <article class="game-card animate-in" style="animation-delay:${i * 0.06}s">
          <div class="game-info">
            <div class="game-name">${escapeHtml(game.game_name || game.path)}</div>
            <div class="game-model">${escapeHtml(game.path)}</div>
            ${renderStars(game.stars)}
          </div>
          <div class="game-actions">
            <a href="./${escapeHtml(game.path)}/index.html" class="btn btn-play" aria-label="Play ${escapeHtml(game.game_name || game.path)}">
              <svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="6,3 20,12 6,21"/></svg>
              Play
            </a>
            ${game.youtube_link ? `
            <a href="${escapeHtml(game.youtube_link)}" target="_blank" rel="noopener noreferrer" class="btn btn-watch" aria-label="Watch ${escapeHtml(game.game_name || game.path)} on YouTube">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
              </svg>
              Watch
            </a>` : ''}
          </div>
        </article>
      `).join('');
    }

    function renderEmpty(msg) {
      return `
        <div class="empty-state" role="status">
          <div class="empty-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 15s1.5-2 4-2 4 2 4 2"/>
              <line x1="9" y1="9" x2="9.01" y2="9"/>
              <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
          </div>
          <p>${escapeHtml(msg)}</p>
        </div>`;
    }

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return [];

      const headers  = lines[0].split(',').map(h => h.trim());
      const pathIdx  = headers.indexOf('path');
      const nameIdx  = headers.indexOf('game_name');
      const liveIdx  = headers.indexOf('live');
      const ytIdx    = headers.indexOf('youtube_link');
      const starsIdx = headers.indexOf('stars');

      return lines.slice(1).map(line => {
        const v = line.split(',').map(c => c.trim());
        return {
          path:         v[pathIdx]  || '',
          game_name:    v[nameIdx]  || '',
          live:         (v[liveIdx] || '').toLowerCase() === 'true',
          youtube_link: v[ytIdx]    || '',
          stars:        parseInt(v[starsIdx], 10) || 0,
        };
      }).filter(g => g.path);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    loadGames();
  </script>
</body>
</html>
