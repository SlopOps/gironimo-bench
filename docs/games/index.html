<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    font-family: system-ui, -apple-system, sans-serif;
    background: linear-gradient(180deg, #0f172a, #020617);
    color: white;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 2;
    padding: 24px 16px 80px;
  }

  h1 {
    text-align: center;
    font-size: 2.4rem;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #00ffa3, #ff4ecd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .gallery {
    display: flex;
    gap: 16px;
    overflow-x: auto;
    padding: 16px;
    scroll-snap-type: x mandatory;
  }

  .card {
    min-width: 240px;
    max-width: 240px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    backdrop-filter: blur(12px);
    padding: 16px;
    scroll-snap-align: center;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .card:hover {
    transform: translateY(-6px) scale(1.05);
    box-shadow: 0 20px 40px rgba(0,255,163,0.2);
  }

  .thumb {
    width: 100%;
    height: 140px;
    border-radius: 12px;
    object-fit: cover;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #00ffa3, #ff4ecd);
  }

  .title {
    font-weight: bold;
    margin-bottom: 8px;
    display: block;
    text-decoration: none;
    color: white;
  }

  .watch {
    font-size: 0.85rem;
    color: #00ffa3;
    text-decoration: none;
  }

  @media (max-width: 600px) {
    .card { min-width: 200px; }
  }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="wrap">
  <h1>🎮 Games</h1>
  <div class="gallery" id="games"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// --- FUN COLORFUL 3D BACKGROUND ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg'), alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);

const balls = [];
for (let i = 0; i < 60; i++) {
  const geo = new THREE.SphereGeometry(Math.random() * 0.4 + 0.2, 32, 32);
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color().setHSL(Math.random(), 0.8, 0.6),
    metalness: 0.5,
    roughness: 0.2
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(
    (Math.random() - 0.5) * 15,
    (Math.random() - 0.5) * 15,
    (Math.random() - 0.5) * 15
  );

  scene.add(mesh);
  balls.push(mesh);
}

const light1 = new THREE.PointLight(0xffffff, 1.5);
light1.position.set(5,5,5);
scene.add(light1);

const light2 = new THREE.PointLight(0xff4ecd, 1);
light2.position.set(-5,-5,5);
scene.add(light2);

camera.position.z = 6;

function animate() {
  requestAnimationFrame(animate);
  balls.forEach(b => {
    b.rotation.x += 0.01;
    b.rotation.y += 0.01;
  });
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// --- LOAD CSV + BUILD GALLERY ---
fetch('/docs/games/games.csv')
  .then(res => res.text())
  .then(text => {
    const rows = text.trim().split('\n').slice(1);
    const container = document.getElementById('games');

    rows.forEach(row => {
      const parts = row.split(',');
      const path = parts[0];
      const name = parts[1];
      const live = parts[2];
      const youtube = parts.slice(3).join(',');

      if (!name) return;

      const card = document.createElement('div');
      card.className = 'card';

      const img = document.createElement('img');
      img.className = 'thumb';
      img.src = `/docs/games/${path}/thumbnail.png`;
      img.onerror = () => img.style.display = 'none';

      const title = document.createElement('a');
      title.href = `/docs/games/${path}/index.html`;
      title.className = 'title';
      title.textContent = name;

      card.appendChild(img);
      card.appendChild(title);

      if (live === 'true') {
        const watch = document.createElement('a');
        watch.href = youtube;
        watch.target = '_blank';
        watch.className = 'watch';
        watch.textContent = '▶ Watch';
        card.appendChild(watch);
      }

      container.appendChild(card);
    });
  });
</script>
</body>
</html>
