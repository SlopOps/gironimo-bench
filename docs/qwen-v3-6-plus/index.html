<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gironimo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- ===== MODEL BANNER (AUTO FROM CSV) ===== -->
    
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q5R5LECE2Y"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Q5R5LECE2Y');
  
    // 🔧 CHANGE THIS PER PAGE (must match result_url slug in CSV)
    const MODEL_SLUG = "qwen-v3-6-plus";
  </script>
  
  <style>
    .model-banner {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(15, 18, 32, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: #e8eefc;
      font-family: system-ui, sans-serif;
    }
  
    .banner-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
  
    .banner-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
  
    .banner-model {
      font-weight: 600;
      font-size: 15px;
      color: #ffffff;
    }
  
    .banner-score {
      font-weight: 700;
      font-size: 15px;
      color: #7c5cff;
    }
  
    .banner-details {
      display: flex;
      gap: 8px;
      font-size: 12px;
      flex-wrap: wrap;
      color: rgba(232,238,252,0.75);
    }
  
    .banner-pill {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 4px 8px;
      border-radius: 6px;
    }
  
    .banner-link {
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      color: rgba(232,238,252,0.8);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 6px 10px;
      border-radius: 8px;
    }
  
    .banner-link:hover {
      background: rgba(255,255,255,0.08);
    }
  
    /* Mobile */
    @media (max-width: 768px) {
      .banner-details {
        display: none;
      }
    }
  </style>
  
  <div class="model-banner">
    <div class="banner-inner">
      
      <div class="banner-left">
        <div class="banner-model" id="banner-model">Loading...</div>
        <div class="banner-score" id="banner-score"></div>
      </div>
  
      <div class="banner-details" id="banner-details"></div>
  
      <a href="/#leaderboard" class="banner-link">← Leaderboard</a>
  
    </div>
  </div>
  
  <script>
  (async function loadBanner() {
    try {
      const res = await fetch('/results/leaderboard.csv', { cache: 'no-store' });
      const text = await res.text();
  
      // ✅ Robust CSV parsing (fixes your error)
      const rows = text.trim().split('\n').map(r => r.split(','));
      const headers = rows.shift();
  
      if (!headers || headers.length < 2) throw new Error("Invalid CSV");
  
      const data = rows.map(row => {
        const obj = {};
        headers.forEach((h, i) => obj[h.trim()] = (row[i] || '').trim());
        return obj;
      });
  
      // Find matching model
      const match = data.find(row => {
        if (!row.result_url) return false;
        const slug = row.result_url.replace(/\//g, '');
        return slug === MODEL_SLUG;
      });
  
      if (!match) {
        document.getElementById('banner-model').textContent = "Model not found";
        return;
      }
  
      // Render
      document.getElementById('banner-model').textContent = match.model;
      document.getElementById('banner-score').textContent =
        `Score: ${match.overall_score || '—'}`;
  
      const fields = [
        ["Speed", match.speed],
        ["1-Shot", match.one_shot_attempts],
        ["Design", match.design],
        ["Arch", match.architecture],
        ["Code", match.code_quality],
        ["Features", match.feature_complete],
        ["Perf", match.performance],
        ["Access", match.accessibility],
        ["Best", match.best_practices],
        ["Value", match.value],
      ];
  
      document.getElementById('banner-details').innerHTML = fields
        .filter(([_, v]) => v && v !== '?' && v !== '??')
        .map(([k, v]) => `<span class="banner-pill">${k}: ${v}</span>`)
        .join('');
  
    } catch (err) {
      console.error('Banner error:', err);
      document.getElementById('banner-model').textContent = "Error loading banner";
    }
  })();
  </script>
  
  <!-- ===== END MODEL BANNER ===== -->
  
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header class="app-header">
    <h1 class="brand">🦒 Gironimo</h1>
    <div id="theme-toggle" class="theme-provider" role="button" tabindex="0" aria-label="Toggle dark/light theme" aria-pressed="false">
      <span class="icon" aria-hidden="true">🌓</span>
    </div>
  </header>

  <main id="main-content" class="app-grid">
    <section class="panel philosophy-panel" aria-labelledby="philosophy-title">
      <h2 id="philosophy-title">Philosophy Explorer</h2>
      <div class="category-filters" role="group" aria-label="Philosophy category filters">
        <button class="btn btn-sm" data-filter="all" aria-pressed="true">All</button>
        <button class="btn btn-sm" data-filter="Practical" aria-pressed="false">Practical</button>
        <button class="btn btn-sm" data-filter="Philosophical" aria-pressed="false">Philosophical</button>
        <button class="btn btn-sm" data-filter="Technical" aria-pressed="false">Technical</button>
      </div>
      <div id="philosophy-list" role="list" aria-label="Available philosophy statements"></div>
    </section>

    <section class="panel workflow-panel" aria-labelledby="workflow-title">
      <h2 id="workflow-title">Workflow Pipeline</h2>
      <div id="workflow-stages" class="stages" role="list" aria-label="Development stages"></div>
    </section>

    <section class="panel leaderboard-panel" aria-labelledby="leaderboard-title">
      <h2 id="leaderboard-title">Model Leaderboard</h2>
      <div class="leaderboard-controls">
        <button class="btn btn-sm sort-btn" data-sort="overall_score" aria-pressed="true">Sort by Score ↓</button>
        <button class="btn btn-sm sort-btn" data-sort="date" aria-pressed="false">Sort by Date ↓</button>
        <button class="btn btn-sm sort-btn" data-sort="model" aria-pressed="false">Sort A-Z ↓</button>
      </div>
      <div id="leaderboard-container" class="leaderboard-container">
        <table id="leaderboard-table" aria-label="AI Model Performance Metrics">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="mascot-stage" aria-hidden="true"></div>

  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-content">
      <header class="modal-header">
        <h2 id="modal-title">Stage Details</h2>
        <button id="modal-close" class="btn btn-icon" aria-label="Close modal">✕</button>
      </header>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="notification-tray" aria-live="polite" aria-atomic="true" class="notification-tray"></div>

  <script src="app.js"></script>
</body>
</html>
