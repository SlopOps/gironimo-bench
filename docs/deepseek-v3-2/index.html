<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Gironimo - AI Model Leaderboard and Workflow System">
    <title>Gironimo | AI Model Leaderboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q5R5LECE2Y"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-Q5R5LECE2Y');
    </script>
    
    <!-- Model Performance Banner -->
    <style>
      .model-banner {
        background: linear-gradient(135deg, rgba(124,92,255,0.1) 0%, rgba(0,212,255,0.05) 100%);
        border: 1px solid var(--border, rgba(255,255,255,0.1));
        border-radius: 16px;
        padding: 20px 24px;
        margin-bottom: 32px;
        backdrop-filter: blur(10px);
      }
      
      .model-banner h2 {
        font-size: 20px;
        margin: 0 0 8px 0;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      
      .model-banner .score-badge {
        background: linear-gradient(90deg, #7c5cff, #00d4ff);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 600;
        color: #000;
      }
      
      .model-banner .metrics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 12px;
        margin: 16px 0;
      }
      
      .model-banner .metric {
        background: rgba(255,255,255,0.05);
        padding: 8px 12px;
        border-radius: 10px;
      }
      
      .model-banner .metric-label {
        font-size: 11px;
        text-transform: uppercase;
        color: var(--muted, rgba(232,238,252,0.7));
        letter-spacing: 0.5px;
      }
      
      .model-banner .metric-value {
        font-size: 18px;
        font-weight: 700;
        margin-top: 4px;
      }
      
      .model-banner .watch-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(255,255,255,0.1);
        padding: 8px 16px;
        border-radius: 40px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        margin-top: 12px;
      }
      
      .model-banner .watch-link:hover {
        background: rgba(255,255,255,0.2);
      }
      
      @media (max-width: 768px) {
        .model-banner .metrics-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .model-banner h2 {
          font-size: 18px;
        }
      }
    </style>
    
    <script>
      // Auto-detect model name from folder path
      const modelPath = window.location.pathname;
      const modelName = modelPath.split('/').filter(p => p).pop() || modelPath.split('/').slice(-2, -1)[0];
      
      // Fetch and display model data
      async function loadModelBanner() {
        try {
          const response = await fetch('/results/leaderboard.csv?t=' + Date.now());
          const csvText = await response.text();
          
          // Parse CSV
          const lines = csvText.split('\n');
          const headers = lines[0].split(',').map(h => h.trim());
          
          let modelData = null;
          
          for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            
            const values = parseCSVLine(lines[i]);
            const modelIndex = headers.indexOf('model');
            
            if (modelIndex !== -1 && values[modelIndex] && values[modelIndex].toLowerCase() === modelName.toLowerCase()) {
              modelData = {};
              headers.forEach((h, idx) => {
                modelData[h] = values[idx] || '—';
              });
              break;
            }
          }
          
          if (!modelData) {
            console.log('No data found for model:', modelName);
            return;
          }
          
          // Render banner
          const banner = document.createElement('div');
          banner.className = 'model-banner';
          banner.innerHTML = `
            <h2>
              🦒 ${escapeHtml(modelData.model)} 
              <span class="score-badge">Score: ${escapeHtml(modelData.overall_score || '—')}</span>
            </h2>
            
            <div class="metrics-grid">
              <div class="metric">
                <div class="metric-label">Design</div>
                <div class="metric-value">${escapeHtml(modelData.design || '—')}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Architecture</div>
                <div class="metric-value">${escapeHtml(modelData.architecture || '—')}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Code Quality</div>
                <div class="metric-value">${escapeHtml(modelData.code_quality || '—')}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Best Practices</div>
                <div class="metric-value">${escapeHtml(modelData.best_practices || '—')}</div>
              </div>
            </div>
            
            ${modelData.video_url && modelData.video_url !== '?' ? 
              `<a href="${escapeHtml(modelData.video_url)}" class="watch-link" target="_blank">
                ▶️ Watch on YouTube
              </a>` : ''}
          `;
          
          // Insert at top of main content
          const container = document.querySelector('.container, main, .app-container, body > :first-child');
          if (container && container.firstChild) {
            container.insertBefore(banner, container.firstChild);
          } else {
            document.body.insertBefore(banner, document.body.firstChild);
          }
          
        } catch (error) {
          console.error('Error loading model banner:', error);
        }
      }
      
      function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            result.push(current.trim());
            current = '';
          } else {
            current += char;
          }
        }
        result.push(current.trim());
        return result;
      }
      
      function escapeHtml(str) {
        if (!str) return '—';
        return String(str).replace(/[&<>]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          return m;
        });
      }
      
      // Run after page loads
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadModelBanner);
      } else {
        loadModelBanner();
      }
    </script>
    <!-- End Model Performance Banner -->
    <div id="app" class="app-container">
        <!-- Header with Theme Toggle -->
        <header class="app-header">
            <div class="header-left">
                <h1 class="app-title">🦒 Gironimo</h1>
                <span class="tagline">Stand tall. See far. Move deliberately.</span>
            </div>
            <div class="header-right">
                <button id="themeToggle" class="btn btn-icon" aria-label="Toggle theme">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </header>

        <!-- Main Grid Layout -->
        <div class="main-grid">
            <!-- Left Column: Philosophy Explorer + Mascot -->
            <aside class="left-column">
                <div class="philosophy-section card">
                    <h2>Philosophy Explorer</h2>
                    <div class="philosophy-filters">
                        <button data-category="all" class="filter-chip active">All</button>
                        <button data-category="Practical" class="filter-chip">Practical</button>
                        <button data-category="Philosophical" class="filter-chip">Philosophical</button>
                        <button data-category="Technical" class="filter-chip">Technical</button>
                    </div>
                    <div class="philosophy-list" id="philosophyList"></div>
                </div>

                <!-- Mascot Section -->
                <div class="mascot-section card">
                    <div class="mascot-container" id="mascotContainer">
                        <svg viewBox="0 0 200 300" class="giraffe-svg">
                            <!-- Body -->
                            <ellipse cx="100" cy="200" rx="35" ry="50" fill="#F4A261" class="giraffe-body"/>
                            <!-- Neck -->
                            <rect x="85" y="80" width="30" height="120" rx="10" fill="#E76F51" class="giraffe-neck"/>
                            <!-- Head -->
                            <ellipse cx="100" cy="70" rx="25" ry="20" fill="#F4A261" class="giraffe-head"/>
                            <!-- Eyes -->
                            <circle cx="90" cy="65" r="4" fill="#2D2D2D" class="giraffe-eye-left"/>
                            <circle cx="110" cy="65" r="4" fill="#2D2D2D" class="giraffe-eye-right"/>
                            <!-- Horns -->
                            <line x1="90" y1="50" x2="85" y2="35" stroke="#E76F51" stroke-width="4" stroke-linecap="round"/>
                            <line x1="110" y1="50" x2="115" y2="35" stroke="#E76F51" stroke-width="4" stroke-linecap="round"/>
                            <!-- Spots -->
                            <circle cx="100" cy="180" r="6" fill="#D35400" opacity="0.6"/>
                            <circle cx="90" cy="150" r="5" fill="#D35400" opacity="0.6"/>
                            <circle cx="110" cy="140" r="5" fill="#D35400" opacity="0.6"/>
                            <!-- Legs -->
                            <rect x="75" y="240" width="10" height="40" rx="3" fill="#E76F51"/>
                            <rect x="115" y="240" width="10" height="40" rx="3" fill="#E76F51"/>
                            <!-- Tail -->
                            <path d="M65 200 Q50 190 55 180" stroke="#E76F51" stroke-width="3" fill="none"/>
                        </svg>
                    </div>
                    <div class="mascot-message" id="mascotMessage">🦒 Standing tall...</div>
                </div>
            </aside>

            <!-- Center Column: Leaderboard -->
            <main class="center-column">
                <div class="leaderboard-section card">
                    <div class="leaderboard-header">
                        <h2>Model Leaderboard</h2>
                        <div class="leaderboard-controls">
                            <label for="sortBy">Sort by:</label>
                            <select id="sortBy" class="select-control">
                                <option value="overall_score">Overall Score</option>
                                <option value="date">Date</option>
                                <option value="model">Model Name</option>
                            </select>
                        </div>
                    </div>
                    <div class="table-container">
                        <table class="leaderboard-table" id="leaderboardTable">
                            <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>Model</th>
                                    <th>Date</th>
                                    <th>Overall Score</th>
                                    <th>Design</th>
                                    <th>Architecture</th>
                                    <th>Code Quality</th>
                                    <th>Best Practices</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboardBody">
                                <tr><td colspan="8" class="loading">Loading leaderboard data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Workflow System -->
                <div class="workflow-section card">
                    <h2>Development Workflow</h2>
                    <div class="workflow-stages" id="workflowStages"></div>
                    <div class="workflow-progress">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                </div>
            </main>

            <!-- Right Column: Notifications -->
            <aside class="right-column">
                <div class="notifications-section card">
                    <h2>Notifications</h2>
                    <div class="notifications-list" id="notificationsList">
                        <div class="notification-placeholder">Select a model to begin</div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Modal Component -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Stage Details</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Tooltip Component -->
    <div id="tooltip" class="tooltip hidden"></div>

    <script src="script.js"></script>
</body>
</html>
