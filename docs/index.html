<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Gironimo Bench</title>

<style>
:root {
  --bg: #0b0f19;
  --text: #e8eefc;
  --muted: rgba(232,238,252,0.7);
  --accent: #7c5cff;
  --accent2: #00d4ff;
  --border: rgba(255,255,255,0.1);
}

body {
  margin: 0;
  font-family: system-ui;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 24px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid var(--border);
}

th {
  text-align: left;
  color: var(--muted);
  font-size: 12px;
}

.rank { color: var(--accent); font-weight: 700; }
.score { font-weight: 600; }

a { color: var(--accent2); text-decoration: none; }

.info-icon {
  margin-left: 6px;
  font-size: 11px;
  opacity: 0.6;
  cursor: pointer;
}
.info-icon:hover { opacity: 1; }

.tooltip {
  position: fixed;
  background: #111827;
  border: 1px solid var(--border);
  padding: 12px;
  border-radius: 10px;
  display: none;
  max-width: 280px;
  z-index: 9999;
}
</style>
</head>

<body>
<div class="container">

<h2>Leaderboard</h2>
<p id="last-updated"></p>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Model</th>
<th>Score</th>
<th>YouTube</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

</div>

<div id="tooltip" class="tooltip"></div>

<script>
const tooltip = document.getElementById('tooltip');
let activeIcon = null;

let deploymentData = {};
let leaderboardData = [];

/* ---------- CSV ---------- */
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',');

  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h,i)=> obj[h.trim()] = vals[i]?.trim() || '');
    return obj;
  });
}

/* ---------- helpers ---------- */
function escapeHtml(str) {
  if (!str) return '—';
  return str.replace(/[&<>]/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;'
  }[m]));
}

/* ---------- TOOLTIP ---------- */
function showTooltip(icon) {
  const model = icon.dataset.model;
  const d = deploymentData[model];
  if (!d) return;

  tooltip.innerHTML = `
    <div><b>Provider:</b> ${d.provider || '—'}</div>
    <div><b>Interface:</b> ${d.interface || '—'}</div>
    <div><b>Reasoning:</b> ${d.reasoning || '—'}</div>
    <div><b>Company:</b> ${d.company || '—'}</div>
    ${d.link ? `<a href="${d.link}" target="_blank">link ↗</a>` : ''}
  `;

  tooltip.style.display = 'block';
  tooltip.style.visibility = 'hidden';

  // force layout
  tooltip.offsetHeight;

  const r = icon.getBoundingClientRect();
  const t = tooltip.getBoundingClientRect();

  let left = r.left;
  let top = r.bottom + 8;

  if (left + t.width > window.innerWidth)
    left = window.innerWidth - t.width - 10;

  if (top + t.height > window.innerHeight)
    top = r.top - t.height - 8;

  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
  tooltip.style.visibility = 'visible';
}

function hideTooltip() {
  tooltip.style.display = 'none';
  activeIcon = null;
}

/* click handler */
document.addEventListener('click', e => {
  const icon = e.target.closest('.info-icon');

  if (icon) {
    e.stopPropagation();

    if (activeIcon === icon) return hideTooltip();

    activeIcon = icon;
    showTooltip(icon);
    return;
  }

  if (!tooltip.contains(e.target)) hideTooltip();
});

/* ---------- LOAD ---------- */
async function load() {
  // deployments
  try {
    const t = await (await fetch('results/deployments.csv')).text();
    parseCSV(t).forEach(r => deploymentData[r.model] = r);
  } catch {}

  // leaderboard
  const res = await fetch('results/leaderboard.csv');
  const text = await res.text();
  leaderboardData = parseCSV(text);

  render();
}

/* ---------- RENDER ---------- */
function render() {
  const body = document.getElementById('body');

  leaderboardData.sort((a,b)=>
    parseFloat(b.overall_score||0) - parseFloat(a.overall_score||0)
  );

  body.innerHTML = leaderboardData.map((row,i)=>{

    const model = row.model || '';
    const score = row.overall_score || '—';

    // ✅ FIX: use RAW model name (no slugify)
    const modelLink = model
      ? `<a href="${model}/index.html">${escapeHtml(model)}</a>`
      : '—';

    // ✅ FIX: raw dataset (no escape)
    const icon = deploymentData[model]
      ? `<span class="info-icon" data-model="${model}">ⓘ</span>`
      : '';

    const yt = row.video_url
      ? `<a href="${row.video_url}" target="_blank">YouTube</a>`
      : '—';

    return `
      <tr>
        <td class="rank">${i+1}</td>
        <td>${modelLink}</td>
        <td class="score">${score}${icon}</td>
        <td>${yt}</td>
      </tr>
    `;
  }).join('');
}

load();
</script>

</body>
</html>
